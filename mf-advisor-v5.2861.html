function FundOverviewPage({sortedTxns,navByScheme,sm,enabled,period,minDate,analyticsMap,allTxns,setAllTxns,showExited,setShowExited,returnBasis}){
  const today=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d;},[]);
  const {start,end}=useMemo(()=>getPeriodDates(period,minDate,today),[period,minDate,today]);
  const [showGlossary,setShowGlossary]=useState(false);
  const [focusTerm,setFocusTerm]=useState(null);
  const [colGroup,setColGroup]=useState('returns'); // returns|risk|cost

  const openGlossary=(term)=>{setFocusTerm(term);setShowGlossary(true);};

  const rows=useMemo(()=>{
    const arr=[];
    for(const name of enabled){
      const lastNavArr=navByScheme[name]||[];
      const lastNavEntry=lastNavArr.length?lastNavArr[lastNavArr.length-1]:null;
      const lastNavVal=lastNavEntry?.v;
      const lastNavDate=lastNavEntry?fmtD(lastNavEntry.d):'—';
      const navAtEnd=getNav(navByScheme[name],end);
      const navAtEndDate=navByScheme[name]?.length?(()=>{
        const arr2=navByScheme[name];
        let lo=0,hi=arr2.length-1;
        while(lo<=hi){const m=(lo+hi)>>1;arr2[m].d<=end?(lo=m+1):(hi=m-1);}
        return hi>=0?fmtD(arr2[hi].d):'—';
      })():'—';
      const balUnits=schemeUnits(name,end,sortedTxns);
      const currentVal=navAtEnd&&balUnits>0.001?balUnits*navAtEnd:0;
      const{costBasis,costPerUnit,realizedGain,dividends}=computeFIFO(name,end,sortedTxns);
      const{invested}=computeInvested(end,sortedTxns,new Set([name]));
      const unrealisedGain=currentVal-costBasis;
      const totalReturn=unrealisedGain+realizedGain+dividends;
      const rb=returnBasis||'book';
      const red_f=sortedTxns.filter(t=>t.scheme===name&&(clf(t.txType)==='sell'||clf(t.txType)==='switchout')).reduce((s,t)=>s+Math.abs(t.amount||0),0);
      const net_f=invested-red_f;
      const rpDenom=rb==='book'?costBasis:rb==='net'?net_f:invested;
      const returnPct=rpDenom!==0?totalReturn/Math.abs(rpDenom)*100:0;
      const xirrAll=computeXirrForScheme(name,end,null,sortedTxns,navByScheme);
      const xirrPeriod=computeXirrForScheme(name,end,start,sortedTxns,navByScheme);
      const an=analyticsMap?.[name];
      const exited=currentVal<10&&balUnits<0.001;
      arr.push({
        name,amc:getAMC(name),cls:getAssetClass(name),
        lastNav:lastNavVal,lastNavDate,navAtEndDate,
        balUnits,costBasis,costPerUnit,
        currentVal,unrealisedGain,realizedGain,dividends,
        totalReturn,returnPct,invested,
        xirrAllPct:xirrAll!=null?xirrAll*100:null,
        xirrPeriodPct:xirrPeriod!=null?xirrPeriod*100:null,
        meanReturnPct:an?.meanReturnPct??null,
        stdDevPct:an?.stdDevPct??null,
        sharpe:an?.sharpe??null,
        sortino:an?.sortino??null,
        beta:an?.beta??null,
        alphaPct:an?.alpha??null,
        maxDrawdownPct:an?.maxDrawdownPct??null,
        pctPortfolio:0,
        exited,
      });
    }
    const totalVal=arr.reduce((s,r)=>s+r.currentVal,0);
    arr.forEach(r=>r.pctPortfolio=totalVal>0?r.currentVal/totalVal*100:0);
    return arr;
  },[enabled,sortedTxns,navByScheme,analyticsMap,start,end]);

  const totals=useMemo(()=>{
    const t={};
    ['invested','costBasis','currentVal','unrealisedGain','realizedGain','dividends','totalReturn'].forEach(k=>{t[k]=rows.reduce((s,r)=>s+r[k],0);});
    const td=(returnBasis||'book')==='book'?t.costBasis:(returnBasis||'book')==='net'?(t.invested-(t.redeemed||0)):t.invested;
    t.returnPct=td!==0?t.totalReturn/Math.abs(td)*100:0;
    return t;
  },[rows]);

  const gc=v=>v==null?C.muted:v>=0?C.green:C.red;
  const nc=v=>v==null?'—':`${v>=0?'+':''}${v.toFixed(2)}`;

  // Column groups
  const COLS_RETURNS=[
    {key:'name',label:'Fund',w:200,
      render:(v,r)=>(
        <div>
          <div style={{fontSize:11,fontWeight:500,lineHeight:1.3,maxWidth:200}}>{v}</div>
          <div style={{fontSize:9,color:C.muted,marginTop:2}}>{r.amc} · <span style={{color:C.teal}}>{r.cls}</span>{r.exited&&<span style={{color:C.muted2,marginLeft:4}}>[exited]</span>}</div>
        </div>
      )},
    {key:'lastNav',label:'Last NAV',align:'right',mono:true,
      render:(v,r)=>(
        <div>
          <div>{v?`₹${v.toFixed(3)}`:'—'}</div>
          <div style={{fontSize:9,color:C.muted}}>{r.lastNavDate}</div>
        </div>
      )},
    {key:'currentVal',label:'Value',align:'right',mono:true,render:v=>FMT(v)},
    {key:'navAtEndDate',label:'NAV Date Used',align:'right',render:v=><span style={{fontSize:10,color:C.muted,fontFamily:'Space Mono'}}>{v}</span>},
    {key:'xirrAllPct',label:'XIRR PA\n(All-time)',align:'right',mono:true,
      render:v=>v!=null?<span style={{color:gc(v),fontWeight:700}}>{PCT(v,1)}</span>:'—'},
    {key:'xirrPeriodPct',label:`XIRR PA\n(${period?.l||'Period'})`,align:'right',mono:true,
      render:v=>v!=null?<span style={{color:gc(v)}}>{PCT(v,1)}</span>:'—'},
    {key:'totalReturn',label:'Total Return',align:'right',mono:true,render:(v)=><span style={{color:gc(v)}}>{FMT(v)}</span>},
    {key:'returnPct',label:`Abs Return %\n(${(returnBasis||'book')==='book'?'Book Cost':(returnBasis||'book')==='net'?'Net Dep':'Gross'})`  ,align:'right',render:v=>v!=null?<span style={{color:gc(v),fontFamily:'Space Mono',fontSize:11}}>{PCT(v,1)}</span>:'—'},
    {key:'pctPortfolio',label:'% Portfolio',align:'right',
      render:v=>(
        <div style={{display:'flex',alignItems:'center',gap:5,minWidth:70}}>
          <div style={{width:40,height:4,background:C.border,borderRadius:2,overflow:'hidden'}}>
            <div style={{width:`${Math.min(100,v)}%`,height:'100%',background:C.accent,borderRadius:2}}/>
          </div>
          <span style={{fontFamily:'Space Mono',fontSize:10}}>{v.toFixed(1)}%</span>
        </div>
      )},
  ];

  const COLS_RISK=[
    {key:'name',label:'Fund',w:200,
      render:(v,r)=><div style={{fontSize:11,maxWidth:200}}>{v.length>38?v.slice(0,36)+'…':v}<div style={{fontSize:9,color:C.muted}}>{r.cls}</div></div>},
    {key:'meanReturnPct',label:'Mean\nReturn PA',align:'right',mono:true,
      render:v=>v!=null?<span style={{color:gc(v)}}>{PCT(v,1)}</span>:<span style={{color:C.muted2,fontSize:9}}>≤12mo</span>},
    {key:'stdDevPct',label:'Std Dev\n% PA',align:'right',mono:true,
      render:v=>v!=null?<span style={{color:v>22?C.amber:v>15?C.text:C.green}}>{v.toFixed(1)}%</span>:<span style={{color:C.muted2,fontSize:9}}>N/A</span>},
    {key:'sharpe',label:'Sharpe',align:'right',mono:true,
      render:v=>v!=null?<span style={{color:v>1?C.green:v>0?C.amber:C.red,fontWeight:700}}>{v.toFixed(2)}</span>:<span style={{color:C.muted2,fontSize:9}}>N/A</span>},
    {key:'sortino',label:'Sortino',align:'right',mono:true,
      render:v=>v!=null?<span style={{color:v>1.5?C.green:v>0.5?C.amber:C.red}}>{v.toFixed(2)}</span>:<span style={{color:C.muted2,fontSize:9}}>N/A</span>},
    {key:'beta',label:'Beta',align:'right',mono:true,
      render:v=>v!=null?<span style={{color:v>1.2?C.red:v<0.8?C.green:C.amber}}>{v.toFixed(2)}</span>:<span style={{color:C.muted2,fontSize:9}}>N/A</span>},
    {key:'alphaPct',label:'Alpha\n% PA',align:'right',mono:true,
      render:v=>v!=null?<span style={{color:gc(v),fontWeight:700}}>{nc(v)}%</span>:<span style={{color:C.muted2,fontSize:9}}>N/A</span>},
    {key:'maxDrawdownPct',label:'Max\nDrawdown',align:'right',mono:true,
      render:v=>v!=null?<span style={{color:v>40?C.red:v>25?C.amber:C.green}}>-{v.toFixed(1)}%</span>:<span style={{color:C.muted2,fontSize:9}}>N/A</span>},
    {key:'xirrAllPct',label:'XIRR PA',align:'right',mono:true,render:v=>v!=null?<span style={{color:gc(v),fontWeight:700}}>{PCT(v,1)}</span>:'—'},
    {key:'pctPortfolio',label:'% Port',align:'right',render:v=><span style={{fontFamily:'Space Mono',fontSize:10}}>{v.toFixed(1)}%</span>},
  ];

  const COLS_COST=[
    {key:'name',label:'Fund',w:200,
      render:(v,r)=><div style={{fontSize:11,maxWidth:200}}>{v.length>38?v.slice(0,36)+'…':v}<div style={{fontSize:9,color:C.muted}}>{r.amc}</div></div>},
    {key:'balUnits',label:'Balance\nUnits',align:'right',mono:true,
      render:v=>v>0.001?<span style={{fontSize:10}}>{numFmt(v,3)}</span>:'—'},
    {key:'lastNav',label:'Last NAV\n(₹)',align:'right',mono:true,
      render:(v,r)=>(
        <div style={{textAlign:'right'}}>
          <div>{v?`₹${v.toFixed(3)}`:'—'}</div>
          <div style={{fontSize:9,color:C.muted}}>{r.navAtEndDate}</div>
        </div>
      )},
    {key:'costPerUnit',label:'Cost per\nUnit (₹)',align:'right',mono:true,render:v=>v>0?`₹${numFmt(v,3)}`:'—'},
    {key:'costBasis',label:'Total Cost\n(FIFO)',align:'right',mono:true,render:v=>FMT(v)},
    {key:'currentVal',label:'Current\nValue',align:'right',mono:true,render:v=><span style={{color:C.accent}}>{FMT(v)}</span>},
    {key:'unrealisedGain',label:'Unrealised\nGain',align:'right',mono:true,render:v=><span style={{color:gc(v)}}>{FMT(v)}</span>},
    {key:'realizedGain',label:'Realised\nGain',align:'right',mono:true,render:v=><span style={{color:gc(v)}}>{FMT(v)}</span>},
    {key:'dividends',label:'Dividends',align:'right',mono:true,render:v=>v>0?FMT(v):'—'},
    {key:'totalReturn',label:'Total\nReturn',align:'right',mono:true,render:v=><span style={{color:gc(v),fontWeight:700}}>{FMT(v)}</span>},
    {key:'returnPct',label:'Abs\nReturn',align:'right',render:v=>v!=null?<span style={{color:gc(v),fontFamily:'Space Mono',fontSize:11}}>{PCT(v,1)}</span>:'—'},
    {key:'xirrAllPct',label:'XIRR PA',align:'right',mono:true,render:v=>v!=null?<span style={{color:gc(v),fontWeight:700}}>{PCT(v,1)}</span>:'—'},
  ];

  const activeCols=colGroup==='returns'?COLS_RETURNS:colGroup==='risk'?COLS_RISK:COLS_COST;

  const downloadAll=()=>{
    const hdrs=['Fund','AMC','Category','Last NAV','NAV Date','Balance Units','Cost/Unit','Total Cost','Current Value',
      'Unrealised Gain','Realised Gain','Dividends','Total Return','Abs Return%','XIRR All%','XIRR Period%',
      'Mean PA%','StdDev PA%','Sharpe','Sortino','Beta','Alpha%','MaxDrawdown%','% Portfolio','Status'];
    const data=rows.map(r=>[r.name,r.amc,r.cls,r.lastNav??'',r.lastNavDate,r.balUnits??'',
      r.costPerUnit??'',r.costBasis,r.currentVal,r.unrealisedGain,r.realizedGain,r.dividends,r.totalReturn,
      r.returnPct?.toFixed(2)??'',r.xirrAllPct?.toFixed(2)??'',r.xirrPeriodPct?.toFixed(2)??'',
      r.meanReturnPct?.toFixed(2)??'',r.stdDevPct?.toFixed(2)??'',r.sharpe?.toFixed(3)??'',
      r.sortino?.toFixed(3)??'',r.beta?.toFixed(3)??'',r.alphaPct?.toFixed(2)??'',
      r.maxDrawdownPct?.toFixed(2)??'',r.pctPortfolio?.toFixed(2)??'',r.exited?'Exited':'Active']);
    downloadCSV(data,hdrs,`fund-overview_${toTS()}`);
  };

  const summaryRow={
    name:`TOTAL — ${rows.length} funds`,lastNav:'',lastNavDate:'',navAtEndDate:'',balUnits:'',costPerUnit:'',
    costBasis:totals.costBasis,currentVal:totals.currentVal,unrealisedGain:totals.unrealisedGain,
    realizedGain:totals.realizedGain,dividends:totals.dividends,totalReturn:totals.totalReturn,
    returnPct:totals.returnPct,pctPortfolio:100,
    xirrAllPct:null,xirrPeriodPct:null,meanReturnPct:null,stdDevPct:null,
    sharpe:null,sortino:null,beta:null,alphaPct:null,maxDrawdownPct:null,
  };

  const Tooltip=({term,children})=>(
    <span onClick={()=>openGlossary(term)}
      style={{cursor:'pointer',borderBottom:`1px dotted ${C.accent}66`,color:'inherit'}}
      title={`Click for definition of "${term}"`}>
      {children}
    </span>
  );

  return(
    <div style={{padding:'20px 24px'}}>
      {showGlossary&&<GlossaryModal focusTerm={focusTerm} onClose={()=>setShowGlossary(false)}/>}

      {/* Summary cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(155px,1fr))',gap:10,marginBottom:14}}>
        {[
          {l:'Total Invested',v:FMT(totals.invested),c:C.text,t:'Gross purchases'},
          {l:<Tooltip term="Total Cost (FIFO)">FIFO Cost Basis</Tooltip>,v:FMT(totals.costBasis),c:C.text,t:'Cost of held units'},
          {l:'Current Value',v:FMT(totals.currentVal),c:C.accent,t:'Latest NAV × units'},
          {l:<Tooltip term="Unrealised Gain">Unrealised Gain</Tooltip>,v:FMT(totals.unrealisedGain),c:totals.unrealisedGain>=0?C.green:C.red,t:'Value − Cost'},
          {l:<Tooltip term="Realised Gain">Realised Gain</Tooltip>,v:FMT(totals.realizedGain),c:totals.realizedGain>=0?C.green:C.red,t:'From sales (FIFO)'},
          {l:<Tooltip term="Total Return">Total Return</Tooltip>,v:FMT(totals.totalReturn),c:totals.totalReturn>=0?C.green:C.red,t:'Unrealised+Realised+Div'},
          {l:<Tooltip term="Return % (Abs)">Abs Return</Tooltip>,v:PCT(totals.returnPct,1),c:totals.returnPct>=0?C.green:C.red,t:'Total Return / Invested'},
        ].map(({l,v,c,t},i)=>(
          <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:9,padding:'11px 14px'}}>
            <div style={{fontSize:9,color:C.muted,marginBottom:4,fontFamily:'Space Mono'}}>{l}</div>
            <div style={{fontFamily:'Syne',fontSize:17,fontWeight:800,color:c,lineHeight:1}}>{v}</div>
            <div style={{fontSize:9,color:C.muted2,marginTop:3}}>{t}</div>
          </div>
        ))}
      </div>

      {/* Column group + actions */}
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:10,flexWrap:'wrap'}}>
        <div style={{fontFamily:'Syne',fontSize:14,fontWeight:700,color:'#fff',marginRight:8}}>Fund Detail</div>
        {[{k:'returns',l:'Returns & Value'},{k:'risk',l:'Risk Analytics'},{k:'cost',l:'Cost & Gains'}].map(({k,l})=>(
          <button key={k} className="btn" onClick={()=>setColGroup(k)}
            style={{padding:'5px 12px',borderRadius:6,fontSize:11,
              background:colGroup===k?`${C.accent}22`:'transparent',
              border:`1px solid ${colGroup===k?C.accent:C.border}`,
              color:colGroup===k?C.accent:C.muted}}>
            {l}
          </button>
        ))}
        <div style={{marginLeft:'auto',display:'flex',gap:6}}>
          <button className="btn" onClick={()=>setShowGlossary(true)}
            style={{padding:'5px 12px',background:`${C.amber}18`,border:`1px solid ${C.amber}44`,color:C.amber,borderRadius:6,fontSize:11,fontWeight:600}}>
            ℹ Term Definitions
          </button>
          <button className="btn" onClick={downloadAll}
            style={{padding:'5px 12px',background:'transparent',border:`1px solid ${C.border}`,color:C.muted,borderRadius:6,fontSize:11}}>
            ↓ CSV (All Columns)
          </button>
        </div>
      </div>

      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'12px 10px',overflowX:'auto'}}>
        <DataTable title={`${colGroup==='returns'?'Returns & Value':colGroup==='risk'?'Risk Analytics':'Cost & Gains'} (${rows.length} funds)`} columns={activeCols} rows={rows} filename={`fund-${colGroup}`}
          summaryRow={colGroup!=='risk'?summaryRow:undefined}/>
      </div>

      {/* Risk tab notes */}
      {colGroup==='risk'&&(
        <div style={{marginTop:10,padding:'10px 14px',background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,fontSize:10,color:C.muted,lineHeight:1.8}}>
          <strong style={{color:C.text}}>Risk Analytics Notes:</strong>&nbsp;
          Computed from <strong>full NAV history</strong> (not your holding period).
          Sharpe &amp; Sortino use <strong>7% risk-free rate</strong> (India PPF).
          Beta &amp; Alpha vs <strong>Nifty 50</strong>.
          <span style={{color:C.amber}}> ≤12mo = insufficient history (&lt;12 months of NAV data).</span>
          &nbsp;Colour coding: <span style={{color:C.green}}>■</span> Good &nbsp;<span style={{color:C.amber}}>■</span> Moderate &nbsp;<span style={{color:C.red}}>■</span> Poor.
          &nbsp;
          <span style={{color:C.muted2}}>P/E, Market Cap, Credit Rating, Equity:Debt require fund factsheet data not available via free APIs.</span>
          &nbsp;<button className="btn" onClick={()=>setShowGlossary(true)} style={{background:'none',border:'none',color:C.accent,cursor:'pointer',fontSize:10,textDecoration:'underline'}}>See full definitions</button>
        </div>
      )}

      {/* Footer notes */}
      <div style={{marginTop:10,padding:'8px 14px',background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,fontSize:10,color:C.muted,lineHeight:1.8}}>
        <span style={{color:C.amber}}>Last NAV</span> = end-of-day NAV (may lag 1–2 days). &nbsp;
        <span style={{color:C.accent}}>FIFO Cost</span> = cost of held units, oldest sold first. &nbsp;
        <span style={{color:C.green}}>XIRR PA</span> = annualised IRR of all cash flows (industry standard). &nbsp;
        Click any underlined term or <strong>ℹ Term Definitions</strong> for definitions.
      </div>
    </div>
  );
}


/* ══════════════════════════════════════════
   SECTION 9 — FUND PERFORMANCE PAGE
   • All selected benchmarks in columns + chart
   • Start date auto-adjusted to fund's first NAV date
   • All series normalised to 100 at common start
   • AUM track (fund size proxy via corpus from AMFI)
══════════════════════════════════════════ */
function FundPerformancePage({sortedTxns,navByScheme,sm,enabled,period,minDate,benchmarks,benchmarkData,returnBasis}){
  const today=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d;},[]);
  const [selectedFund,setSelectedFund]=useState(null);
  const [showAUM,setShowAUM]=useState(false);
  // AUM cache: amfiCode → [{date,aum}]
  const [aumData,setAumData]=useState({});

  const {start:periodStart,end}=useMemo(()=>getPeriodDates(period,minDate,today),[period,minDate,today]);

  const enabledArr=useMemo(()=>Array.from(enabled),[enabled]);

  // For each fund, compute the effective start = max(periodStart, fund's first NAV date)
  // so chart lines are only drawn where data exists
  const fundStartMap=useMemo(()=>{
    const m={};
    for(const name of enabledArr){
      const arr=navByScheme[name];
      const fundFirst=arr?.length?arr[0].d:periodStart;
      m[name]=fundFirst>periodStart?fundFirst:periodStart;
    }
    return m;
  },[enabledArr,navByScheme,periodStart]);

  // Common start = latest of all fund starts (for the selected fund comparison chart)
  const selectedName=selectedFund||enabledArr[0];
  const chartStart=useMemo(()=>{
    const fs=fundStartMap[selectedName]||periodStart;
    return fs;
  },[fundStartMap,selectedName,periodStart]);

  // Fetch AUM data from AMFI for a fund
  // One-shot AMFI NAVAll.txt cache (all funds, latest AUM+NAV per scheme)
  // Format per line: SchemeCode;ISINDiv;ISINGrowth;SchemeName;NetAssets;Date;NAV
  const amfiCacheRef=useRef({loaded:false,loading:false,byCode:{}});

  const fetchAUM=useCallback(async(name)=>{
    const code=sm[name]?.amfiCode;
    if(!code)return;
    if(aumData[code])return;

    // Load AMFI NAVAll.txt once per session (all 10k+ schemes in one shot)
    if(!amfiCacheRef.current.loaded&&!amfiCacheRef.current.loading){
      amfiCacheRef.current.loading=true;
      try{
        const res=await fetch('https://www.amfiindia.com/spages/NAVAll.txt',
          {signal:AbortSignal.timeout(25000)});
        if(res.ok){
          const txt=await res.text();
          const map={};
          for(const line of txt.split('\n')){
            const p=line.split(';');
            if(p.length<7)continue;
            const sc=p[0].trim();if(!sc||isNaN(Number(sc)))continue;
            const aum=p[4].trim()||null;
            const nav=parseFloat(p[6]);
            map[sc]={name:p[3].trim(),aum,nav:isNaN(nav)?null:nav,date:p[5].trim()};
          }
          amfiCacheRef.current.byCode=map;
          amfiCacheRef.current.loaded=true;
        }
      }catch(e){console.warn('AMFI NAVAll fetch failed:',e.message);}
      amfiCacheRef.current.loading=false;
    }
    // Wait briefly for loading to finish if concurrent
    if(amfiCacheRef.current.loading){
      await new Promise(r=>setTimeout(r,2000));
    }

    const entry=amfiCacheRef.current.byCode[code];
    if(entry){
      setAumData(prev=>({...prev,[code]:{
        scheme:entry.name,
        aum:entry.aum,       // ₹ crores or null if not disclosed
        lastNav:entry.nav,
        navDate:entry.date,
        source:'AMFI',
      }}));
    } else {
      // Fallback: mfapi meta + last NAV from our local navByScheme cache
      try{
        const res=await fetch(`https://api.mfapi.in/mf/${code}`,{signal:AbortSignal.timeout(8000)});
        if(!res.ok)return;
        const json=await res.json();
        if(json?.meta){
          const lastNav=json.data?.[0]?parseFloat(json.data[0].nav):null;
          const navDate=json.data?.[0]?.date??null;
          setAumData(prev=>({...prev,[code]:{
            scheme:json.meta.scheme_name,
            house:json.meta.fund_house,
            category:json.meta.scheme_category,
            aum:null,lastNav:isNaN(lastNav)?null:lastNav,
            navDate,source:'mfapi',
          }}));
        }
      }catch{}
    }
  },[sm,aumData]);

  useEffect(()=>{
    if(showAUM&&selectedName)fetchAUM(selectedName);
  },[showAUM,selectedName,fetchAUM]);

  const rows=useMemo(()=>{
    return enabledArr.map(name=>{
      const fs=fundStartMap[name]||periodStart;
      const periodX=computeXirrForScheme(name,end,fs,sortedTxns,navByScheme);
      const allX=computeXirrForScheme(name,end,null,sortedTxns,navByScheme);
      const ppfB=benchmarks.find(b=>b.id==='ppf');
      const ppfRate=ppfB?.enabled?ppfB.rate:0.071;
      // PPF annualised = the rate itself (it's already defined p.a.) — consistent with fund XIRR
      const ppfPeriodReturn=ppfRate*100;
      const row={name,periodXirr:periodX!=null?periodX*100:null,allTimeXirr:allX!=null?allX*100:null,ppfPeriod:ppfPeriodReturn,
        fundStart:toISO(fs)};
      // All enabled benchmarks — annualised CAGR for fair comparison with fund XIRR
      for(const b of benchmarks.filter(x=>x.enabled&&isNavBm(x))){
        const bd=benchmarkData[b.id];
        if(bd){
          const sn=getNav(bd,fs),en2=getNav(bd,end);
          if(sn&&en2&&sn>0){
            const yrs=(end-fs)/YMS;
            // CAGR: annualised return = (en2/sn)^(1/yrs) - 1
            row[`bench_${b.id}`]=yrs>0.05?(Math.pow(en2/sn,1/yrs)-1)*100:(en2/sn-1)*100;
          } else {
            row[`bench_${b.id}`]=null;
          }
        }
      }
      const niftyReturn=row['bench_nifty50'];
      row.beatNifty=periodX!=null&&niftyReturn!=null?periodX*100>niftyReturn:null;
      row.alpha=periodX!=null&&niftyReturn!=null?periodX*100-niftyReturn:null;
      // Add fund NAV info
      const navArr=navByScheme[name];
      row.lastNav=navArr?.length?navArr[navArr.length-1].v:null;
      row.lastNavDate=navArr?.length?toISO(navArr[navArr.length-1].d):null;
      // Cost-basis return%
      const{costBasis,realizedGain}=computeFIFO(name,end,sortedTxns);
      const{invested:fpInv,redeemed:fpRed}=computeInvested(end,sortedTxns,new Set([name]));
      const fpBal=schemeUnits(name,end,sortedTxns);
      const fpNav=getNav(navByScheme[name],end);
      const fpCurVal=fpNav&&fpBal>0.001?fpBal*fpNav:0;
      const fpTotReturn=(fpCurVal-costBasis)+realizedGain;
      const fpNet=fpInv-fpRed;
      const fpDenom=returnBasis==='gross'?fpInv:returnBasis==='net'?fpNet:costBasis;
      row.absReturnPct=fpDenom!==0?fpTotReturn/Math.abs(fpDenom)*100:null;
      row.costBasis=costBasis;
      return row;
    });
  },[enabledArr,sortedTxns,navByScheme,periodStart,end,benchmarks,benchmarkData,fundStartMap,returnBasis]);

  // Chart: selected fund vs all enabled benchmarks + PPF, normalised at common start
  const fundChartSeries=useMemo(()=>{
    if(!selectedName||!navByScheme[selectedName])return{primary:[],navAxis:[],navLabel:''};
    const navArr=navByScheme[selectedName];
    const step=Math.max(1,Math.ceil((end-chartStart)/MS/200));
    const fundData=[],ppfData=[];
    const benchChartData={};
    for(const b of benchmarks.filter(x=>x.enabled&&isNavBm(x)))benchChartData[b.id]=[];

    const startFundNav=getNav(navArr,chartStart);
    if(!startFundNav)return[];

    // Pre-compute per-benchmark effective start NAV (first available ≥ chartStart)
    const bmEffStart={};
    for(const b of benchmarks.filter(x=>x.enabled&&isNavBm(x))){
      const bd=benchmarkData[b.id];
      if(!bd?.length)continue;
      // Find first data point on or after chartStart
      const eff=bd.find(p=>p.d>=chartStart)||bd[0];
      bmEffStart[b.id]={date:eff.d, nav:eff.v};
    }

    for(let cur=new Date(chartStart);cur<=end;cur=addDays(cur,step)){
      const nav=getNav(navArr,cur);
      if(nav)fundData.push({x:new Date(cur),y:(nav/startFundNav-1)*100});
      const d2=(cur.getTime()-chartStart.getTime())/MS;
      const ppfRate=benchmarks.find(b=>b.id==='ppf'&&b.enabled)?.rate||0.071;
      ppfData.push({x:new Date(cur),y:(Math.pow(1+ppfRate,d2/365.25)-1)*100});
      for(const b of benchmarks.filter(x=>x.enabled&&isNavBm(x))){
        const bd=benchmarkData[b.id];
        const eff=bmEffStart[b.id];
        if(!bd||!eff)continue;
        if(new Date(cur)<eff.date)continue; // benchmark data not yet started — skip
        // cn: use last available nav if cur is beyond data end (weekend/holiday)
        const cn=getNav(bd,cur)??bd[bd.length-1].v;
        if(eff.nav>0)benchChartData[b.id].push({x:new Date(cur),y:(cn/eff.nav-1)*100});
      }
    }

    const series=[{label:selectedName.slice(0,30),color:C.green,data:fundData,width:2.5}];
    const ppfB=benchmarks.find(b=>b.id==='ppf'&&b.enabled);
    if(ppfB&&ppfData.some(p=>p.y!=null))series.push({label:'PPF',color:ppfB.color,data:ppfData,dash:'5 4',width:1.5,opacity:0.8});
    for(const b of benchmarks.filter(x=>x.enabled&&isNavBm(x))){
      if(benchChartData[b.id]?.length)series.push({label:b.label,color:b.color,data:benchChartData[b.id],dash:'3 2',width:1.5,opacity:0.8});
    }

    // Secondary axis (right): raw NAV of selected fund — scale is ₹, not %
    const navAxisSeries=navArr.filter(p=>p.d>=chartStart&&p.d<=end)
      .map(p=>({x:p.d instanceof Date?p.d:new Date(p.d),y:p.v}));

    return {primary:series, navAxis:navAxisSeries, navLabel:'NAV (₹)'};
  },[selectedName,navByScheme,chartStart,end,benchmarks,benchmarkData]);

  // Build dynamic columns: fixed columns + one per enabled market benchmark
  const mktBenchs=useMemo(()=>benchmarks.filter(x=>x.enabled&&isNavBm(x)),[benchmarks]);
  const cols=useMemo(()=>[
    {key:'name',label:'Fund',render:(v)=>(
      <button className="btn" onClick={()=>setSelectedFund(v)}
        style={{background:'none',border:'none',color:C.accent,textDecoration:'underline',cursor:'pointer',fontSize:11,padding:0,textAlign:'left',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'block'}}>
        {v.slice(0,32)}
      </button>
    )},
    {key:'fundStart',label:'Start Date',render:v=><span style={{fontFamily:'Space Mono',fontSize:10,color:C.muted}}>{v||'—'}</span>},
    {key:'periodXirr',label:'XIRR (Period)',render:v=>v!=null?<span style={{color:v>=0?C.green:C.red,fontFamily:'Space Mono',fontSize:11,fontWeight:700}}>{PCT(v,2)}</span>:'—',align:'right'},
    {key:'allTimeXirr',label:'XIRR (All-time)',render:v=>v!=null?<span style={{color:v>=0?C.green:C.red,fontFamily:'Space Mono',fontSize:11}}>{PCT(v,2)}</span>:'—',align:'right'},
    {key:'ppfPeriod',label:'PPF p.a.',render:v=>v!=null?<span style={{color:C.muted,fontFamily:'Space Mono',fontSize:10}}>{PCT(v,1)}</span>:'—',align:'right'},
    ...mktBenchs.map(b=>({
      key:`bench_${b.id}`,
      label:b.label.slice(0,13)+' p.a.',
      render:v=>v!=null?<span style={{color:v>=12?C.green:v>=7?C.amber:C.muted2,fontFamily:'Space Mono',fontSize:10}}>{PCT(v,1)}</span>:'—',
      align:'right',
    })),
    {key:'absReturnPct',label:`Abs Return\n(vs ${(returnBasis||'book')==='book'?'Book':'Net or Gross'})`  ,
    render:v=>v!=null?<span style={{color:v>=0?C.green:C.red,fontFamily:'Space Mono',fontSize:10}}>{v>=0?'+':''}{v.toFixed(1)}%</span>:'—'},
    {key:'alpha',label:'vs Nifty',render:v=>v!=null?<span style={{color:v>=0?C.green:C.red,fontFamily:'Space Mono',fontSize:11,fontWeight:700}}>{PCT(v,2)}</span>:'—',align:'right'},
    {key:'beatNifty',label:'Beat?',render:v=>v==null?'—':<span style={{color:v?C.green:C.red,fontSize:11}}>{v?'✓':'✗'}</span>,align:'center'},
    {key:'lastNav',label:'Last NAV',render:(v,row)=>v!=null?<span style={{fontFamily:'Space Mono',fontSize:10,color:C.muted}}>{v.toFixed(2)}<br/><span style={{fontSize:9,color:C.muted2}}>{row?.lastNavDate}</span></span>:'—',align:'right'},
  ],[mktBenchs]);

  // AUM info panel for selected fund
  const aumInfo=aumData[sm[selectedName]?.amfiCode];

  return(
    <div style={{padding:'20px 24px'}}>
      {/* Chart + fund selector */}
      {fundChartSeries.primary?.length>0&&(
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'16px',marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4,flexWrap:'wrap',gap:8}}>
            <div>
              <div style={{fontFamily:'Syne',fontSize:13,fontWeight:700,color:'#fff'}}>{selectedName?.slice(0,50)||'Select a fund'}</div>
              <div style={{fontSize:10,color:C.muted,marginTop:2}}>
                Normalised to 0% at <strong style={{color:C.accent}}>{toISO(chartStart)}</strong> (fund's first available NAV in period)
                · All benchmarks start from same date · Click fund name in table to switch
              </div>
            </div>
            <div style={{display:'flex',gap:6}}>
              <button className="btn" onClick={()=>setShowAUM(p=>!p)}
                style={{padding:'4px 10px',background:showAUM?`${C.teal}22`:'transparent',border:`1px solid ${showAUM?C.teal:C.border}`,color:showAUM?C.teal:C.muted,borderRadius:5,fontSize:10}}>
                ℹ Fund Info
              </button>
            </div>
          </div>
          {showAUM&&(
            <div style={{marginBottom:10,padding:'10px 14px',background:C.surface,borderRadius:8,border:`1px solid ${C.border}`,fontSize:11}}>
              {aumInfo?(
                <div style={{display:'flex',gap:18,flexWrap:'wrap',alignItems:'center'}}>
                  <span style={{color:C.muted,maxWidth:320,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                    <strong style={{color:C.text}}>Scheme: </strong>{aumInfo.scheme?.slice(0,52)||aumInfo.house||'—'}
                  </span>
                  {aumInfo.aum?(
                    <span style={{fontFamily:'Space Mono'}}>
                      <strong style={{color:C.teal}}>AUM: </strong>
                      <span style={{color:C.green,fontWeight:700}}>
                        ₹{parseFloat(aumInfo.aum).toLocaleString('en-IN',{maximumFractionDigits:0})} Cr
                      </span>
                    </span>
                  ):(
                    <span style={{color:C.muted2,fontStyle:'italic'}}>AUM not disclosed by AMC</span>
                  )}
                  {aumInfo.lastNav&&(
                    <span style={{fontFamily:'Space Mono'}}>
                      <strong style={{color:C.text}}>NAV: </strong>
                      <span style={{color:C.accent}}>₹{Number(aumInfo.lastNav).toFixed(4)}</span>
                      {aumInfo.navDate&&<span style={{color:C.muted2,fontSize:9,marginLeft:4}}>({aumInfo.navDate})</span>}
                    </span>
                  )}
                  <span style={{color:C.muted2,fontSize:9,marginLeft:'auto'}}>
                    Source: {aumInfo.source==='AMFI'?'AMFI NAVAll.txt (live)':'mfapi.in (fallback)'}
                  </span>
                </div>
              ):(
                <span style={{color:C.muted,display:'flex',gap:8,alignItems:'center'}}>
                  <span style={{display:'inline-block',animation:'spin 1.2s linear infinite'}}>⟳</span>
                  Fetching fund data from AMFI…
                </span>
              )}
            </div>
          )}
          <LineChart series={fundChartSeries.primary}
            navSeries={fundChartSeries.navAxis}
            navSeriesLabel={fundChartSeries.navLabel}
            title="" subtitle=""
            chartId="fund-vs-benchmark" width={860} height={300}/>
          <div style={{marginTop:6,fontSize:9,color:C.muted2,lineHeight:1.7}}>
            <strong style={{color:C.text}}>Left axis (%):</strong> NAV-based total return from each series' first available date in period — all start at 0%.
            Benchmarks added via "Add Benchmark" normalise from their earliest available data point, not necessarily the same date as the fund.
            &nbsp;<strong style={{color:'#7c9cc0'}}>Right axis (₹):</strong> Raw NAV of the selected fund (secondary scale, grey dashes).
          </div>
        </div>
      )}

      {/* Table */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'16px'}}>
        <DataTable columns={cols} rows={rows} title="Fund vs Benchmarks (all selected)" filename="fund-performance"/>
        <div style={{fontSize:10,color:C.muted,marginTop:8,lineHeight:1.8}}>
          <strong style={{color:C.text}}>Start Date</strong> = fund's first NAV date in the selected period (chart is normalised to 0% at this date for each fund).
          &nbsp;<strong style={{color:C.text}}>Period XIRR</strong> = annualised IRR using actual cash flows within the period window.
          &nbsp;Benchmark columns show <strong>simple NAV-based return</strong> for the same period.
          &nbsp;To add/remove benchmarks: go to <strong style={{color:C.accent}}>Settings → Benchmarks</strong>.
        </div>
      </div>
    </div>
  );
}

const TX_TYPES=['Investment in fund','SIP Investment','Switch Investment','Switch Redemption','Sell/Redemption','Dividend','Dividend Reinvestment'];

/* ══════════════════════════════════════════
   SECTION 10 — SETTINGS PAGE
   Full transaction management: add, delete, filter, CSV download
   Settings export as JSON + CSV
══════════════════════════════════════════ */
function SettingsPage({allTxns,setAllTxns,sm,setSm,navByScheme,setNavByScheme,benchmarks,setBenchmarks,country,setCountry,displayCurrency,setDisplayCurrency,displayUnit,setDisplayUnit,displayFmt,applyDisplayFmt,returnBasis,setReturnBasis,currentUserId,navRefreshInterval,setNavRefreshInterval,navStatus,navLastFetched,onRefreshNow,onNewAnalysis,analyticsMap,fsHandle,pickFolder,saveToFolder,fsStatus,benchmarkData}){
  const [showAddModal,setShowAddModal]=useState(false);
  const [editTx,setEditTx]=useState(null); // null=add mode, obj=edit mode
  const [newTx,setNewTx]=useState({date:'',scheme:'',txType:'Investment in fund',amount:'',units:'',price:'',folioId:''});
  const [txError,setTxError]=useState('');
  const [navLookup,setNavLookup]=useState(null); // {nav, date} from auto-lookup
  const [showAddBmModal,setShowAddBmModal]=useState(false);
  const [newBm,setNewBm]=useState({label:'',source:'mfapi',amfiCode:'',ticker:'',searchQuery:'',searchResults:[],searching:false,color:''});
  const [txFilter,setTxFilter]=useState('');
  const [fundFilter,setFundFilter]=useState('');
  const [txSort,setTxSort]=useState({col:'date',dir:-1});
  const [showAll,setShowAll]=useState(false);
  const fileInputRef=useRef();
  const [smEditRow,setSmEditRow]=useState(null);
  const [smEditQ,setSmEditQ]=useState('');
  const [smEditRes,setSmEditRes]=useState([]);
  const [smEditLoading,setSmEditLoading]=useState(false);
  const [smEditFetching,setSmEditFetching]=useState('');
  const today=new Date();
  const allSchemes=[...new Set(allTxns.map(t=>t.scheme))].sort();

  // Inline scheme mapping — live search
  const smEditSearch=useCallback((q,scheme)=>{
    setSmEditQ(q);setSmEditRow(scheme);setSmEditRes([]);
    if(!q||q.length<2)return;
    setSmEditLoading(true);
    fetch("https://api.mfapi.in/mf/search?q="+encodeURIComponent(q.slice(0,50)),{signal:AbortSignal.timeout(6000)})
      .then(r=>r.json()).then(d=>{setSmEditRes((d||[]).slice(0,8).map(x=>({code:String(x.schemeCode),name:x.schemeName})));})
      .catch(()=>{}).finally(()=>setSmEditLoading(false));
  },[]);

  const smEditPick=useCallback((scheme,code,name)=>{
    // Clear old (possibly wrong) NAV immediately so pages don't show stale values
    setNavByScheme(p=>{const n={...p};delete n[scheme];return n;});
    setSm(p=>({...p,[scheme]:{...p[scheme],amfiCode:code,amfiName:name,status:'mapped',method:'manual'}}));
    setSmEditRow(null);setSmEditQ('');setSmEditRes([]);
    setSmEditFetching(scheme);
    fetch("https://api.mfapi.in/mf/"+code,{signal:AbortSignal.timeout(20000)})
      .then(r=>r.json()).then(d=>{
        if(d&&d.data&&d.data.length){
          // Use the meta.scheme_name from MFAPI as the confirmed name
          const confirmedName=d.meta&&d.meta.scheme_name?d.meta.scheme_name:name;
          setNavByScheme(p=>({...p,[scheme]:buildNav(d.data)}));
          setSm(p=>({...p,[scheme]:{...p[scheme],amfiName:confirmedName}}));
        }
      }).catch(()=>{}).finally(()=>setSmEditFetching(''));
  },[setSm,setNavByScheme]);

  // Auto-lookup NAV for a scheme on a given date
  // Uses functional setState to avoid stale closure issues
  const autoLookupNav=useCallback((scheme,dateStr)=>{
    if(!scheme||!dateStr)return;
    const navArr=navByScheme[scheme];
    if(!navArr?.length){setNavLookup(null);return;}
    const d=fromISO(dateStr);
    if(!d){setNavLookup(null);return;}
    const nav=getNav(navArr,d);
    if(nav&&nav>0){
      setNavLookup({nav,date:dateStr});
      // Fill NAV/price field; compute units from current amount if units not set
      setNewTx(p=>{
        const newPrice=p.price&&parseFloat(p.price)>0?p.price:nav.toFixed(4);
        const effectiveNav=parseFloat(newPrice)||nav;
        const newUnits=(p.units&&parseFloat(p.units)>0)?p.units
          :(p.amount&&parseFloat(p.amount)>0?(parseFloat(p.amount)/effectiveNav).toFixed(4):'');
        return{...p,price:newPrice,units:newUnits};
      });
    } else {
      setNavLookup(null);
    }
  },[navByScheme]);

  const autoComputeUnits=useCallback((amountStr,priceStr)=>{
    const amount=parseFloat(amountStr),price=parseFloat(priceStr);
    if(amount>0&&price>0){
      const u=(amount/price).toFixed(4);
      setNewTx(p=>{
        // Only auto-fill units if not manually set (or set to 0)
        if(p.units&&parseFloat(p.units)>0)return p;
        return{...p,units:u};
      });
    }
  },[]);

  const openAddModal=()=>{
    setEditTx(null);
    setNewTx({date:'',scheme:fundFilter||'',txType:'Investment in fund',amount:'',units:'',price:'',folioId:''});
    setNavLookup(null);setTxError('');setShowAddModal(true);
  };

  const openEditModal=(t)=>{
    setEditTx(t);
    setNewTx({date:toISO(t.date),scheme:t.scheme,txType:t.txType,
      amount:String(Math.abs(t.amount||0)),
      units:String(Math.abs(t.units||0)),
      price:String(t.price||0),
      folioId:t.folioId||''});
    setNavLookup(null);setTxError('');setShowAddModal(true);
  };

  const saveTransaction=()=>{
    if(!newTx.date||!newTx.scheme){setTxError('Date and scheme are required');return;}
    const date=fromISO(newTx.date);
    if(!date){setTxError('Invalid date');return;}
    // Amount is always stored as absolute value; sign is conveyed by txType via clf()
    const amount=Math.abs(parseFloat(newTx.amount)||0);
    const units=Math.abs(parseFloat(newTx.units)||0);
    const price=Math.abs(parseFloat(newTx.price)||0);
    if(amount<0.01&&units<0.00001){setTxError('Enter amount or units (must be > 0)');return;}
    // Derive missing fields
    const derivedUnits=units>0?units:(price>0&&amount>0?amount/price:0);
    const derivedPrice=price>0?price:(derivedUnits>0&&amount>0?amount/derivedUnits:0);
    const derivedAmount=amount>0?amount:(derivedPrice>0&&derivedUnits>0?derivedPrice*derivedUnits:0);
    if(editTx){
      const updated={...editTx,date,txType:newTx.txType,scheme:newTx.scheme,
        amount:derivedAmount,units:derivedUnits,price:derivedPrice,
        // balUnits kept for CAMS display compatibility but analytics use _accumUnits
        balUnits:editTx.balUnits,
        source:'manual-edit'};
      setAllTxns(prev=>prev.map(t=>t.id===editTx.id?updated:t).sort((a,b)=>{
        const at=a.date instanceof Date?a.date.getTime():new Date(a.date).getTime();
        const bt=b.date instanceof Date?b.date.getTime():new Date(b.date).getTime();
        return at-bt;
      }));
    } else {
      const tx={id:`manual-${Date.now()}`,date,scheme:newTx.scheme,txType:newTx.txType,
        amount:derivedAmount,units:derivedUnits,price:derivedPrice,
        balUnits:0,// analytics use _accumUnits; balUnits=0 for manual entries
        isin:'',mv:0,folioId:newTx.folioId||'manual',source:'manual'};
      setAllTxns(prev=>[...prev,tx].sort((a,b)=>{
        const at=a.date instanceof Date?a.date.getTime():new Date(a.date).getTime();
        const bt=b.date instanceof Date?b.date.getTime():new Date(b.date).getTime();
        return at-bt;
      }));
    }
    if(!editTx&&newTx.scheme&&(!navByScheme[newTx.scheme]||!navByScheme[newTx.scheme].length)){
      const _inf=sm[newTx.scheme];
      if(_inf&&_inf.amfiCode){fetch("https://api.mfapi.in/mf/"+_inf.amfiCode,{signal:AbortSignal.timeout(15000)}).then(r=>r.json()).then(d=>{if(d&&d.data&&d.data.length)setNavByScheme(p=>({...p,[newTx.scheme]:buildNav(d.data)}));}).catch(()=>{});}
    }
    setShowAddModal(false);setEditTx(null);
    setNewTx({date:'',scheme:'',txType:'Investment in fund',amount:'',units:'',price:'',folioId:''});
    setNavLookup(null);setTxError('');
  };

  const deleteTransaction=(id)=>{
    if(!window.confirm('Delete this transaction? This cannot be undone.'))return;
    setAllTxns(prev=>prev.filter(t=>t.id!==id));
  };

  const saveToJSON=()=>{
    // Fund NAV cache (scheme → [{date,nav}])
    const navCache=Object.fromEntries(Object.entries(navByScheme).map(([k,arr])=>[k,arr.map(pt=>({date:toISO(pt.d),nav:pt.v.toFixed(4)}))]));
    // Benchmark NAV series (id → [{date,nav}]) — serialised so import avoids re-fetch
    const bmCache={};
    for(const[id,arr] of Object.entries(benchmarkData||{})){
      if(arr?.length)bmCache[id]=arr.map(pt=>({date:toISO(pt.d instanceof Date?pt.d:new Date(pt.d)),nav:Number(pt.v||pt.nav||0).toFixed(4)}));
    }
    const data={
      version:'5.286',
      exportDate:new Date().toISOString(),
      transactions:allTxns.map(t=>({...t,date:t.date instanceof Date?toISO(t.date):t.date})),
      schemeMapping:sm,
      navByScheme:navCache,
      benchmarkNavCache:bmCache,      // ← benchmark NAV history
      benchmarks,
      country,displayCurrency,displayUnit,navRefreshInterval,
      discountRate,                   // ← discount rate setting
      enabled:[...enabled],           // ← which funds are toggled on
      period,                         // ← selected period
    };
    downloadJSON(data,`mf-advisor_${toTS()}.json`);
  };

  const saveTransactionsCSV=()=>{
    const hdrs=['ID','Date','Scheme','ISIN','Transaction Type','Amount (₹)','Units','Price/NAV','Balance Units','Folio ID','Source'];
    const data=allTxns.map(t=>[t.id,toISO(t.date),t.scheme,t.isin||'',t.txType,Math.abs(t.amount||0),t.units||0,t.price||0,t.balUnits||0,t.folioId||'',t.source||'import']);
    downloadCSV(data,hdrs,`transactions_${toTS()}`);
  };

  const saveSchemeMappingCSV=()=>{
    const hdrs=['Scheme Name','AMFI Code','Mapped Name','Method','Status'];
    const data=Object.entries(sm).map(([name,info])=>[name,info.amfiCode||'',info.mappedName||'',info.method||'',info.status||'']);
    downloadCSV(data,hdrs,`scheme-mapping_${toTS()}`);
  };

  // Bulk upload: scheme mapping CSV (columns: Scheme Name, AMFI Code, Mapped Name)
  const bulkUploadSchemeMapping=useCallback(e=>{
    const file=e.target.files[0];if(!file)return;e.target.value='';
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const rows=ev.target.result.trim().split('\n');
        if(rows.length<2){alert('Need a header row + data rows.');return;}
        const pr=l=>{const c=[];let s='',q=false;for(const ch of l){if(ch==='"'){q=!q;}else if(ch===','&&!q){c.push(s.trim());s='';}else s+=ch;}c.push(s.trim());return c;};
        const hdrs=pr(rows[0]).map(h=>h.replace(/"/g,'').toLowerCase());
        const iS=hdrs.findIndex(h=>h.includes('scheme'));
        const iC=hdrs.findIndex(h=>h.includes('amfi')||h.includes('code'));
        const iN=hdrs.findIndex(h=>h.includes('mapped')||h.includes('name'));
        if(iS<0||iC<0){alert('CSV needs columns: "Scheme Name" and "AMFI Code"\n\nDownload the current mapping first to see the format.');return;}
        let ok=0,skip=0,toFetch=[];
        const upd={...sm};
        for(let i=1;i<rows.length;i++){
          const r=pr(rows[i]);
          const scheme=(r[iS]||'').replace(/"/g,'').trim();
          const code=(r[iC]||'').replace(/"/g,'').trim();
          const mname=iN>=0?(r[iN]||'').replace(/"/g,'').trim():'';
          if(!scheme||!code){skip++;continue;}
          upd[scheme]={...(upd[scheme]||{}),amfiCode:code,amfiName:mname||code,status:'mapped',method:'bulk-csv'};
          if(!navByScheme[scheme]||!navByScheme[scheme].length)toFetch.push({scheme,code});
          ok++;
        }
        setSm(upd);
        // Always clear and re-fetch NAV for ALL remapped schemes (old data may be wrong)
        const allMapped=Object.entries(upd).filter(([,v])=>v.method==='bulk-csv'&&v.amfiCode);
        // Clear old NAV for all remapped schemes
        setNavByScheme(p=>{const n={...p};allMapped.forEach(([s])=>delete n[s]);return n;});
        // Fetch fresh NAV + confirmed name from MFAPI for each
        allMapped.forEach(([scheme,info])=>{
          fetch("https://api.mfapi.in/mf/"+info.amfiCode,{signal:AbortSignal.timeout(20000)})
            .then(r=>r.json()).then(d=>{
              if(d&&d.data&&d.data.length){
                const confirmedName=d.meta&&d.meta.scheme_name?d.meta.scheme_name:info.amfiName;
                setNavByScheme(p=>({...p,[scheme]:buildNav(d.data)}));
                setSm(p=>p[scheme]?{...p,[scheme]:{...p[scheme],amfiName:confirmedName}}:p);
              }
            }).catch(()=>{});
        });
        alert(ok+' schemes mapped'+(skip?' | '+skip+' rows skipped':'')+(allMapped.length?' | Fetching NAV for '+allMapped.length+' fund(s) in background — values will update shortly…':''));
      }catch(ex){alert('CSV error: '+ex.message);}
    };
    reader.readAsText(file);
  },[sm,navByScheme,setSm,setNavByScheme]);

  // Bulk upload: transactions CSV (columns: Date, Scheme, Transaction Type, Amount, Units, Price)
  const bulkUploadTransactionsCSV=useCallback(e=>{
    const file=e.target.files[0];if(!file)return;e.target.value='';
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const rows=ev.target.result.trim().split('\n');
        if(rows.length<2){alert('Need a header row + data rows.');return;}
        const pr=l=>{const c=[];let s='',q=false;for(const ch of l){if(ch==='"'){q=!q;}else if(ch===','&&!q){c.push(s.trim());s='';}else s+=ch;}c.push(s.trim());return c;};
        const hdrs=pr(rows[0]).map(h=>h.replace(/"/g,'').toLowerCase());
        const ci=(...ks)=>{const k=ks.find(k2=>hdrs.findIndex(h=>h.includes(k2))>=0);return k!=null?hdrs.findIndex(h=>h.includes(k)):-1;};
        const iDate=ci('date'),iScheme=ci('scheme','fund'),iType=ci('type','txtype'),iAmt=ci('amount','amt'),iUnits=ci('units','unit','qty'),iNav=ci('nav','price'),iFolio=ci('folio');
        if(iDate<0||iScheme<0){alert('CSV needs at least "Date" and "Scheme" columns.\n\nSupported columns:\nDate, Scheme, Transaction Type, Amount, Units, Price/NAV, Folio ID\n\nDownload Transactions CSV first to see the format.');return;}
        const txMap={'buy':'Investment in fund','invest':'Investment in fund','purchase':'Investment in fund','sip':'Investment in fund','sell':'Redemption','redeem':'Redemption','redemption':'Redemption','swp':'Redemption','dividend':'Dividend','bonus':'Bonus units','switch in':'Investment in fund','switch out':'Redemption'};
        const toType=v=>{if(!v)return'Investment in fund';const lv=v.toLowerCase().trim();for(const[k,tv]of Object.entries(txMap))if(lv.includes(k))return tv;return v;};
        const added=[],bad=[];
        for(let i=1;i<rows.length;i++){
          const r=pr(rows[i]);
          const scheme=(r[iScheme]||'').replace(/"/g,'').trim();if(!scheme)continue;
          const ds=(r[iDate]||'').replace(/"/g,'').trim();
          const date=fromISO(ds)||new Date(ds);
          if(!date||isNaN(date.getTime())){bad.push(i+1);continue;}
          const amt=Math.abs(parseFloat(String(r[iAmt]||'0').replace(/[", ]/g,''))||0);
          const units=Math.abs(parseFloat(String(r[iUnits]||'0').replace(/[", ]/g,''))||0);
          const price=Math.abs(parseFloat(String(r[iNav]||'0').replace(/[", ]/g,''))||0);
          const folio=iFolio>=0?(r[iFolio]||'csv').replace(/"/g,'').trim():'csv';
          if(amt<0.01&&units<0.00001){bad.push(i+1);continue;}
          added.push({id:'csv-'+Date.now()+'-'+i,date,scheme,isin:'',txType:toType(iType>=0?r[iType]:''),amount:amt,units,price,balUnits:0,mv:0,folioId:folio,source:'csv-bulk'});
        }
        if(!added.length){alert('No valid rows found.'+(bad.length?' '+bad.length+' rows had invalid date or missing amount/units.':''));return;}
        const existKeys=new Set(allTxns.map(t=>toISO(t.date instanceof Date?t.date:new Date(t.date))+'|'+t.scheme+'|'+t.txType+'|'+Math.round(Math.abs(t.amount||0))));
        const newT=added.filter(t=>{const k=toISO(t.date)+'|'+t.scheme+'|'+t.txType+'|'+Math.round(t.amount);return!existKeys.has(k);});
        const dupes=added.length-newT.length;
        setAllTxns(prev=>[...prev,...newT].sort((a,b)=>(a.date instanceof Date?a.date.getTime():new Date(a.date).getTime())-(b.date instanceof Date?b.date.getTime():new Date(b.date).getTime())));
        alert(newT.length+' transactions added'+(dupes?' | '+dupes+' duplicates skipped':'')+(bad.length?' | '+bad.length+' rows skipped':''));
      }catch(ex){alert('CSV error: '+ex.message);}
    };
    reader.readAsText(file);
  },[allTxns,setAllTxns]);

  // F008: Incremental XLS/CSV append with deduplication
  const appendXLS=useCallback((e)=>{
    const f=e.target.files[0];if(!f)return;e.target.value='';
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb2=XLSX.read(ev.target.result,{type:'array',cellDates:false});
        const ws2=wb2.Sheets[wb2.SheetNames[0]];
        const raw=XLSX.utils.sheet_to_json(ws2,{header:1,defval:''});
        const newTxns=parseAnyFile(ev.target.result,f.name);
        if(!newTxns.length){alert('No valid transactions found in file.');return;}
        setAllTxns(prev=>{
          const existKeys=new Set(prev.map(t=>
            toISO(t.date instanceof Date?t.date:new Date(t.date))+'|'+t.scheme+'|'+t.txType+'|'+Math.round(Math.abs(t.amount||0))
          ));
          const added=newTxns.filter(t=>{
            const k=toISO(t.date instanceof Date?t.date:new Date(t.date))+'|'+t.scheme+'|'+t.txType+'|'+Math.round(Math.abs(t.amount||0));
            return!existKeys.has(k);
          });
          const merged=[...prev,...added].sort((a,b)=>{
            const at=a.date instanceof Date?a.date.getTime():new Date(a.date).getTime();
            const bt=b.date instanceof Date?b.date.getTime():new Date(b.date).getTime();
            return at-bt;
          });
          alert(added.length+' new transactions added ('+newTxns.length+' in file, '+(newTxns.length-added.length)+' duplicates skipped).');
          return merged;
        });
      }catch(err){alert('Import error: '+err.message);}
    };
    reader.readAsArrayBuffer(f);
  },[]);

  const [validationErrors,setValidationErrors]=useState([]);
  const [showValidation,setShowValidation]=useState(false);
  const [dismissedVE,setDismissedVE]=useState([]);
  const [veFilter,setVeFilter]=useState('all');

  const runValidation=useCallback(()=>{
    const errs=[];
    const today2=new Date();today2.setHours(23,59,59,999);
    const seen=new Map();
    allTxns.forEach((t,idx)=>{
      const dateObj=t.date instanceof Date?t.date:new Date(t.date);
      const dateStr=toISO(dateObj);
      if(dateObj>today2)errs.push({idx,id:t.id,scheme:t.scheme,date:dateStr,type:'other',msg:'Future date'});
      const hasAmt=(t.amount||0)>0.01,hasUnits=(t.units||0)>0.00001;
      if(!hasAmt&&!hasUnits)errs.push({idx,id:t.id,scheme:t.scheme,date:dateStr,type:'other',msg:'Missing amount and units'});
      if(!navByScheme[t.scheme]?.length&&t.source!=='ppf')errs.push({idx,id:t.id,scheme:t.scheme,date:dateStr,type:'nav',msg:'No NAV data for scheme'});
      if(t.price>0&&hasAmt&&hasUnits){
        const impl=Math.abs(t.amount)/Math.abs(t.units);
        const diff=Math.abs(impl-t.price)/t.price;
        if(diff>0.10)errs.push({idx,id:t.id,scheme:t.scheme,date:dateStr,type:'mismatch',msg:'NAV mismatch '+PCT(diff*100,1)});
      }
      const fp=dateStr+'|'+t.scheme+'|'+t.txType+'|'+Math.round(Math.abs(t.amount||0));
      if(seen.has(fp))errs.push({idx,id:t.id,scheme:t.scheme,date:dateStr,type:'dupe',msg:'Duplicate of row '+(seen.get(fp)+1)});
      else seen.set(fp,idx);
    });
    setValidationErrors(errs);setDismissedVE([]);setShowValidation(true);
    if(!errs.length)alert('All clear — no issues found in '+allTxns.length+' transactions.');
  },[allTxns,navByScheme]);

  const loadFromFile=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        let loaded=0;
        if(data.transactions){
          const txns=data.transactions.map(t=>({...t,date:fromISO(t.date)||new Date(t.date)})).sort((a,b)=>{
            const at=a.date instanceof Date?a.date.getTime():new Date(a.date).getTime();
            const bt=b.date instanceof Date?b.date.getTime():new Date(b.date).getTime();
            return at-bt;
          });
          txns.forEach((t,i)=>{if(!t.folioId)t.folioId=String(i);});
          setAllTxns(txns);
          loaded=txns.length;
        }
        if(data.schemeMapping)setSm(prev=>({...prev,...data.schemeMapping}));
        if(data.country)setCountry(data.country);
        // Load NAV cache if present (v4+ format)
        if(data.navByScheme){
          const nb={};
          for(const[name,arr]of Object.entries(data.navByScheme)){
            nb[name]=arr.map(pt=>({d:fromISO(pt.date),v:parseFloat(pt.nav)})).filter(x=>x.d&&x.v>0);
          }
          if(Object.keys(nb).length>0)setNavByScheme(nb);
        }
        if(data.benchmarks?.length)setBenchmarks(data.benchmarks);
        if(data.displayCurrency)setDisplayCurrency(data.displayCurrency);
        if(data.displayUnit)setDisplayUnit(data.displayUnit);
        if(data.navRefreshInterval)setNavRefreshInterval(data.navRefreshInterval);
        if(data.discountRate)setDiscountRate(data.discountRate);
        if(data.enabled?.length)setEnabled(new Set(data.enabled));
        if(data.period)setPeriod(data.period);
        // Restore benchmark NAV series from export (avoids re-fetching)
        let bmRestored=0;
        if(data.benchmarkNavCache&&Object.keys(data.benchmarkNavCache).length){
          const bdRestored={};
          for(const[id,arr] of Object.entries(data.benchmarkNavCache)){
            if(arr?.length){
              bdRestored[id]=arr.map(pt=>({d:fromISO(pt.date)||new Date(pt.date),v:parseFloat(pt.nav)})).filter(x=>x.d&&x.v>0);
              bmRestored++;
            }
          }
          if(bmRestored>0)setBenchmarkData(prev=>({...prev,...bdRestored}));
        }
        const parts=[`${loaded} transactions`];
        if(data.navByScheme)parts.push('NAV cache');
        if(bmRestored>0)parts.push(`${bmRestored} benchmark series`);
        if(data.benchmarks?.length)parts.push(`${data.benchmarks.length} benchmark configs`);
        if(data.schemeMapping)parts.push('scheme mappings');
        alert('✓ Import complete: '+parts.join(', ')+(bmRestored?'':
          '\n\nBenchmark NAV data not in file — will re-fetch automatically.'));
      }catch(ex){alert('✗ Import error: '+ex.message+'\nEnsure file is a valid MF Advisor JSON export.');}
    };
    reader.readAsText(file);
    e.target.value='';
  };

  // TX_TYPES defined globally below

  // Filtered + sorted transactions
  const filteredTxns=useMemo(()=>{
    let t=[...allTxns];
    if(fundFilter)t=t.filter(x=>x.scheme===fundFilter);
    if(txFilter){
      const f=txFilter.toLowerCase();
      t=t.filter(x=>x.scheme.toLowerCase().includes(f)||x.txType.toLowerCase().includes(f)||toISO(x.date).includes(f));
    }
    t.sort((a,b)=>{
      const av=txSort.col==='date'?a.date:txSort.col==='amount'?Math.abs(a.amount||0):a.scheme;
      const bv=txSort.col==='date'?b.date:txSort.col==='amount'?Math.abs(b.amount||0):b.scheme;
      if(av<bv)return-txSort.dir;if(av>bv)return txSort.dir;return 0;
    });
    return t;
  },[allTxns,txFilter,fundFilter,txSort]);

  const displayTxns=showAll?filteredTxns:filteredTxns.slice(0,100);

  return(
    <div style={{padding:'20px 24px',maxWidth:900}}>

      {/* ── Dataset Status ── */}
      <div style={{marginBottom:14,padding:'10px 14px',background:C.card,border:`1px solid ${C.border}`,borderRadius:8,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
        <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
          <span style={{fontSize:11,color:C.text}}><span style={{color:C.muted}}>Transactions: </span><strong>{allTxns.length}</strong></span>

        {showValidation&&validationErrors.filter(e=>!dismissedVE.includes(e.id)).length>0&&(

                onChange={e=>applyDisplayFmt({...displayFmt,scale:e.target.value})}

                {[['indian','1,23,456'],['intl','1,234,567'],['none','none']].map(([k,lbl])=>(<button key={k} className="btn"
                  onClick={()=>applyDisplayFmt({...displayFmt,sep:k})}
                  style={{flex:1,padding:'4px 1px',borderRadius:5,fontSize:10,textAlign:'center',
                    background:displayFmt.sep===k?`${C.accent}22`:'transparent',

                <span style={{fontFamily:'Space Mono',fontSize:13,color:C.teal,whiteSpace:'nowrap'}}>{applyFMT(12345678.5,displayFmt)}</span>

              <div style={{fontSize:9,color:C.muted2,marginTop:3}}>prefix + #,##0.00 + suffix. E.g. #,##0 Cr or (₹#,##0.00)</div>

          <details style={{marginTop:6}}>
            <summary style={{fontSize:10,color:C.muted,cursor:'pointer',fontWeight:600}}>⚙ Exchange Rates (1 INR =)</summary>

                  <input type="number" step="0.0001"
                    value={displayFmt.rates[k]||CURRENCIES[k].rate}
                    onChange={e=>{const r=parseFloat(e.target.value)||CURRENCIES[k].rate;applyDisplayFmt({...displayFmt,rates:{...displayFmt.rates,[k]:r}});}}
                    style={{width:68,background:'#060c18',border:`1px solid ${C.border}`,borderRadius:4,padding:'3px 5px',color:C.text,fontSize:11,fontFamily:'Space Mono'}}/>
                </div>
              ))}
            </div>
            <div style={{fontSize:9,color:C.muted2,marginTop:4}}>Approximate rates. Update from RBI or XE.com as needed.</div>
          </details>
          <div style={{marginTop:12,paddingTop:10,borderTop:`1px solid ${C.border}`}}>
            <div style={{fontSize:10,color:C.muted,fontWeight:600,marginBottom:6,textTransform:'uppercase',letterSpacing:'.04em'}}>Return Calculation Basis</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
              {[['book','Book Cost (FIFO)'],['net','Net Deployed'],['gross','Gross Invested']].map(([k,lbl])=>(

              style={{padding:'7px 16px',background:`${C.green}22`,border:`1px solid ${C.green}55`,color:C.green,borderRadius:7,fontSize:12,fontWeight:600}}>
              + Add Transaction
            </button>
          </div>
        </div>

        {/* Per-fund running balance summary banner */}
        {fundFilter&&(()=>{
          const today2=new Date();today2.setHours(0,0,0,0);
          const bal=schemeUnits(fundFilter,today2,[...allTxns].sort((a,b)=>{
            const at=a.date instanceof Date?a.date.getTime():new Date(a.date).getTime();
            const bt=b.date instanceof Date?b.date.getTime():new Date(b.date).getTime();
            return at-bt;
          }));
          const nav=getNav(navByScheme[fundFilter],today2);
          const val=nav&&bal>0?bal*nav:0;
          const fundTxns=allTxns.filter(t=>t.scheme===fundFilter);
          const bought=fundTxns.filter(t=>unitSign(t.txType)===1).reduce((s,t)=>s+resolveUnits(t),0);
          const sold=fundTxns.filter(t=>unitSign(t.txType)===-1).reduce((s,t)=>s+resolveUnits(t),0);
          return(
            <div style={{display:'flex',gap:16,padding:'10px 14px',background:C.surface,borderRadius:8,marginBottom:10,flexWrap:'wrap',fontSize:11}}>
              <div><span style={{color:C.muted}}>Fund: </span><strong style={{color:C.accent}}>{fundFilter.slice(0,45)}</strong></div>

              <div><span style={{color:C.muted}}>Units bought: </span><strong style={{color:C.green}}>{numFmt(bought,3)}</strong></div>
              <div><span style={{color:C.muted}}>Units sold: </span><strong style={{color:C.red}}>{numFmt(sold,3)}</strong></div>
              <div><span style={{color:C.muted}}>Net balance: </span><strong style={{color:bal>0?C.green:C.muted}}>{numFmt(bal,3)}</strong></div>
              {nav&&<div><span style={{color:C.muted}}>Cur. NAV: </span><strong style={{color:C.text}}>₹{nav.toFixed(3)}</strong></div>}
              {val>0&&<div><span style={{color:C.muted}}>Est. value: </span><strong style={{color:C.green}}>{FMT(val)}</strong></div>}
            </div>
          );
