  // exportData has pre-computed tables, not raw state — see getExportData() in App
  const {
    portValue, invested, gain,
    holdingsRows, fyData, benchmarkRows,
    analyticsRows, txRows, allTxnsCount,
    displayCurrency, period, discountRate,
    generatedAt
  } = exportData;

  const fmt = v => {
    if(v == null || isNaN(v) || v === '') return '—';
    const n = Number(v);
    if(Math.abs(n) >= 1e7) return '₹' + (n/1e7).toFixed(2) + ' Cr';
    if(Math.abs(n) >= 1e5) return '₹' + (n/1e5).toFixed(2) + ' L';
    return '₹' + n.toLocaleString('en-IN', {maximumFractionDigits:0});
  };
  const pct = v => (v == null || isNaN(v)) ? '—' : (Number(v) >= 0 ? '+' : '') + Number(v).toFixed(2) + '%';
  const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const cls = v => Number(v) >= 0 ? 'pos' : 'neg';

  const css = `
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,Helvetica,sans-serif;font-size:10pt;color:#1a1a1a;background:#fff;line-height:1.4}
    h1{font-size:18pt;color:#003366;border-bottom:2pt solid #003366;padding-bottom:6pt;margin-bottom:14pt}
    h2{font-size:13pt;color:#003366;border-bottom:1pt solid #bbccdd;padding-bottom:4pt;margin:24pt 0 10pt;page-break-after:avoid}
    h3{font-size:10pt;color:#225599;margin:14pt 0 5pt}
    p{font-size:9.5pt;color:#333;line-height:1.7;margin-bottom:8pt}
    .meta{font-size:9pt;color:#555;margin-bottom:18pt}
    .kpis{width:100%;border-collapse:collapse;margin-bottom:16pt}
    .kpis td{border:1pt solid #c8d8e8;padding:10pt 14pt;width:25%;vertical-align:top;background:#f0f5fb}
    .kpi-label{font-size:8pt;color:#555;text-transform:uppercase;letter-spacing:.5pt;margin-bottom:3pt}
    .kpi-value{font-size:15pt;font-weight:bold;color:#003366}
    .kpi-value.pos{color:#0a7a0a}
    .kpi-value.neg{color:#cc0000}
    table.data{width:100%;border-collapse:collapse;font-size:9pt;margin-bottom:14pt}
    table.data th{background:#003366;color:#fff;padding:6pt 9pt;text-align:left;font-weight:600;white-space:nowrap}
    table.data th.r{text-align:right}
    table.data td{padding:4pt 9pt;border-bottom:1pt solid #e8e8e8;vertical-align:top}
    table.data td.r{text-align:right;font-family:'Courier New',monospace}
    table.data td.pos{color:#0a7a0a;font-weight:600}
    table.data td.neg{color:#cc0000;font-weight:600}
    table.data tr:nth-child(even) td{background:#f8f8f8}
    table.data tfoot td{background:#e8ecf4;font-weight:700;border-top:2pt solid #003366}
    .pb{page-break-before:always}
    code{font-family:'Courier New',monospace;background:#f0f0f0;padding:1pt 3pt;border-radius:2pt;font-size:8.5pt}
    @media print{h2.pb{page-break-before:always} h2:first-of-type{page-break-before:avoid} tr{page-break-inside:avoid}}
  `;

  let h = `<!DOCTYPE html><html><head><meta charset="utf-8">
<title>MF Advisor Portfolio Report</title><style>${css}</style></head><body>
<h1>MF Advisor &mdash; Portfolio Report</h1>
<p class="meta">Generated: ${esc(generatedAt)} &nbsp;|&nbsp; Period: ${esc(period?.l||period||'All')} &nbsp;|&nbsp; Currency: ${esc(displayCurrency)}</p>`;

  // ── Section 1: Summary KPIs ──
  h += `<h2>1. Portfolio Summary</h2>
<table class="kpis"><tr>
  <td><div class="kpi-label">Portfolio Value</div><div class="kpi-value">${fmt(portValue)}</div></td>
  <td><div class="kpi-label">Net Invested</div><div class="kpi-value">${fmt(invested)}</div></td>
  <td><div class="kpi-label">Total Gain / Loss</div><div class="kpi-value ${cls(gain)}">${fmt(gain)}</div></td>
  <td><div class="kpi-label">Return</div><div class="kpi-value ${cls(gain)}">${invested>0?pct(gain/invested*100):'—'}</div></td>
</tr></table>`;

  // ── Section 2: Holdings ──
  h += `<h2>2. Fund Holdings</h2>
<table class="data"><thead><tr>
  <th>Fund</th><th class="r">Balance Units</th><th class="r">Latest NAV</th>
  <th class="r">Current Value</th><th class="r">Invested</th><th class="r">Gain / Loss</th><th class="r">Return %</th>
</tr></thead><tbody>`;
  let tInv=0, tVal=0;
  holdingsRows.forEach(r=>{
    tInv+=r.invested||0; tVal+=r.value||0;
    const g = (r.value||0)-(r.invested||0);
    h += `<tr>
      <td>${esc(r.scheme)}</td>
      <td class="r">${r.units!=null?Number(r.units).toFixed(3):'—'}</td>
      <td class="r">${r.nav!=null?'₹'+Number(r.nav).toFixed(4):'—'}</td>
      <td class="r">${fmt(r.value)}</td>
      <td class="r">${fmt(r.invested)}</td>
      <td class="r ${cls(g)}">${fmt(g)}</td>
      <td class="r ${cls(g)}">${r.invested>0?pct(g/r.invested*100):'—'}</td>
    </tr>`;
  });
  const totalG = tVal-tInv;
  h += `</tbody><tfoot><tr>
    <td colspan="3"><strong>TOTAL (${holdingsRows.length} funds)</strong></td>
    <td class="r">${fmt(tVal)}</td><td class="r">${fmt(tInv)}</td>
    <td class="r ${cls(totalG)}">${fmt(totalG)}</td>
    <td class="r ${cls(totalG)}">${tInv>0?pct(totalG/tInv*100):'—'}</td>
  </tr></tfoot></table>`;

  // ── Section 3: FY Summary ──
  h += `<h2 class="pb">3. Financial Year Summary</h2>
<table class="data"><thead><tr>
  <th>FY</th><th class="r">Invested</th><th class="r">Redeemed</th><th class="r">Dividends</th><th class="r">Net Flow</th>
</tr></thead><tbody>`;
  let fyTI=0,fyTR=0,fyTD=0;
  fyData.forEach(r=>{
    fyTI+=r.invested||0; fyTR+=r.redeemed||0; fyTD+=r.dividends||0;
    const net=(r.invested||0)-(r.redeemed||0);
    h+=`<tr><td><strong>${esc(r.fy)}</strong></td>
      <td class="r">${fmt(r.invested)}</td><td class="r">${fmt(r.redeemed)}</td>
      <td class="r">${r.dividends>0?fmt(r.dividends):'—'}</td>
      <td class="r ${cls(net)}">${fmt(net)}</td></tr>`;
  });
  h+=`</tbody><tfoot><tr><td>TOTAL</td>
    <td class="r">${fmt(fyTI)}</td><td class="r">${fmt(fyTR)}</td>
    <td class="r">${fmt(fyTD)}</td><td class="r ${cls(fyTI-fyTR)}">${fmt(fyTI-fyTR)}</td>
  </tr></tfoot></table>`;

  // ── Section 4: Benchmarks ──
  h += `<h2>4. Benchmark Configuration</h2>
<table class="data"><thead><tr><th>Benchmark</th><th>Type</th><th>Ticker / Code</th><th class="r">Enabled</th></tr></thead><tbody>`;
  benchmarkRows.forEach(r=>{
    h+=`<tr><td>${esc(r.label)}</td><td>${esc(r.type)}</td><td><code>${esc(r.ticker||r.amfiCode||r.rate||'')}</code></td><td class="r">${r.enabled?'&#10003;':'—'}</td></tr>`;
  });
  h+=`</tbody></table>`;

  // ── Section 5: Risk & Analytics ──
  if(analyticsRows.length){
    h+=`<h2>5. Risk &amp; Analytics</h2>
<table class="data"><thead><tr>
  <th>Fund</th><th class="r">CAGR %</th><th class="r">Sharpe</th><th class="r">Sortino</th>
  <th class="r">Beta</th><th class="r">Alpha %</th><th class="r">Max DD %</th>
</tr></thead><tbody>`;
    analyticsRows.forEach(r=>{
      h+=`<tr><td>${esc(r.scheme)}</td>
        <td class="r">${r.cagr!=null?pct(r.cagr*100):'—'}</td>
        <td class="r">${r.sharpe!=null?Number(r.sharpe).toFixed(2):'—'}</td>
        <td class="r">${r.sortino!=null?Number(r.sortino).toFixed(2):'—'}</td>
        <td class="r">${r.beta!=null?Number(r.beta).toFixed(2):'—'}</td>
        <td class="r ${r.alpha>0?'pos':'neg'}">${r.alpha!=null?pct(r.alpha*100):'—'}</td>
        <td class="r neg">${r.maxDrawdown!=null?pct(r.maxDrawdown*100):'—'}</td>
      </tr>`;
    });
    h+=`</tbody></table>`;
  }

  // ── Section 6: Transactions ──
  h+=`<h2 class="pb">6. Transactions (${txRows.length} of ${allTxnsCount})</h2>
<table class="data"><thead><tr>
  <th>Date</th><th>Fund</th><th>Type</th><th class="r">Amount</th><th class="r">Units</th><th class="r">NAV / Price</th><th>Folio</th>
</tr></thead><tbody>`;
  txRows.forEach(r=>{
    h+=`<tr><td>${esc(r.date)}</td>
      <td style="max-width:200pt;overflow:hidden">${esc(r.scheme)}</td>
      <td>${esc(r.txType)}</td>
      <td class="r">${r.amount?fmt(Math.abs(r.amount)):'—'}</td>
      <td class="r">${r.units||'—'}</td>
      <td class="r">${r.nav||'—'}</td>
      <td>${esc(r.folio)}</td>
    </tr>`;
  });
  h+=`</tbody></table>`;

  // ── Section 7: Formula Reference ──
  h+=`<h2 class="pb">7. Formula Reference</h2>
<h3>XIRR &mdash; Extended Internal Rate of Return</h3>
<p>Finds rate <em>r</em> such that: &Sigma;[C<sub>i</sub> / (1+r)<sup>(t<sub>i</sub>&minus;t<sub>0</sub>)/365</sup>] = 0<br>
C<sub>i</sub> = cash flow (negative for investments, positive for redemptions and final portfolio value).<br>
Algorithm: Newton-Raphson, initial guess 10%, tolerance 1&times;10<sup>&minus;7</sup>, max 200 iterations.</p>

<h3>CAGR &mdash; Compound Annual Growth Rate</h3>
<p>CAGR = (End / Start)<sup>1/years</sup> &minus; 1 &nbsp; where years = (end &minus; start) / 365.25<br>
Used for benchmark comparison. Unlike XIRR, CAGR does not account for cash-flow timing.</p>

<h3>Sharpe Ratio</h3>
<p>Sharpe = (R<sub>p</sub> &minus; R<sub>f</sub>) / &sigma;<sub>p</sub><br>
R<sub>f</sub> = 7% (India PPF proxy); &sigma;<sub>p</sub> = annualised std dev of daily returns &times; &radic;252</p>

<h3>Sortino Ratio</h3>
<p>Sortino = (R<sub>p</sub> &minus; R<sub>f</sub>) / &sigma;<sub>downside</sub><br>
&sigma;<sub>downside</sub> uses only negative daily returns. Penalises only harmful volatility.</p>

<h3>Beta &amp; Alpha (CAPM)</h3>
<p>&beta; = Cov(R<sub>fund</sub>, R<sub>nifty</sub>) / Var(R<sub>nifty</sub>) &nbsp; computed on matched daily returns<br>
Jensen&rsquo;s &alpha; = R<sub>fund</sub> &minus; [R<sub>f</sub> + &beta; &times; (R<sub>nifty</sub> &minus; R<sub>f</sub>)]</p>

<h3>Maximum Drawdown</h3>
<p>MDD = min<sub>i</sub>[(NAV<sub>i</sub> &minus; peak<sub>i</sub>) / peak<sub>i</sub>] &nbsp; where peak<sub>i</sub> = max(NAV<sub>0</sub>&hellip;NAV<sub>i</sub>)<br>
Calmar Ratio = Annualised Return / |MDD|</p>

<h3>NPV &mdash; Net Present Value</h3>
<p>NPV = &Sigma;[C<sub>i</sub> / (1+d)<sup>(t<sub>i</sub>&minus;t<sub>0</sub>)/365.25</sup>] &nbsp; d = ${discountRate||7}% (current discount rate)</p>

<h3>Unit Balance</h3>
<p>CAMS import: uses authoritative <code>balUnits</code> per folio (cumulative running balance from statement).<br>
Manual: accumulates using unitSign(txType) &times; resolveUnits(t), where resolveUnits falls back to |amount| / price.</p>
</body></html>`;

  return h;
}



function PortfolioDiagnostic({allTxns,navByScheme}){
  const [diagSearch,setDiagSearch]=useState('');
  const [diagSort,setDiagSort]=useState({col:'scheme',dir:1});
  const [diagGroup,setDiagGroup]=useState('none');
  const sortDiag=(col)=>setDiagSort(p=>({col,dir:p.col===col?-p.dir:1}));

  const d=useMemo(()=>{const x=new Date();x.setHours(0,0,0,0);return x;},[]);

  const allRows=useMemo(()=>{
    const balMap={};
    for(const t of allTxns){
      const tT=t.date instanceof Date?t.date.getTime():new Date(t.date).getTime();
      if(tT>d.getTime())break;
      const k=`${t.scheme}||${t.folioId??'?'}`;
      if(!balMap[k])balMap[k]={scheme:t.scheme,folioId:t.folioId??'?',bal:0};
      if(t.source==='import'){balMap[k].bal=t.balUnits??0;}
      else{const sign=unitSign(t.txType);if(sign!==0){const u=resolveUnits(t);if(u>0.00001)balMap[k].bal+=sign*u;}}
    }
    return Object.values(balMap).filter(e=>e.bal>0.001).map(e=>{
      const n=getNav(navByScheme[e.scheme],d);
      const val=n?e.bal*n:0;
      const navDate=navByScheme[e.scheme]?.length?(()=>{
        const arr=navByScheme[e.scheme];let lo=0,hi=arr.length-1;
        while(lo<=hi){const m=(lo+hi)>>1;arr[m].d<=d?(lo=m+1):(hi=m-1);}
        return hi>=0?fmtD(arr[hi].d):'—';
      })():'—';
      return{...e,n,val,navDate};
    });
  },[allTxns,navByScheme,d]);

  const trows=useMemo(()=>{
    let rows=allRows;
    if(diagSearch)rows=rows.filter(e=>e.scheme.toLowerCase().includes(diagSearch.toLowerCase())||e.folioId.toLowerCase().includes(diagSearch.toLowerCase()));
    return [...rows].sort((a,b)=>{
      const{col,dir}=diagSort;
      if(col==='scheme')return dir*a.scheme.localeCompare(b.scheme);
      if(col==='folio')return dir*a.folioId.localeCompare(b.folioId);
      if(col==='bal')return dir*(a.bal-b.bal);
      if(col==='nav')return dir*((a.n||0)-(b.n||0));
      if(col==='val')return dir*(a.val-b.val);
      return 0;
    });
  },[allRows,diagSearch,diagSort]);

  const gt=useMemo(()=>trows.reduce((s,r)=>s+r.val,0),[trows]);

  const SH=({col,label,align='right'})=>(
    <th onClick={()=>sortDiag(col)} style={{padding:'5px 8px',textAlign:align,color:diagSort.col===col?C.accent:C.muted,fontFamily:'Space Mono',fontSize:9,whiteSpace:'nowrap',cursor:'pointer',userSelect:'none'}}>
      {label}{diagSort.col===col?(diagSort.dir>0?' ▲':' ▼'):''}
    </th>
  );

  let bodyContent;
  if(diagGroup!=='none'){
    const gKey=r=>diagGroup==='fund'?r.scheme:r.folioId;
    const groups={};
    trows.forEach(r=>{const k=gKey(r);if(!groups[k])groups[k]=[];groups[k].push(r);});
    bodyContent=Object.entries(groups).map(([gk,rows])=>{
      const gv=rows.reduce((s,r)=>s+r.val,0);
      return(<React.Fragment key={gk}>
        <tr style={{background:`${C.accent}18`,borderTop:`1px solid ${C.border}`}}>
          <td colSpan="4" style={{padding:'5px 8px',fontFamily:'Syne',fontWeight:700,color:C.accent,fontSize:10}}>{gk}</td>
          <td style={{padding:'5px 8px',textAlign:'right',fontFamily:'Space Mono',fontSize:9,color:C.muted}}>{rows.reduce((s,r)=>s+r.bal,0).toFixed(3)}</td>
          <td style={{padding:'5px 8px',textAlign:'right',fontFamily:'Space Mono',fontWeight:700,color:C.green,fontSize:10}}>{FMT(gv)}</td>
        </tr>
        {rows.map((e,i)=>(
          <tr key={i} style={{borderBottom:`1px solid ${C.border}11`}}>
            <td style={{padding:'3px 8px 3px 20px',maxWidth:190,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:C.muted,fontSize:10}}>{e.scheme}</td>
            <td style={{padding:'3px 8px',color:C.muted2,fontSize:10}}>{e.folioId}</td>
            <td style={{padding:'3px 8px',textAlign:'right',fontFamily:'Space Mono',fontSize:10}}>{numFmt(e.bal,3)}</td>
            <td style={{padding:'3px 8px',textAlign:'right',color:C.muted,fontFamily:'Space Mono',fontSize:9}}>{e.navDate}</td>
            <td style={{padding:'3px 8px',textAlign:'right',fontFamily:'Space Mono',fontSize:10}}>{e.n?`₹${e.n.toFixed(3)}`:'—'}</td>
            <td style={{padding:'3px 8px',textAlign:'right',color:C.green,fontFamily:'Space Mono',fontSize:10}}>{FMT(e.val)}</td>
          </tr>
        ))}
      </React.Fragment>);
    });
  } else {
    bodyContent=trows.map((e,i)=>(
      <tr key={i} style={{borderBottom:`1px solid ${C.border}22`}}>
        <td style={{padding:'3px 8px',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.scheme}</td>
        <td style={{padding:'3px 8px',color:C.muted2}}>{e.folioId}</td>
        <td style={{padding:'3px 8px',textAlign:'right',fontFamily:'Space Mono'}}>{numFmt(e.bal,3)}</td>
        <td style={{padding:'3px 8px',textAlign:'right',color:C.muted,fontFamily:'Space Mono',fontSize:9}}>{e.navDate}</td>
        <td style={{padding:'3px 8px',textAlign:'right',fontFamily:'Space Mono'}}>{e.n?`₹${e.n.toFixed(3)}`:'—'}</td>
        <td style={{padding:'3px 8px',textAlign:'right',color:C.green,fontFamily:'Space Mono'}}>{FMT(e.val)}</td>
      </tr>
    ));
  }

  return(
    <CollapsibleCard id="settings-diag" title="Portfolio Diagnostic" subtitle="Folio-level unit balance · filter · sort · group" defaultOpen={false}>
      <div style={{fontSize:10,color:C.amber,marginBottom:10,padding:'6px 10px',background:`${C.amber}10`,border:`1px solid ${C.amber}22`,borderRadius:6}}>
        Each row = one folio of one fund. Sum of all rows = portfolio value.
      </div>
      <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap',alignItems:'center'}}>
        <input value={diagSearch} onChange={e=>setDiagSearch(e.target.value)} placeholder="Filter by fund name…"
          style={{flex:'1 1 180px',padding:'5px 10px',background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,color:'#fff',fontSize:11}}/>
        <select value={diagGroup} onChange={e=>setDiagGroup(e.target.value)}
          style={{padding:'5px 10px',background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,color:C.accent,fontSize:11}}>
          <option value="none">No grouping</option>
          <option value="fund">Group by Fund</option>
          <option value="folio">Group by Folio</option>
        </select>
      </div>
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:10}}>
          <thead><tr style={{background:C.surface}}>
            <SH col="scheme" label="Scheme" align="left"/>
            <SH col="folio" label="Folio" align="left"/>
            <SH col="bal" label="Bal Units"/>
            <th style={{padding:'5px 8px',textAlign:'right',color:C.muted,fontFamily:'Space Mono',fontSize:9}}>NAV Date</th>
            <SH col="nav" label="Last NAV"/>
            <SH col="val" label="Value"/>
          </tr></thead>
          <tbody>{bodyContent}</tbody>
          <tfoot><tr style={{borderTop:`2px solid ${C.border}`,fontWeight:700}}>
            <td colSpan="5" style={{padding:'4px 8px',color:C.accent,fontFamily:'Space Mono'}}>TOTAL ({trows.length} rows{diagSearch?', filtered':''})</td>
            <td style={{padding:'4px 8px',textAlign:'right',color:C.accent,fontFamily:'Space Mono'}}>{FMT(gt)}</td>
          </tr></tfoot>
        </table>
      </div>
      <button className="btn" onClick={()=>{
        const hdrs=['Scheme','Folio ID','Balance Units','Last NAV','NAV Date','Value'];
        const data=trows.map(e=>[e.scheme,e.folioId,e.bal,e.n??'',e.navDate,e.val]);
        downloadCSV(data,hdrs,`folio-diagnostic_${toTS()}`);
      }} style={{marginTop:8,padding:'5px 12px',background:`${C.accent}15`,border:`1px solid ${C.accent}44`,color:C.accent,borderRadius:5,fontSize:10}}>
        ↓ Export CSV
      </button>
    </CollapsibleCard>
  );
}

function PortfolioComparePage({currentUserId,returnBasis,navByScheme:curNav,sortedTxns:curTxns,today}){
  // C is the global color palette (module-level const)
  const [rows,setRows]=React.useState([]);
  const [loading,setLoading]=React.useState(true);

  React.useEffect(()=>{
    const portfolios=loadUsers();
    const today2=new Date();today2.setHours(0,0,0,0);
    const results=[];
    for(const p of portfolios){
      try{
        let txns=[],nb={},schemeMappingP={},name=p.name;
        if(p.id===currentUserId){
          // Use live in-memory data for current portfolio
          txns=curTxns||[];
          nb=curNav||{};
        } else {
          // Load from _store
          const raw=_store.get(getUserSaveKey(p.id));
          if(!raw)continue;
          const state=JSON.parse(raw);
          if(!state?.v||state.v<4)continue;
          txns=state.transactions.map(t=>({...t,date:fromISO(t.date)||new Date(t.date)}))
            .sort((a,b)=>(a.date instanceof Date?a.date:new Date(a.date))-(b.date instanceof Date?b.date:new Date(b.date)));
          // Restore NAV cache
          try{const nr=_store.get('mfa_nav_v1_'+p.id);if(nr){const np=JSON.parse(nr);for(const[n,a] of Object.entries(np))nb[n]=a.map(x=>({d:fromISO(x.d),v:parseFloat(x.v)})).filter(x=>x.d&&x.v>0);}}catch{}
          if(!Object.keys(nb).length&&state.navByScheme){for(const[n,a]of Object.entries(state.navByScheme))nb[n]=a.map(pt=>({d:fromISO(pt.date),v:parseFloat(pt.nav)})).filter(x=>x.d&&x.v>0);}
          schemeMappingP=state.schemeMapping||{};
        }
        const enabledSet=new Set(txns.map(t=>t.scheme));
        const pv=portVal(today2,txns,nb,enabledSet);
        const{invested,redeemed,net}=computeInvested(today2,txns,enabledSet);
        let bookCost=0;
        for(const n of enabledSet){bookCost+=computeFIFO(n,today2,txns).costBasis;}
        const xirr=computePortfolioXirr(today2,null,txns,nb,enabledSet).x;
        const gain=returnBasis==='gross'?pv-invested:returnBasis==='net'?pv-net:pv-bookCost;
        const base=returnBasis==='gross'?invested:returnBasis==='net'?net:bookCost;
        const gainPct=base!==0?gain/Math.abs(base)*100:0;
        const txCount=txns.length;
        const schemeCount=enabledSet.size;
        // Top 3 funds by current value
        const fundVals=Array.from(enabledSet).map(n=>{
          const bal=schemeUnits(n,today2,txns);
          const nav=getNav(nb[n],today2);
          return{name:n,val:nav&&bal>0.001?bal*nav:0};
        }).filter(f=>f.val>100).sort((a,b)=>b.val-a.val).slice(0,3);
        results.push({id:p.id,name,pv,invested,redeemed,net,bookCost,gain,gainPct,xirr,txCount,schemeCount,topFunds:fundVals,isCurrent:p.id===currentUserId});
      }catch(e){console.warn('Compare load failed for',p.name,e);}
    }
    setRows(results);setLoading(false);
  },[currentUserId,returnBasis]);

  if(loading)return <div style={{padding:32,color:C.muted,fontFamily:'Space Mono',fontSize:13}}>Loading portfolios…</div>;
  if(!rows.length)return <div style={{padding:32,color:C.muted,fontSize:13}}>No portfolio data found.</div>;

  const gc=v=>v==null?C.muted:v>=0?C.green:C.red;
  const basisLabel=returnBasis==='gross'?'Gross':returnBasis==='net'?'Net Dep':'Book Cost';

  return(
    <div style={{padding:'20px 24px',overflowX:'auto'}}>
      <div style={{fontFamily:'Syne',fontSize:18,fontWeight:800,color:'#fff',marginBottom:4}}>Portfolio Compare</div>
      <div style={{fontSize:11,color:C.muted,marginBottom:20}}>
        Side-by-side snapshot · {rows.length} portfolios · Return basis: <span style={{color:C.accent}}>{basisLabel}</span>
      </div>

      {/* Summary cards row */}
      <div style={{display:'grid',gridTemplateColumns:`repeat(${rows.length},minmax(220px,1fr))`,gap:12,marginBottom:28}}>
        {rows.map(r=>(
          <div key={r.id} style={{background:r.isCurrent?`${C.accent}10`:C.card,border:`1px solid ${r.isCurrent?C.accent:C.border}`,borderRadius:12,padding:'16px 18px'}}>
            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:10}}>
              <span style={{fontSize:13,fontFamily:'Syne',fontWeight:700,color:r.isCurrent?C.accent:'#fff',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.name}</span>
              {r.isCurrent&&<span style={{fontSize:9,color:C.accent,border:`1px solid ${C.accent}44`,borderRadius:3,padding:'1px 5px',whiteSpace:'nowrap'}}>active</span>}
            </div>
            {[
              ['Portfolio Value',FMT(r.pv),C.accent],
              ['Gross Invested', FMT(r.invested),C.text],
              ['Redeemed',       r.redeemed>0?FMT(r.redeemed):'—',C.muted],
              ['Net Deployed',   FMT(r.net),r.net>=0?C.text:C.amber],
              ['Book Cost (FIFO)',FMT(r.bookCost),C.text],
              [`Gain (${basisLabel})`,FMT(r.gain),gc(r.gain)],
              ['Gain %',         r.gainPct!=null?(r.gainPct>=0?'+':'')+r.gainPct.toFixed(1)+'%':'—',gc(r.gainPct)],
              ['All-Time XIRR',  r.xirr!=null?(r.xirr*100>=0?'+':'')+  (r.xirr*100).toFixed(1)+'% p.a.':'—',gc(r.xirr)],
              ['Transactions',   r.txCount.toLocaleString(),C.muted],
              ['Funds',          r.schemeCount,C.muted],
            ].map(([lbl,val,col])=>(
              <div key={lbl} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 0',borderBottom:`1px solid ${C.border}18`}}>
                <span style={{fontSize:10,color:C.muted}}>{lbl}</span>
                <span style={{fontSize:11,fontFamily:'Space Mono',color:col,fontWeight:600}}>{val}</span>
              </div>
            ))}
            {r.topFunds.length>0&&(
              <div style={{marginTop:10}}>
                <div style={{fontSize:9,color:C.muted,fontWeight:600,textTransform:'uppercase',letterSpacing:'.04em',marginBottom:4}}>Top Holdings</div>
                {r.topFunds.map(f=>(
                  <div key={f.name} style={{display:'flex',justifyContent:'space-between',padding:'2px 0'}}>
                    <span style={{fontSize:10,color:C.text,maxWidth:'65%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name.split('-')[0].trim()}</span>
                    <span style={{fontSize:10,fontFamily:'Space Mono',color:C.accent}}>{FMT(f.val)}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Comparison table */}
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
          <thead>
            <tr style={{background:C.surface}}>
              <th style={{padding:'8px 12px',textAlign:'left',color:C.muted,fontFamily:'Space Mono',fontSize:10,borderBottom:`1px solid ${C.border}`,whiteSpace:'nowrap'}}>Metric</th>
              {rows.map(r=>(
                <th key={r.id} style={{padding:'8px 12px',textAlign:'right',color:r.isCurrent?C.accent:C.muted,fontFamily:'Syne',fontSize:11,fontWeight:600,borderBottom:`1px solid ${C.border}`,whiteSpace:'nowrap'}}>
                  {r.name}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {[
              {label:'Portfolio Value',      fmt:r=>FMT(r.pv),          col:r=>C.accent},
              {label:'Gross Invested',       fmt:r=>FMT(r.invested),     col:()=>C.text},
              {label:'Redeemed',             fmt:r=>r.redeemed>0?FMT(r.redeemed):'—', col:()=>C.muted},
              {label:'Net Deployed',         fmt:r=>FMT(r.net),          col:r=>r.net>=0?C.text:C.amber},
              {label:'Book Cost (FIFO)',     fmt:r=>FMT(r.bookCost),     col:()=>C.text},
              {label:`Gain (${basisLabel})`, fmt:r=>FMT(r.gain),         col:r=>gc(r.gain)},
              {label:'Gain %',               fmt:r=>r.gainPct!=null?(r.gainPct>=0?'+':'')+r.gainPct.toFixed(1)+'%':'—', col:r=>gc(r.gainPct)},
              {label:'All-Time XIRR',        fmt:r=>r.xirr!=null?(r.xirr*100>=0?'+':'')+(r.xirr*100).toFixed(1)+'% p.a.':'—', col:r=>gc(r.xirr)},
              {label:'Funds',                fmt:r=>r.schemeCount,       col:()=>C.text},
              {label:'Transactions',         fmt:r=>r.txCount.toLocaleString(), col:()=>C.muted},
            ].map(({label,fmt,col},ri)=>(
              <tr key={label} style={{background:ri%2===0?C.card:'transparent',borderBottom:`1px solid ${C.border}22`}}>

  );
}

const GDRIVE_CLIENT_ID='';  // Set by user in Settings
const GDRIVE_SCOPE='https://www.googleapis.com/auth/drive.file';
const GDRIVE_FOLDER_KEY='mfa_gdrive_folder';
const GDRIVE_TOKEN_KEY='mfa_gdrive_token';

function getGDriveToken(){try{const r=_store.get(GDRIVE_TOKEN_KEY);return r?JSON.parse(r):null;}catch{return null;}}
function saveGDriveToken(t){try{_store.set(GDRIVE_TOKEN_KEY,JSON.stringify(t));}catch{}}
function clearGDriveToken(){try{_store.remove(GDRIVE_TOKEN_KEY);}catch{}}

async function gdriveRequest(token,method,url,body){
  const opts={method,headers:{'Authorization':'Bearer '+token.access_token,'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(url,opts);
  if(r.status===401){clearGDriveToken();throw new Error('Google session expired. Please sign in again.');}
  if(!r.ok)throw new Error('Drive API error '+r.status+': '+(await r.text()));
  return r.json();
}

async function gdriveListFolders(token){
  const q=encodeURIComponent("mimeType='application/vnd.google-apps.folder' and trashed=false");
  const url=`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)&pageSize=50`;
  const r=await gdriveRequest(token,'GET',url);
  return r.files||[];
}

async function gdriveUpload(token,folderId,filename,jsonStr){
  // Check if file exists
  const q=encodeURIComponent(`name='${filename}' and '${folderId}' in parents and trashed=false`);
  const chk=await gdriveRequest(token,'GET',`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`);
  const fileId=chk.files&&chk.files[0]?chk.files[0].id:null;
  const blob=new Blob([jsonStr],{type:'application/json'});
  const meta={name:filename,...(fileId?{}:{parents:[folderId]})};
  const form=new FormData();
  form.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}));
  form.append('file',blob);
  const url=fileId
    ?`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`
    :'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
  const r=await fetch(url,{method:fileId?'PATCH':'POST',
    headers:{'Authorization':'Bearer '+token.access_token},body:form});
  if(!r.ok)throw new Error('Upload failed: '+(await r.text()));
  return r.json();
}

async function gdriveDownload(token,folderId,filename){
  const q=encodeURIComponent(`name='${filename}' and '${folderId}' in parents and trashed=false`);
  const chk=await gdriveRequest(token,'GET',`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`);
  if(!chk.files||!chk.files[0])return null;
  const fileId=chk.files[0].id;
  const r=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
    {headers:{'Authorization':'Bearer '+token.access_token}});
  if(!r.ok)return null;
  return r.text();
}

function GoogleDrivePanel({currentUserId,onSaveComplete,onLoadComplete,getExportData,onRestoreData}){
  const C=window.C||{bg:'#04080f',surface:'#080f1c',card:'#0b1525',border:'#162035',
    text:'#e8eaf0',muted:'#607080',accent:'#00c8ff',green:'#00e676',red:'#ff5252',amber:'#ffab40'};
  const [token,setToken]=React.useState(()=>getGDriveToken());
  const [user,setUser]=React.useState(null);
  const [folders,setFolders]=React.useState([]);
  const [selectedFolder,setSelectedFolder]=React.useState(()=>_store.get(GDRIVE_FOLDER_KEY)||'');
  const [status,setStatus]=React.useState('');
  const [loading,setLoading]=React.useState(false);
  const [clientId,setClientId]=React.useState(()=>_store.get('mfa_gdrive_client_id')||'');
  const [showClientId,setShowClientId]=React.useState(false);

  const saveClientId=(id)=>{setClientId(id);_store.set('mfa_gdrive_client_id',id);};

  const signIn=()=>{
    const cid=clientId||_store.get('mfa_gdrive_client_id')||'';
    if(!cid){setStatus('Enter your Google Client ID first (see setup guide).');return;}
    if(!window.google||!window.google.accounts){setStatus('Google Identity Services not loaded. Check internet connection.');return;}
    const client=window.google.accounts.oauth2.initTokenClient({
      client_id:cid,scope:GDRIVE_SCOPE,
      callback:(resp)=>{
        if(resp.error){setStatus('Sign-in failed: '+resp.error);return;}
        const t={access_token:resp.access_token,expires_at:Date.now()+resp.expires_in*1000};
        saveGDriveToken(t);setToken(t);
        // Get user info
        fetch('https://www.googleapis.com/oauth2/v3/userinfo',
          {headers:{'Authorization':'Bearer '+resp.access_token}})
          .then(r=>r.json()).then(u=>setUser(u)).catch(()=>{});
        setStatus('Signed in ✓');
        // Load folders
        gdriveListFolders(t).then(f=>{setFolders(f);
          if(!selectedFolder&&f.length>0)setSelectedFolder(f[0].id);
        }).catch(e=>setStatus('Error listing folders: '+e.message));
      }
    });
    client.requestAccessToken();
  };

  const signOut=()=>{
    if(token&&window.google)window.google.accounts.oauth2.revoke(token.access_token,()=>{});
    clearGDriveToken();setToken(null);setUser(null);setFolders([]);setStatus('Signed out.');
  };

  React.useEffect(()=>{
    if(token&&Date.now()>token.expires_at-60000){clearGDriveToken();setToken(null);setStatus('Session expired. Please sign in again.');}
    if(token){
      gdriveListFolders(token).then(f=>{setFolders(f);}).catch(()=>{});
    }
  },[]);

  const filename='mfa-'+currentUserId+'.json';

  const saveToCloud=async()=>{
    if(!token){setStatus('Please sign in first.');return;}
    if(!selectedFolder){setStatus('Select a Drive folder first.');return;}
    setLoading(true);setStatus('Saving to Google Drive…');
    try{
      const data=getExportData?getExportData():null;
      if(!data){setStatus('No data to save.');setLoading(false);return;}
      await gdriveUpload(token,selectedFolder,filename,JSON.stringify(data));
      _store.set(GDRIVE_FOLDER_KEY,selectedFolder);
      setStatus('Saved to Google Drive ✓ ('+new Date().toLocaleTimeString()+')');
      if(onSaveComplete)onSaveComplete();
    }catch(e){setStatus('Save failed: '+e.message);}
    setLoading(false);
  };

  const loadFromCloud=async()=>{
    if(!token){setStatus('Please sign in first.');return;}
    if(!selectedFolder){setStatus('Select a Drive folder first.');return;}
    if(!window.confirm('Load data from Google Drive? This will replace your current data.'))return;
    setLoading(true);setStatus('Loading from Google Drive…');
    try{
      const json=await gdriveDownload(token,selectedFolder,filename);
      if(!json){setStatus('No saved data found in this folder.');setLoading(false);return;}
      const parsed=JSON.parse(json);
      if(onRestoreData)onRestoreData(parsed);
      setStatus('Loaded from Google Drive ✓');
      if(onLoadComplete)onLoadComplete();
    }catch(e){setStatus('Load failed: '+e.message);}
    setLoading(false);
  };

  return(
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:'16px 18px',marginTop:12}}>
      <div style={{fontFamily:'Syne',fontSize:14,fontWeight:700,color:'#fff',marginBottom:10}}>
        ☁ Google Drive Sync
      </div>
      {!token?(
        <div>
          <div style={{fontSize:10,color:C.muted,marginBottom:8}}>
            Sign in with Google to automatically save/load your portfolio data from Google Drive.
          </div>
          <div style={{marginBottom:8}}>
            <button style={{fontSize:9,color:C.accent,background:'transparent',border:'none',cursor:'pointer',padding:0,marginBottom:4}}
              onClick={()=>setShowClientId(!showClientId)}>
              {showClientId?'▲ Hide':'▼'} Google Client ID setup
            </button>
            {showClientId&&(
              <div style={{marginTop:6,padding:'8px 10px',background:`${C.surface}`,borderRadius:6,border:`1px solid ${C.border}`}}>
                <div style={{fontSize:9,color:C.muted,marginBottom:6}}>
                  1. Go to <span style={{color:C.accent}}>console.cloud.google.com</span> → APIs & Services → Credentials<br/>
                  2. Create OAuth 2.0 Client ID (Web application)<br/>
                  3. Add <span style={{color:C.accent,fontFamily:'Space Mono'}}>https://accounts.google.com</span> as authorised JS origin<br/>
                  4. Paste your Client ID below
                </div>
                <input value={clientId} onChange={e=>saveClientId(e.target.value)}
                  placeholder="123456789-abc.apps.googleusercontent.com"
                  style={{width:'100%',padding:'6px 8px',background:C.bg,border:`1px solid ${C.border}`,
                    color:C.text,borderRadius:4,fontSize:10,fontFamily:'Space Mono',boxSizing:'border-box'}}/>
              </div>
            )}
          </div>
          <button className="btn" onClick={signIn}
            style={{padding:'7px 18px',background:`${C.accent}20`,border:`1px solid ${C.accent}`,
              color:C.accent,borderRadius:6,fontSize:11,fontWeight:600}}>
            Sign in with Google
          </button>
        </div>
      ):(
        <div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
            {user&&user.picture&&<img src={user.picture} style={{width:24,height:24,borderRadius:'50%'}} alt=""/>}
            <span style={{fontSize:11,color:'#fff'}}>{user?user.name||user.email:'Connected'}</span>
            <button className="btn" onClick={signOut}
              style={{marginLeft:'auto',padding:'3px 10px',background:'transparent',
                border:`1px solid ${C.border}`,color:C.muted,borderRadius:4,fontSize:10}}>Sign out</button>
          </div>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:10,color:C.muted,marginBottom:4}}>Drive folder:</div>
            <div style={{display:'flex',gap:6}}>
              <select value={selectedFolder} onChange={e=>{setSelectedFolder(e.target.value);_store.set(GDRIVE_FOLDER_KEY,e.target.value);}}
                style={{flex:1,padding:'5px 8px',background:C.bg,border:`1px solid ${C.border}`,
                  color:C.text,borderRadius:4,fontSize:11}}>
                <option value="">— select folder —</option>
                {folders.map(f=>(<option key={f.id} value={f.id}>{f.name}</option>))}
              </select>
              <button className="btn" onClick={()=>gdriveListFolders(token).then(f=>setFolders(f))}
                style={{padding:'5px 10px',fontSize:10,background:'transparent',border:`1px solid ${C.border}`,color:C.muted,borderRadius:4}}>↺</button>
            </div>
          </div>
          <div style={{display:'flex',gap:8,marginBottom:8}}>
            <button className="btn" onClick={saveToCloud} disabled={loading||!selectedFolder}
              style={{flex:1,padding:'7px',background:`${C.green}18`,border:`1px solid ${C.green}44`,
                color:loading?C.muted:C.green,borderRadius:6,fontSize:11,fontWeight:600}}>
              {loading?'Saving…':'☁ Save to Drive'}
            </button>
            <button className="btn" onClick={loadFromCloud} disabled={loading||!selectedFolder}
              style={{flex:1,padding:'7px',background:`${C.accent}18`,border:`1px solid ${C.accent}44`,
                color:loading?C.muted:C.accent,borderRadius:6,fontSize:11,fontWeight:600}}>
              {loading?'Loading…':'⬇ Load from Drive'}
            </button>
          </div>
          {status&&<div style={{fontSize:10,color:status.includes('✓')?C.green:status.includes('failed')||status.includes('error')?C.red:C.muted,marginTop:4}}>{status}</div>}
          <div style={{fontSize:9,color:C.muted2||'#3a4a5a',marginTop:8,lineHeight:1.5}}>
            File: <span style={{fontFamily:'Space Mono',color:C.muted}}>{filename}</span><br/>
            Data is saved per portfolio. Only your app files are accessible.
          </div>
        </div>
      )}
    </div>
  );
}

  // NPV discount rate (shared between Dashboard and NPV page)
  const [returnBasis,setReturnBasis]=useState('book'); // 'book'|'net'|'gross'
  const [discountRate,setDiscountRate]=useState(7);
  // NAV refresh
  const [navRefreshInterval,setNavRefreshInterval]=useState(5); // minutes
  const [navStatus,setNavStatus]=useState('idle'); // idle|fetching|done|stale
  const [navLastFetched,setNavLastFetched]=useState(null);
  const navRefreshTimer=useRef(null);
  const navBySchemeRef=useRef(navByScheme);

  // Keep ref in sync for timer callback
  useEffect(()=>{ navBySchemeRef.current=navByScheme; },[navByScheme]);

  // Sync display globals for FMT() function
  useEffect(()=>{ G_CURRENCY=displayCurrency; G_UNIT=displayUnit; },[displayCurrency,displayUnit]);

  const today=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d;},[]);
  const sortedTxns=useMemo(()=>[...allTxns].sort((a,b)=>{
    const at=a.date instanceof Date?a.date.getTime():new Date(a.date).getTime();
    const bt=b.date instanceof Date?b.date.getTime():new Date(b.date).getTime();
    return at-bt;
  }),[allTxns]);
  const minDate=useMemo(()=>sortedTxns.length?sortedTxns[0].date:subYears(today,10),[sortedTxns,today]);
  const allSchemes=useMemo(()=>[...new Set(sortedTxns.map(t=>t.scheme))].filter(s=>navByScheme[s]),[sortedTxns,navByScheme]);

  // Per-fund stats for analysis page
  const fundStats=useMemo(()=>{
    const enabledSet=enabled instanceof Set?enabled:new Set(enabled);
    return Array.from(enabledSet).map(name=>{
      const bal=schemeUnits(name,today,sortedTxns);
      const nav=getNav(navByScheme[name],today);
      const currentVal=nav&&bal>0.001?bal*nav:0;
      const{invested}=computeInvested(today,sortedTxns,new Set([name]));
      const x=computeXirrForScheme(name,today,null,sortedTxns,navByScheme);
      return{name,currentVal,invested,gain:currentVal-invested,xirr:x,exited:currentVal<10&&bal<0.001};
    }).filter(s=>s.currentVal>100||s.invested>100);
  },[enabled,sortedTxns,navByScheme,today]);
  const totalPortVal=useMemo(()=>fundStats.reduce((a,f)=>a+f.currentVal,0),[fundStats]);

  // ── Background NAV refresh ──
  const getNavCacheKey=useCallback(()=>'mfa_nav_v1_'+currentUserId,[currentUserId]);
  const saveNavCache=useCallback((nb)=>{
    try{
      const s=Object.fromEntries(Object.entries(nb).map(([k,a])=>[k,a.map(p=>({d:toISO(p.d),v:p.v}))]));
      _store.set(getNavCacheKey(),JSON.stringify(s));
    }catch(e){console.warn('NAV cache:',e);}
  },[getNavCacheKey]);
  const loadNavCache=useCallback(()=>{
    try{
      const raw=_store.get(getNavCacheKey());if(!raw)return{};
      const nb={};
      for(const[name,arr] of Object.entries(JSON.parse(raw)))
        nb[name]=arr.map(x=>({d:fromISO(x.d),v:parseFloat(x.v)})).filter(x=>x.d&&x.v>0);
      return nb;
    }catch{return{};}
  },[getNavCacheKey]);
  const fetchNavBackground=useCallback(async(nb,smIn)=>{
    const cached=loadNavCache();
    const nbToUse={...cached,...(nb||navBySchemeRef.current)};
    if(isNavCurrent(nbToUse)){setNavStatus('done');return;}
    setNavStatus('fetching');
    const smMap=smIn||sm;
    const lbd=lastBusinessDay();
    const updated={...nbToUse};
    const CONCURRENCY=5;
    const schemes=Object.keys(smMap).filter(n=>smMap[n]?.amfiCode);
    let fetched=0,skipped=0;
    const fetchOne=async(name)=>{
      const code=smMap[name].amfiCode;
      const existing=updated[name];
      try{
        if(existing?.length){
          const lastDate=existing[existing.length-1].d;
          if(lastDate>=lbd){skipped++;return;}
          try{
            const rL=await fetch('https://api.mfapi.in/mf/'+code+'/latest',{signal:AbortSignal.timeout(5000)});
            if(rL.ok){const jL=await rL.json();if(jL?.data?.length){const ne=buildNav(jL.data).filter(e=>e.d>lastDate);if(ne.length){updated[name]=[...existing,...ne].sort((a,b)=>a.d-b.d);fetched++;return;}}}
          }catch{}
        }
        const res=await fetch('https://api.mfapi.in/mf/'+code,{signal:AbortSignal.timeout(12000)});
        if(!res.ok)return;
        const json=await res.json();
        if(json?.data?.length){const arr=buildNav(json.data);if(arr.length){updated[name]=arr;fetched++;}}
      }catch{}
    };
    for(let i=0;i<schemes.length;i+=CONCURRENCY){
      await Promise.all(schemes.slice(i,i+CONCURRENCY).map(fetchOne));
      setNavByScheme({...updated});
      navBySchemeRef.current={...updated};
      saveNavCache({...updated});
    }
    setNavLastFetched(new Date());
    setNavStatus(isNavCurrent(updated)?'done':'stale');
    console.log('NAV: '+fetched+' updated, '+skipped+' current');
  },[sm,loadNavCache,saveNavCache]);

  // ── Re-fetch benchmark data when benchmarks list changes ──
  useEffect(()=>{
    if(appState!=='app')return;
    const newBms=benchmarks.filter(b=>b.enabled&&!benchmarkData[b.id]);
    if(!newBms.length)return;
    (async()=>{
      const data={...benchmarkData};
      for(const b of newBms){
        try{
          if(b.type==='market'&&b.ticker){
            const d=await fetchYahooFinance(b.ticker);
            if(d&&d.length)data[b.id]=d;
          } else if(b.type==='mfapi'&&b.amfiCode){
            const res=await fetch(`https://api.mfapi.in/mf/${b.amfiCode}`,{signal:AbortSignal.timeout(12000)});
            if(res.ok){
              const json=await res.json();
              if(json?.data?.length){const arr=buildNav(json.data);if(arr.length)data[b.id]=arr;}
            }
          }
        }catch(e){console.warn('Benchmark fetch failed:',b.label,e.message);}
      }
      setBenchmarkData(data);
    })();
  },[benchmarks,appState]);

  // ── Auto-refresh timer ──
  useEffect(()=>{
    if(appState!=='app')return;
    if(navRefreshTimer.current)clearInterval(navRefreshTimer.current);
    const ms=navRefreshInterval*60*1000;
    navRefreshTimer.current=setInterval(()=>{
      if(!isNavCurrent(navBySchemeRef.current)){
        fetchNavBackground(navBySchemeRef.current,null);
      }
    },ms);
    return()=>{if(navRefreshTimer.current)clearInterval(navRefreshTimer.current);};
  },[appState,navRefreshInterval,fetchNavBackground]);

  // ── Auto-save on tab close / page unload ──
  useEffect(()=>{
    const save=()=>{
      if(appState!=='app')return;
      try{
        const state={
          v:4,
          savedAt:new Date().toISOString(),
          transactions:allTxns.map(t=>({...t,date:t.date instanceof Date?toISO(t.date):t.date})),
          schemeMapping:sm,
          navByScheme:Object.fromEntries(Object.entries(navByScheme).map(([k,arr])=>[k,arr.map(pt=>({date:toISO(pt.d),nav:pt.v.toFixed(4)}))])),
          benchmarks,country,displayCurrency,displayUnit,displayFmt,navRefreshInterval,discountRate,returnBasis,
          enabled:[...enabled],
          period,showExited,
        };
        _store.set(getUserSaveKey(currentUserId),JSON.stringify(state));
      }catch(e){console.warn('Auto-save failed:',e);}
    };
    window.addEventListener('beforeunload',save);
    const t=setInterval(save,120000);
    return()=>{window.removeEventListener('beforeunload',save);clearInterval(t);};
  },[appState,allTxns,sm,navByScheme,benchmarks,country,displayCurrency,displayUnit,navRefreshInterval,enabled,period]);

  // ── File System Access API — default folder storage ──
  const [showExportModal,setShowExportModal]=useState(false);
  const [fsHandle,setFsHandle]=useState(null); // DirectoryHandle
  const [fsStatus,setFsStatus]=useState(''); // 'saved'|'error'|''
  const [folderAutoFile,setFolderAutoFile]=useState(null); // {name,data,count} — found on startup
  const fsStatusTimer=useRef(null);

  // Restore directory handle from IndexedDB on mount
  useEffect(()=>{
    try{
      const req=indexedDB.open('mfa-fs',1);
      req.onupgradeneeded=e=>e.target.result.createObjectStore('handles');
      req.onsuccess=e=>{
        const db=e.target.result;
        const tx=db.transaction('handles','readonly');
        const store=tx.objectStore('handles');
        const get=store.get('defaultDir');
        get.onsuccess=async()=>{
          if(get.result){
            try{
              const perm=await get.result.queryPermission({mode:'readwrite'});
              if(perm==='granted'||perm==='prompt'){
                setFsHandle(get.result);
                // Auto-load latest backup from folder if no data yet
                if(appState==='setup'){
                  try{
                    const files=[];
                    for await(const entry of get.result.values()){
                      if(entry.kind==='file'&&entry.name.startsWith('mf-advisor_')&&entry.name.endsWith('.json'))
                        files.push(entry);
                    }
                    files.sort((a,b)=>b.name.localeCompare(a.name)); // newest first
                    if(files.length>0){
                      const file=await files[0].getFile();
                      const text=await file.text();
                      const data=JSON.parse(text);
                      if(data.transactions?.length){
                        setFolderAutoFile({name:files[0].name,data,count:files.length});
                      }
                    }
                  }catch(e2){console.warn('Folder auto-scan failed:',e2);}
                }
              }
            }catch{}
          }
        };
      };
    }catch{}
  },[]);

  const saveDirHandle=useCallback((handle)=>{
    try{
      const req=indexedDB.open('mfa-fs',1);
      req.onsuccess=e=>{
        const db=e.target.result;
        const tx=db.transaction('handles','readwrite');
        tx.objectStore('handles').put(handle,'defaultDir');
      };
    }catch{}
  },[]);

  const pickFolder=useCallback(async()=>{
    if(!window.showDirectoryPicker){
      alert('Folder picker not supported in this browser.\nUse Chrome or Edge for this feature.');return;
    }
    try{
      const handle=await window.showDirectoryPicker({mode:'readwrite',startIn:'documents'});
      setFsHandle(handle);
      saveDirHandle(handle);
    }catch(e){if(e.name!=='AbortError')alert('Could not access folder: '+e.message);}
  },[saveDirHandle]);

  const saveToFolder=useCallback(async()=>{
    if(!fsHandle)return;
    try{
      const perm=await fsHandle.requestPermission({mode:'readwrite'});
      if(perm!=='granted'){setFsStatus('error');return;}
      const bmCache={};
      for(const[id,arr] of Object.entries(benchmarkData||{})){
        if(arr?.length)bmCache[id]=arr.map(pt=>({date:toISO(pt.d instanceof Date?pt.d:new Date(pt.d)),nav:Number(pt.v||pt.nav||0).toFixed(4)}));
      }
      const data={version:'5.0',exportDate:new Date().toISOString(),
        transactions:allTxns.map(t=>({...t,date:t.date instanceof Date?toISO(t.date):t.date})),
        schemeMapping:sm,
        navByScheme:Object.fromEntries(Object.entries(navByScheme).map(([k,arr])=>[k,arr.map(pt=>({date:toISO(pt.d),nav:pt.v.toFixed(4)}))])),
        benchmarkNavCache:bmCache,benchmarks,country,displayCurrency,displayUnit,navRefreshInterval,
        discountRate,enabled:[...enabled],period,
      };
      const fname=`mf-advisor_${toTS()}.json`;
      const fh=await fsHandle.getFileHandle(fname,{create:true});
      const writable=await fh.createWritable();
      await writable.write(JSON.stringify(data,null,2));
      await writable.close();
      setFsStatus('saved');
      if(fsStatusTimer.current)clearTimeout(fsStatusTimer.current);
      fsStatusTimer.current=setTimeout(()=>setFsStatus(''),3000);
    }catch(e){setFsStatus('error');console.warn('Folder save failed:',e);}
  },[fsHandle,benchmarkData,allTxns,sm,navByScheme,benchmarks,country,displayCurrency,displayUnit,navRefreshInterval,discountRate,enabled,period]);

  // ── Auto-load on mount ──
  useEffect(()=>{
    const _t=setTimeout(()=>setAppState(s=>s==='loading'?'setup':s),5000);
    try{
      const raw=_store.get(getUserSaveKey(currentUserId));
      if(!raw){clearTimeout(_t);setAppState('setup');return;}
      const state=JSON.parse(raw);
      if(!state?.v||state.v<4){setAppState('setup');return;}
      // Restore transactions
      const txns=state.transactions.map(t=>({...t,date:fromISO(t.date)||new Date(t.date)})).sort((a,b)=>{
        const at=a.date instanceof Date?a.date.getTime():new Date(a.date).getTime();
        const bt=b.date instanceof Date?b.date.getTime():new Date(b.date).getTime();
        return at-bt;
      });
      txns.forEach((t,i)=>{if(!t.folioId)t.folioId=String(i);});
      // Restore NAV (stored as {date,nav} → convert to buildNav format)
      const nb={};
      if(state.navByScheme){
        for(const[name,arr]of Object.entries(state.navByScheme)){
          nb[name]=arr.map(pt=>({d:fromISO(pt.date),v:parseFloat(pt.nav)})).filter(x=>x.d&&x.v>0);
        }
      }
      const smRestored=state.schemeMapping||{};
      setAllTxns(txns);
      setSm(smRestored);
      setNavByScheme(nb);
      if(state.benchmarks?.length)setBenchmarks(state.benchmarks);
      if(state.country)setCountry(state.country);
      if(state.displayCurrency)setDisplayCurrency(state.displayCurrency);
      if(state.displayUnit)setDisplayUnit(state.displayUnit);
      if(state.navRefreshInterval)setNavRefreshInterval(state.navRefreshInterval);
      if(state.discountRate)setDiscountRate(state.discountRate);
    if(state.returnBasis)setReturnBasis(state.returnBasis);
      if(state.period)setPeriod(state.period);
      if(state.showExited!==undefined)setShowExited(state.showExited);
      const schemes=[...new Set(txns.map(t=>t.scheme))].filter(s=>nb[s]);
      const enabledFromSave=state.enabled?.length?new Set(state.enabled.filter(s=>nb[s])):new Set(schemes);
      setEnabled(enabledFromSave);
      clearTimeout(_t);
      setAppState('app');
      // After restoring, fetch fresh NAVs + benchmarks in background
      setTimeout(()=>{
        fetchNavBackground(nb,smRestored);
        (async()=>{
          const data={};
          const blist=state.benchmarks||BENCHMARKS_DEFAULT;
          for(const b of blist.filter(x=>x.enabled)){
            try{
              if(b.type==='market'&&b.ticker){
              const d=await fetchYahooFinance(b.ticker);if(d&&d.length)data[b.id]=d;
            } else if(b.type==='mfapi'&&b.amfiCode){
              const res=await fetch(`https://api.mfapi.in/mf/${b.amfiCode}`,{signal:AbortSignal.timeout(12000)});
              if(res.ok){const j=await res.json();if(j?.data?.length){const arr=buildNav(j.data);if(arr.length)data[b.id]=arr;}}
            }
            }catch{}
          }
          setBenchmarkData(data);
          const niftyData=data['nifty50']||null;
          setAnalyticsMap(computeAllAnalytics(nb,niftyData));
        })();
      },100);
    }catch(e){
      console.warn('Auto-load failed:',e);
      clearTimeout(_t);
      setAppState('setup');
    }
  },[]);

  const onSetupComplete=useCallback(({txns,sm:smIn,navByScheme:nb})=>{
    setAllTxns(txns);setSm(smIn);setNavByScheme(nb);
    txns.forEach((t,i)=>{if(!t.folioId)t.folioId=String(i);});
    const schemes=[...new Set(txns.map(t=>t.scheme))].filter(s=>nb[s]);
    setEnabled(new Set(schemes));
    setAppState('app');
    // Background: benchmarks + analytics
    (async()=>{
      const data={};
      for(const b of benchmarks.filter(x=>x.enabled)){
        try{
          if(b.type==='market'&&b.ticker){
              const d=await fetchYahooFinance(b.ticker);if(d&&d.length)data[b.id]=d;
            } else if(b.type==='mfapi'&&b.amfiCode){
              const res=await fetch(`https://api.mfapi.in/mf/${b.amfiCode}`,{signal:AbortSignal.timeout(12000)});
              if(res.ok){const j=await res.json();if(j?.data?.length){const arr=buildNav(j.data);if(arr.length)data[b.id]=arr;}}
            }
        }catch{}
      }
      setBenchmarkData(data);
      const niftyData=data['nifty50']||null;
      setAnalyticsMap(computeAllAnalytics(nb,niftyData));
      fetchNavBackground(nb,smIn);
    })();
  },[benchmarks,fetchNavBackground]);

  // Full restore from exported JSON — used by SetupFlow "Restore backup" card
  const onImportFromJSON=useCallback((data)=>{
    try{
      // Transactions
      const txns=(data.transactions||[]).map(t=>({...t,date:fromISO(t.date)||new Date(t.date)}))
        .sort((a,b)=>{
          const at=a.date instanceof Date?a.date.getTime():new Date(a.date).getTime();
          const bt=b.date instanceof Date?b.date.getTime():new Date(b.date).getTime();
          return at-bt;
        });
      txns.forEach((t,i)=>{if(!t.folioId)t.folioId=String(i);});
      setAllTxns(txns);
      // Scheme mapping
      if(data.schemeMapping)setSm(data.schemeMapping);
      // Fund NAV cache
      const nb={};
      if(data.navByScheme){
        for(const[name,arr] of Object.entries(data.navByScheme)){
          nb[name]=arr.map(pt=>({d:fromISO(pt.date)||new Date(pt.date),v:parseFloat(pt.nav)})).filter(x=>x.d&&x.v>0);
        }
      }
      setNavByScheme(nb);
      // Benchmark NAV cache
      const bd={};
      if(data.benchmarkNavCache){
        for(const[id,arr] of Object.entries(data.benchmarkNavCache)){
          if(arr?.length)bd[id]=arr.map(pt=>({d:fromISO(pt.date)||new Date(pt.date),v:parseFloat(pt.nav)})).filter(x=>x.d&&x.v>0);
        }
      }
      if(Object.keys(bd).length)setBenchmarkData(bd);
      // Settings
      if(data.benchmarks?.length)setBenchmarks(data.benchmarks);
      if(data.country)setCountry(data.country);
      if(data.displayFmt){const f={...data.displayFmt};setDisplayFmt(f);setDisplayCurrency(f.currency||'INR');setDisplayUnit(f.scale||'auto');G_FMT={...f};G_CURRENCY=f.currency||'INR';G_UNIT=f.scale||'auto';}else if(data.displayCurrency){setDisplayCurrency(data.displayCurrency);G_CURRENCY=data.displayCurrency;}
      if(data.displayUnit)setDisplayUnit(data.displayUnit);
      if(data.navRefreshInterval)setNavRefreshInterval(data.navRefreshInterval);
      if(data.discountRate)setDiscountRate(data.discountRate);
      if(data.period)setPeriod(data.period);
      const schemes=[...new Set(txns.map(t=>t.scheme))].filter(s=>nb[s]);
      const enabledSet=data.enabled?.length?new Set(data.enabled.filter(s=>nb[s])):new Set(schemes);
      setEnabled(enabledSet);
      setAppState('app');
      // Background: fetch any missing benchmark NAV series
      setTimeout(()=>{
        const blist=data.benchmarks||BENCHMARKS_DEFAULT;
        const missing=blist.filter(b=>b.enabled&&!bd[b.id]);
        if(missing.length){
          (async()=>{
            const extra={};
            for(const b of missing){
              try{
                if(b.type==='market'&&b.ticker){const d=await fetchYahooFinance(b.ticker);if(d?.length)extra[b.id]=d;}
                else if(b.type==='mfapi'&&b.amfiCode){
                  const res=await fetch(`https://api.mfapi.in/mf/${b.amfiCode}`,{signal:AbortSignal.timeout(12000)});
                  if(res.ok){const j=await res.json();if(j?.data?.length){const arr=buildNav(j.data);if(arr.length)extra[b.id]=arr;}}
                }
              }catch{}
            }
            if(Object.keys(extra).length)setBenchmarkData(prev=>({...prev,...extra}));
            setAnalyticsMap(computeAllAnalytics(nb,extra['nifty50']||bd['nifty50']||null));
          })();
        } else {
          setAnalyticsMap(computeAllAnalytics(nb,bd['nifty50']||null));
        }
        fetchNavBackground(nb,data.schemeMapping||{});
      },100);
    }catch(e){alert('Import error: '+e.message);}
  },[fetchNavBackground]);

  // ── Export report handlers (App-level, have access to all closures) ──
  const getExportData=useCallback(()=>{
    const pv=portVal(today,sortedTxns,navByScheme,enabledSet);
    const inv=sortedTxns.filter(t=>enabledSet.has(t.scheme)).reduce((s,t)=>{
      const c=clf(t.txType);
      if(c==='buy'||c==='switchin')return s+Math.abs(t.amount||0);
      if(c==='sell'||c==='switchout')return s-Math.abs(t.amount||0);
      return s;
    },0);
    const schemeList=[...new Set(sortedTxns.map(t=>t.scheme))].filter(s=>enabledSet.has(s));
    const holdingsRows=schemeList.map(scheme=>{
      const units=schemeUnits(scheme,today,sortedTxns);
      const nav=getNav(navByScheme[scheme],today);
      const value=nav?units*nav:0;
      const invested=sortedTxns.filter(t=>t.scheme===scheme).reduce((s,t)=>{
        const c=clf(t.txType);
        if(c==='buy'||c==='switchin')return s+Math.abs(t.amount||0);
        if(c==='sell'||c==='switchout')return s-Math.abs(t.amount||0);
        return s;
      },0);
      return{scheme,units,nav,value,invested};
    });
    const fyData=computeFYBreakdown(sortedTxns,navByScheme,enabledSet);
    const benchmarkRows=(benchmarks||[]).map(b=>({label:b.label||b.id,type:b.type,ticker:b.ticker,amfiCode:b.amfiCode,rate:b.rate,enabled:b.enabled}));
    const analyticsRows=Object.entries(analyticsMap||{}).map(([scheme,a])=>({scheme,...(a||{})})).filter(r=>r.cagr!=null||r.sharpe!=null);
    const txDisplay=[...sortedTxns].reverse().slice(0,300);
    const txRows=txDisplay.map(t=>({
      date:t.date instanceof Date?t.date.toLocaleDateString('en-IN'):(t.date||''),
      scheme:(t.scheme||'').substring(0,60),txType:t.txType||'',amount:t.amount,
      units:t.units?Number(t.units).toFixed(3):(t.balUnits?Number(t.balUnits).toFixed(3):''),
      nav:t.price?'₹'+Number(t.price).toFixed(4):(t.nav?'₹'+Number(t.nav).toFixed(4):''),
      folio:t.folioId||'',
    }));
    return{portValue:pv,invested:inv,gain:pv-inv,holdingsRows,fyData,benchmarkRows,analyticsRows,txRows,allTxnsCount:sortedTxns.length,displayCurrency,period,discountRate,generatedAt:new Date().toLocaleString('en-IN')};
  },[sortedTxns,navByScheme,enabledSet,benchmarks,analyticsMap,displayCurrency,period,discountRate,today]);

  const doExportHTML=useCallback((forPrint)=>{
    setExporting(true);setExportOpen(false);
    try{
      const html=buildExportHTML(getExportData());
      if(forPrint){
        const w=window.open('','_blank','width=960,height=720');
        if(!w){alert('Popup blocked — please allow popups for this site.');setExporting(false);return;}
        w.document.write(html);w.document.close();
        setTimeout(()=>{w.focus();w.print();},600);
      }else{
        const blob=new Blob([html],{type:'text/html;charset=utf-8'});
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);
        a.download=`MF-Advisor-Report_${toTS()}.html`;
        document.body.appendChild(a);a.click();
        setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(a.href);},100);
      }
    }catch(e){alert('Export error: '+e.message);}
    finally{setExporting(false);}
  },[getExportData]);

  const doExportWord=useCallback(()=>{
    setExporting(true);setExportOpen(false);
    try{
      const html=buildExportHTML(getExportData());
      const bodyMatch=html.match(/<body>([\s\S]*)<\/body>/i);
      const bodyContent=bodyMatch?bodyMatch[1]:html;
      const wordHtml=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><meta name=ProgId content=Word.Document><!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View></w:WordDocument></xml><![endif]--><style>@page{size:21cm 29.7cm;margin:2cm;} body{font-family:Arial,sans-serif;font-size:10pt;} table{border-collapse:collapse;width:100%;} td,th{border:1pt solid #999;padding:4pt 8pt;font-size:9pt;} th{background:#003366;color:white;font-weight:bold;} h1{font-size:18pt;color:#003366;} h2{font-size:13pt;color:#003366;page-break-before:always;} h2:first-of-type{page-break-before:avoid;} .pos{color:#0a7a0a;font-weight:600;} .neg{color:#cc0000;font-weight:600;} .kpis td{border:1pt solid #c8d8e8;padding:8pt;background:#f0f5fb;} .kpi-label{font-size:8pt;color:#555;text-transform:uppercase;} .kpi-value{font-size:14pt;font-weight:bold;color:#003366;}</style></head><body>${bodyContent}</body></html>`;
      const blob=new Blob(['﻿',wordHtml],{type:'application/msword'});
      const a=document.createElement('a');a.href=URL.createObjectURL(blob);
      a.download=`MF-Advisor-Report_${toTS()}.doc`;
      document.body.appendChild(a);a.click();
      setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(a.href);},100);
    }catch(e){alert('Export error: '+e.message);}
    finally{setExporting(false);}
  },[getExportData]);

  const onReset=()=>{
    if(!window.confirm('Clear all data and start a new analysis? This cannot be undone.'))return;
    _store.remove(getUserSaveKey(currentUserId));

        const txns=state.transactions.map(t=>({...t,date:fromISO(t.date)||new Date(t.date)})).sort((a,b)=>{
          const at=a.date instanceof Date?a.date.getTime():new Date(a.date).getTime();
          const bt=b.date instanceof Date?b.date.getTime():new Date(b.date).getTime();
          return at-bt;
        });
        txns.forEach((t,i)=>{if(!t.folioId)t.folioId=String(i);});
        const nb={};

        const smR=state.schemeMapping||{};
        setAllTxns(txns);setSm(smR);setNavByScheme(nb);
        if(state.benchmarks?.length)setBenchmarks(state.benchmarks);
        if(state.country)setCountry(state.country);
        if(state.displayCurrency)setDisplayCurrency(state.displayCurrency);
        if(state.displayUnit)setDisplayUnit(state.displayUnit);
        if(state.navRefreshInterval)setNavRefreshInterval(state.navRefreshInterval);
      if(state.discountRate)setDiscountRate(state.discountRate);

        const schemes=[...new Set(txns.map(t=>t.scheme))].filter(s=>nb[s]);
        setEnabled(state.enabled?.length?new Set(state.enabled.filter(s=>nb[s])):new Set(schemes));
        setAppState('app');
        setTimeout(()=>{fetchNavBackground(nb,smR);},100);

              {CURRENCIES[displayFmt.currency]?.sym||'₹'}{displayFmt.scale!=='auto'&&displayFmt.scale!=='raw'?(SCALES.find(s=>s.key===displayFmt.scale)?.sfx||''):''}{displayFmt.dec>0?'.'+('0'.repeat(displayFmt.dec)):''}
            </button>
            <PeriodPicker value={period} onChange={setPeriod} minDate={minDate} maxDate={today}/>
            {/* Export full report button */}
            {appState==='app'&&(
              <ErrorBoundary name="ExportBtn">

            {/* Install as app on Android/iOS */}
            <button className="btn no-print" id="pwa-install-btn" style={{display:'none',padding:'4px 10px',
              background:`${C.green}18`,border:`1px solid ${C.green}44`,color:C.green,borderRadius:5,fontSize:10}}>
              ⬇ Install App
            </button>
          </div>
        )}
        {appState==='setup'&&(

      <div style={{flex:1}}>
        {/* Folder auto-file banner */}

          <div style={{margin:'16px 24px 0',padding:'14px 18px',background:`${C.accent}15`,border:`2px solid ${C.accent}44`,borderRadius:12,display:'flex',gap:14,alignItems:'center',flexWrap:'wrap'}}>
            <div style={{flex:1,minWidth:200}}>
              <div style={{fontFamily:'Syne',fontSize:13,fontWeight:700,color:C.accent,marginBottom:3}}>📁 Backup found in your folder</div>
              <div style={{fontSize:11,color:C.muted}}>{folderAutoFile.name} ({folderAutoFile.count} backup{folderAutoFile.count!==1?'s':''} in folder)</div>
            </div>

              style={{padding:'8px 18px',background:`${C.accent}22`,border:`1px solid ${C.accent}66`,color:C.accent,borderRadius:8,fontSize:12,fontWeight:700}}>
              ↑ Restore this backup

              style={{padding:'8px 12px',background:'transparent',border:`1px solid ${C.border}`,color:C.muted,borderRadius:8,fontSize:11}}>
              Dismiss

          </div>

        {/* SIDEBAR */}

              analyticsMap={analyticsMap}

              setAllTxns={setAllTxns}
              discountRate={discountRate}
              setDiscountRate={setDiscountRate}
              returnBasis={returnBasis}
              setReturnBasis={setReturnBasis}/>
          )}
          </ErrorBoundary>
          <ErrorBoundary name="FundOverview" key={`ov-${enabledSet.size}`}>
          {page==='overview'&&(
            <FundOverviewPage
              sortedTxns={sortedTxns}
              navByScheme={navByScheme}
              sm={sm}
              enabled={filteredEnabledSet}
              period={period}
              minDate={minDate}

              allTxns={allTxns}
              setAllTxns={setAllTxns}

          )}
          </ErrorBoundary>
          <ErrorBoundary name="Performance" key={`perf-${enabledSet.size}`}>
          {page==='performance'&&(
            <FundPerformancePage
              sortedTxns={sortedTxns}
              navByScheme={navByScheme}
              sm={sm}
              enabled={filteredEnabledSet}

          <ErrorBoundary name="FYSummary">
          {page==='fysummary'&&(

              navByScheme={navByScheme}
              enabled={filteredEnabledSet}
              benchmarks={benchmarks}
              benchmarkData={benchmarkData}

          )}
          </ErrorBoundary>
          <ErrorBoundary name="XirrReview" key={`xirr-${enabledSet.size}`}>
          {page==='xirr'&&(

              minDate={minDate}/>
          )}
          </ErrorBoundary>
          <ErrorBoundary name="Analysis">
          {page==='analysis'&&(
            <AnalysisPage

          <ErrorBoundary name="NPV">
          {page==='npv'&&(
            <NpvPage

              navByScheme={navByScheme}
              enabled={filteredEnabledSet}
              benchmarks={benchmarks}

              benchmarkData={benchmarkData}
              setBenchmarkData={setBenchmarkData}
              discountRate={discountRate}
              setDiscountRate={setDiscountRate}/>
          )}
          </ErrorBoundary>
          <ErrorBoundary name="Help">
          {page==='help'&&<HelpPage/>}
          </ErrorBoundary>
          <ErrorBoundary name="Compare">
          {page==='compare'&&(
            <PortfolioComparePage
              currentUserId={currentUserId}
              returnBasis={returnBasis}
              navByScheme={navByScheme}
              sortedTxns={sortedTxns}
              today={today}/>
          )}
          </ErrorBoundary>
          <ErrorBoundary name="Settings">
          {page==='settings'&&(
            <SettingsPage
              allTxns={allTxns}
              setAllTxns={setAllTxns}
              sm={sm}
              setSm={setSm}
              navByScheme={navByScheme}
              setNavByScheme={setNavByScheme}
              benchmarks={benchmarks}
              setBenchmarks={setBenchmarks}
              country={country}
              setCountry={setCountry}
              displayCurrency={displayCurrency}
              setDisplayCurrency={setDisplayCurrency}
              displayUnit={displayUnit}
              setDisplayUnit={setDisplayUnit}
              displayFmt={displayFmt}
              applyDisplayFmt={applyDisplayFmt}
              returnBasis={returnBasis}
              setReturnBasis={setReturnBasis}
              currentUserId={currentUserId}
              navRefreshInterval={navRefreshInterval}
              setNavRefreshInterval={setNavRefreshInterval}
              navStatus={navStatus}
              navLastFetched={navLastFetched}
              onRefreshNow={()=>fetchNavBackground(null,null)}
              onNewAnalysis={onReset}
              analyticsMap={analyticsMap}
              fsHandle={fsHandle}
              pickFolder={pickFolder}
              saveToFolder={saveToFolder}
              fsStatus={fsStatus}
              benchmarkData={benchmarkData}/>
          )}
          </ErrorBoundary>
        </div>
      </div>
    )}
    {/* Export Report Modal */}
    {showExportModal&&(
      <ExportReportModal
        onClose={()=>setShowExportModal(false)}
        appData={{
          allTxns,sortedTxns,navByScheme,enabled:enabledSet,
          benchmarks,benchmarkData,analyticsMap,sm,
          displayCurrency,discountRate,period,country,
          fundStats,totalPortVal,today,
        }}/>
    )}
  </div>
  );
}

class RootErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  render(){
    if(this.state.err)return React.createElement('div',{style:{padding:32,fontFamily:'Space Mono',color:'#ff5252',background:'#04080f',minHeight:'100vh'}},
      React.createElement('div',{style:{fontSize:18,fontWeight:700,marginBottom:8}},'⚠ Application Error'),
      React.createElement('div',{style:{fontSize:12,marginBottom:12}},String(this.state.err.message||this.state.err)),
      React.createElement('button',{onClick:()=>{try{_store.remove('mfa_active_user');}catch{}window.location.reload();},
        style:{padding:'8px 20px',background:'#ff525222',border:'1px solid #ff5252',color:'#ff5252',borderRadius:6,cursor:'pointer',fontSize:13}},'Reload App'),
      React.createElement('div',{style:{marginTop:8,fontSize:11,color:'#607080'}},'Open DevTools (F12) for details.')
    );
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(RootErrorBoundary,null,React.createElement(App,null)));
</script>

<script>
// PWA Install — Android Chrome/Edge: shows "Install App" button in header
let pwaPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();pwaPrompt=e;
  const btn=document.getElementById('pwa-install-btn');
  if(btn){
    btn.style.display='';
    btn.onclick=async()=>{
      if(!pwaPrompt)return;
      pwaPrompt.prompt();
      const{outcome}=await pwaPrompt.userChoice;
      if(outcome==='accepted'){btn.style.display='none';pwaPrompt=null;}
    };
  }
});
// iOS Safari: no beforeinstallprompt — show one-time tip after 3s
const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent.toLowerCase())&&!window.MSStream;
const inStandalone=window.matchMedia('(display-mode:standalone)').matches||window.navigator.standalone;
if(isIOS&&!inStandalone&&!sessionStorage.getItem('mfa-ios-tip')){
  sessionStorage.setItem('mfa-ios-tip','1');
  setTimeout(()=>{
    const d=document.createElement('div');
    d.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0d1f38;border:1px solid #00c8ff55;color:#cdd9f0;padding:14px 20px;border-radius:12px;font-size:12px;z-index:9999;text-align:center;max-width:300px;box-shadow:0 4px 24px #00000099;line-height:1.6;';
    d.innerHTML='📲 <strong style="color:#00c8ff">Install MF Advisor on iPhone/iPad:</strong><br>Tap <strong>Share ⬆</strong> → <strong>Add to Home Screen</strong><br><button onclick="this.closest('div').remove()" style="margin-top:10px;padding:5px 14px;background:#00c8ff18;border:1px solid #00c8ff44;color:#00c8ff;border-radius:5px;font-size:11px;cursor:pointer;">Got it ✓</button>';
    document.body.appendChild(d);
    setTimeout(()=>{if(d.parentNode)d.remove();},15000);
  },3000);
}
</script>
