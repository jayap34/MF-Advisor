/* ErrorBoundary — catches render errors and shows a diagnostic instead of blank screen */
class ErrorBoundary extends Component{
  constructor(props){super(props);this.state={error:null,info:null};}
  static getDerivedStateFromError(e){return{error:e};}
  componentDidCatch(e,info){this.setState({error:e,info});}
  reset(){this.setState({error:null,info:null});}
  render(){
    if(this.state.error){
      const e=this.state.error;
      return(
        <div style={{padding:24,background:'#0b0510',border:'1px solid #4a0010',borderRadius:12,margin:16,fontFamily:'Space Mono',fontSize:12}}>
          <div style={{color:'#ff5252',fontWeight:700,fontSize:16,marginBottom:10}}>⚠ Render Error in {this.props.name||'component'}</div>
          <div style={{color:'#ffab00',marginBottom:8}}>{String(e)}</div>
          <pre style={{color:'#7a9aaa',fontSize:10,maxHeight:200,overflow:'auto',whiteSpace:'pre-wrap',marginBottom:14}}>
            {e.stack?.slice(0,600)}
          </pre>
          <button onClick={()=>this.reset()} style={{padding:'6px 14px',background:'transparent',border:'1px solid #4a6a8a',color:'#7a9aaa',borderRadius:6,cursor:'pointer',fontSize:12}}>
            Retry
          </button>
          <div style={{marginTop:10,color:'#4a6a8a',fontSize:10}}>
            Open browser DevTools (F12) → Console for full stack trace.
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

// Single global format config — mutated by App, read by FMT()
let G_FMT={currency:'INR',scale:'auto',dec:2,neg:'minus',sep:'indian',zero:'0',custom:'',
           rates:{INR:1,USD:0.012,EUR:0.011,GBP:0.0094,AED:0.044,SGD:0.016}};

// Custom format string parser (Excel-style: ₹#,##0.00 or #,##0 Cr or (#,##0))
function customFmt(value,pat,sym){
  if(!pat)return sym+Math.abs(value).toLocaleString('en-IN');
  const neg=value<0; const absV=Math.abs(value);
  const wrap=pat.startsWith('(')&&pat.endsWith(')');
  const inner=wrap?pat.slice(1,-1):pat;
  const m=inner.match(/^([^#0,]*)([#0,]+[.]?[#0]*)(.*)?$/);
  if(!m)return(neg?'−':'')+sym+absV.toLocaleString('en-IN');
  const pre=(m[1]||sym); const pat2=m[2]; const suf=(m[3]||'').trim();
  const hasSep=pat2.includes(',');
  const dotIdx=pat2.indexOf('.'); const dec=dotIdx>=0?pat2.length-dotIdx-1:0;
  const rounded=parseFloat(absV.toFixed(dec));
  const numStr=hasSep?rounded.toLocaleString('en-IN',{minimumFractionDigits:dec,maximumFractionDigits:dec}):rounded.toFixed(dec);
  const formatted=pre+numStr+(suf?' '+suf:'');
  if(neg)return wrap?'('+formatted+')':'−'+formatted;
  return formatted;
}

// Main formatter — reads G_FMT, called as FMT(value)
function applyFMT(v,opt){
  if(v==null||isNaN(v))return'—';
  opt=opt||G_FMT;
  const cur=CURRENCIES[opt.currency]||CURRENCIES.INR;
  const rate=(opt.rates&&opt.rates[opt.currency])||cur.rate;
  const converted=v*rate;
  const isNeg=converted<0;
  const absVal=Math.abs(converted);
  if((opt.scale==='custom')&&opt.custom){return customFmt(converted,opt.custom,cur.sym);}
  let div=1,sfx='';
  if(!opt.scale||opt.scale==='auto'){
    if(opt.currency==='INR'||opt.currency==='AED'){
      if(absVal>=1e7){div=1e7;sfx=' Cr';}
      else if(absVal>=1e5){div=1e5;sfx=' L';}
      else if(absVal>=1e3){div=1e3;sfx='K';}
    } else {
      if(absVal>=1e9){div=1e9;sfx='B';}
      else if(absVal>=1e6){div=1e6;sfx='M';}
      else if(absVal>=1e3){div=1e3;sfx='K';}
    }
  } else {
    const sc=SCALES.find(s=>s.key===opt.scale);
    if(sc&&sc.div&&sc.div>1){div=sc.div;sfx=sc.sfx?' '+sc.sfx:'';}
  }
  const scaled=absVal/div;
  const dec=opt.dec!=null?opt.dec:2;
  const sepFn=opt.sep==='intl'?v2=>v2.toLocaleString('en-US'):opt.sep==='none'?v2=>String(v2):v2=>v2.toLocaleString('en-IN');
  let numStr;
  if(dec===0){numStr=sepFn(Math.round(scaled));}
  else{const r=parseFloat(scaled.toFixed(dec));const pts=r.toFixed(dec).split('.');numStr=sepFn(parseFloat(pts[0]))+'.'+pts[1];}
  const result=cur.sym+numStr+sfx;
  if(isNeg){if(opt.neg==='parens')return'('+result+')';if(opt.neg==='abs')return result;return'−'+result;}
  return result;
}

function FMT(v){return applyFMT(v,G_FMT);}

══════════════════════════════════════════ */
function clf(t){
  // Returns: buy | sell | dreinvest | div | switchin | switchout
  const s=(t||'').toLowerCase();
  if(s.includes('switch')){
    // "Switch In" adds units to this scheme; "Switch Out" removes them
    if(/switch.*in|switched.*in/i.test(t)||s.endsWith(' in')||s.includes('- in')||s.includes('to '))
      return 'switchin';
    return 'switchout'; // switch out or unknown switch direction → remove units
  }
  if(s.includes('dividend reinvest'))return 'dreinvest';
  if(s.includes('dividend'))return 'div';
  if(/redemption|sell/.test(s))return 'sell';
  return 'buy';
}

// Returns +1 (units received) or -1 (units given up)
function unitSign(txType){
  const c=clf(txType);
  if(c==='buy'||c==='dreinvest'||c==='switchin')return 1;
  if(c==='sell'||c==='switchout')return -1;
  return 0; // div (cash dividend, no units change)
}

function buildNav(raw){
  return (raw||[]).map(d=>{
    const[dd,mm,yy]=(d.date||'').split('-');
    return{d:new Date(+yy,+mm-1,+dd),v:parseFloat(d.nav)};
  }).filter(x=>!isNaN(x.d.getTime())&&x.v>0).sort((a,b)=>a.d-b.d);
}
function getNav(arr,tgt){
  if(!arr?.length)return null;
  let lo=0,hi=arr.length-1;
  while(lo<=hi){const m=(lo+hi)>>1;arr[m].d<=tgt?(lo=m+1):(hi=m-1);}
  return hi>=0?arr[hi].v:null;
}

// ── UNIT ACCUMULATION (source-agnostic, works for both CAMS imports and manual txns) ──
// Both portVal and schemeUnits now accumulate via unitSign(txType) * t.units
// rather than reading t.balUnits (which is only reliable for CAMS-imported rows).
// t.units must always be the NUMBER OF UNITS IN THAT TRANSACTION (not cumulative balance).
// resolveUnits: units transacted in a single manual row.
// Only used for manual transactions — CAMS rows use t.balUnits (authoritative).
function resolveUnits(t){
  const u=Math.abs(t.units||0);
  if(u>0.00001)return u;
  const amt=Math.abs(t.amount||0);
  const pr=Math.abs(t.price||0);
  if(amt>0&&pr>0)return amt/pr;
  return 0;
}

// _computeBalances — HYBRID balance resolution:
//   CAMS rows (source='import'):    SET   bal[key] = t.balUnits  (authoritative CAMS running balance)
//   Manual rows (any other source): DELTA bal[key] += unitSign × resolveUnits(t)
//
// Why hybrid? CAMS balUnits is the statement's own cumulative total — reliable even when
// t.units is blank/0.  Manual rows have no authoritative balance, so we accumulate.
// Processing in date order means each CAMS row "resets" the folio balance to ground truth,
// and manual rows added before/after are correctly applied on top.
function _computeBalances(atDate,sortedTxns,enabledSet,schemeFilter){
  const atT=atDate instanceof Date?atDate.getTime():new Date(atDate).getTime();
  const bal={}; // key -> {scheme, units}
  for(const t of sortedTxns){
    const tT=t.date instanceof Date?t.date.getTime():new Date(t.date).getTime();
    if(tT>atT)break;
    if(enabledSet&&!enabledSet.has(t.scheme))continue;
    if(schemeFilter&&t.scheme!==schemeFilter)continue;
    const fk=schemeFilter?(t.folioId??'0'):`${t.scheme}|${t.folioId??'0'}`;
    if(!bal[fk])bal[fk]={scheme:t.scheme,units:0};
    if(t.source==='import'){
      // CAMS row: balUnits is the cumulative balance after this transaction — use directly
      bal[fk].units=t.balUnits??0;
    } else {
      // Manual row: delta
      const sign=unitSign(t.txType);
      if(sign!==0){
        const u=resolveUnits(t);
        if(u>0.00001)bal[fk].units+=sign*u;
      }
    }
  }
  return bal;
}

// Keep _accumUnits as alias for backward compat (used in diagnostics)
function _accumUnits(scheme,atDate,sortedTxns,enabledSet,perScheme){
  return _computeBalances(atDate,sortedTxns,enabledSet,perScheme?scheme:null);
}

function portVal(atDate,sortedTxns,navByScheme,enabledSet){
  const bal=_computeBalances(atDate,sortedTxns,enabledSet,null);
  let v=0;
  for(const{scheme,units}of Object.values(bal)){
    if(units<0.001)continue;
    const n=getNav(navByScheme[scheme],atDate);
    if(n)v+=units*n;
  }
  return v;
}

// Returns total balance units for a scheme at a date (folio-aware)
function schemeUnits(scheme,atDate,sortedTxns){
  const bal=_computeBalances(atDate,sortedTxns,null,scheme);
  return Object.values(bal).reduce((s,e)=>s+Math.max(0,e.units),0);
}

// XIRR — Newton-Raphson IRR for irregular cash flows
function xirr(cfs,dates,g=0.15){
  if(!cfs||cfs.length<2||!cfs.some(c=>c>0)||!cfs.some(c=>c<0))return null;
  const B=dates[0].getTime(),Y=YMS;
  const t=dates.map(d=>(d.getTime()-B)/Y);
  const f=r=>cfs.reduce((s,c,i)=>s+c*Math.pow(1+r,-t[i]),0);
  const fp=r=>cfs.reduce((s,c,i)=>s-t[i]*c*Math.pow(1+r,-t[i]-1),0);
  let r=g;
  for(let i=0;i<300;i++){
    const fv=f(r),fpv=fp(r);
    if(!isFinite(fv)||Math.abs(fpv)<1e-14)break;
    const nr=r-fv/fpv;if(!isFinite(nr))break;
    if(Math.abs(nr-r)<1e-9)return nr;r=Math.max(-0.9999,nr);
  }
  return null;
}

// Net invested (buys minus redemptions)
function computeInvested(upToDate,sortedTxns,enabledSet){
  const atT=upToDate instanceof Date?upToDate.getTime():new Date(upToDate).getTime();
  let inv=0,red=0;
  for(const t of sortedTxns){
    const tT=t.date instanceof Date?t.date.getTime():new Date(t.date).getTime();
    if(tT>atT)break;
    if(enabledSet&&!enabledSet.has(t.scheme))continue;
    const c=clf(t.txType);
    if(c==='buy'||c==='switchin'||c==='dreinvest')inv+=Math.abs(t.amount||0);
    else if(c==='sell'||c==='switchout')red+=Math.abs(t.amount||0);
  }
  return{invested:inv,redeemed:red,net:inv-red};
}

// XIRR for a single scheme over optional window
function computeXirrForScheme(schemeName,asOf,winStart,sortedTxns,navByScheme){
  try{
    const cfs=[],cfd=[];
    const set=new Set([schemeName]);
    const asOfT=asOf instanceof Date?asOf.getTime():new Date(asOf).getTime();
    const winT=winStart?(winStart instanceof Date?winStart.getTime():new Date(winStart).getTime()):null;
    if(winT){const wv=portVal(winStart,sortedTxns,navByScheme,set);if(wv>100){cfs.push(-wv);cfd.push(new Date(winT));}}
    for(const t of sortedTxns){
      const tT=t.date instanceof Date?t.date.getTime():new Date(t.date).getTime();
      if(tT>asOfT)break;
      if(t.scheme!==schemeName)continue;
      if(winT&&tT<winT)continue;
      const c=clf(t.txType);
      const a=Math.abs(t.amount||0);if(a<1)continue;
      const d=new Date(t.date);
      if(c==='buy'||c==='switchin'||c==='dreinvest'){cfs.push(-a);cfd.push(d);}
      else if(c==='sell'||c==='switchout'){cfs.push(a);cfd.push(d);}
      else if(c==='div'){cfs.push(a);cfd.push(d);}
    }
    const pv=portVal(asOf,sortedTxns,navByScheme,set);
    if(pv>100){cfs.push(pv);cfd.push(new Date(asOf));}
    return xirr(cfs,cfd);
  }catch{return null;}
}

// FIFO cost basis — folio-aware
// Returns {costBasis, costPerUnit, realizedGain, dividends, totalUnits}
// All purchases/switch-ins add lots (oldest first consumed on sell).
// Dividend cash payouts are counted; dividend reinvestment adds a lot.
function computeFIFO(scheme,upToDate,sortedTxns){
  const atT=upToDate instanceof Date?upToDate.getTime():new Date(upToDate).getTime();
  const lots=[];
  let realizedGain=0,dividends=0;
  for(const t of sortedTxns){
    const tT=t.date instanceof Date?t.date.getTime():new Date(t.date).getTime();
    if(tT>atT)break;
    if(t.scheme!==scheme)continue;
    const c=clf(t.txType);
    const txUnits=resolveUnits(t);
    const price=t.price||0;
    const amount=Math.abs(t.amount||0);
    if(c==='buy'||c==='switchin'){
      if(txUnits>0.001)lots.push({units:txUnits,price:price||(txUnits>0?amount/txUnits:0),date:t.date});
    } else if(c==='dreinvest'){
      // Dividend reinvestment: adds units at reinvestment NAV
      if(txUnits>0.001)lots.push({units:txUnits,price:price||(txUnits>0?amount/txUnits:0),date:t.date});
    } else if(c==='sell'||c==='switchout'){
      let remaining=txUnits;
      const proceeds=amount;
      let cost=0;
      while(remaining>0.001&&lots.length>0){
        const lot=lots[0];
        if(lot.units<=remaining+0.001){remaining-=lot.units;cost+=lot.units*lot.price;lots.shift();}
        else{cost+=remaining*lot.price;lot.units-=remaining;remaining=0;}
      }
      realizedGain+=proceeds-cost;
    } else if(c==='div'){
      dividends+=amount; // cash dividend payout
    }
  }
  const costBasis=lots.reduce((a,l)=>a+l.units*l.price,0);
  const totalUnits=lots.reduce((a,l)=>a+l.units,0);
  return{costBasis,costPerUnit:totalUnits>0?costBasis/totalUnits:0,realizedGain,dividends,totalUnits};
}

function computePortfolioXirr(asOf,winStart,sortedTxns,navByScheme,enabledSet){
  // Portfolio-level XIRR:
  //   If winStart given → cash flow[0] = -portVal(winStart), then only transactions WITHIN window.
  //   External cash flows only: buy/SIP/switchin/dreinvest = outflows (-); sell/switchout = inflows (+).
  //   Switches between funds within portfolio are BOTH an outflow (switchout) and inflow (switchin)
  //   at the same amount, so they cancel at portfolio level — safe to include both or exclude both.
  //   Dividend Reinvestment: no external cash movement, exclude.
  const cfs=[],cfd=[];
  const asOfT=asOf instanceof Date?asOf.getTime():new Date(asOf).getTime();
  const winT=winStart?(winStart instanceof Date?winStart.getTime():new Date(winStart).getTime()):null;

  // Opening value (if windowed)
  if(winT){
    const wv=portVal(winStart,sortedTxns,navByScheme,enabledSet);
    if(wv>100){cfs.push(-wv);cfd.push(new Date(winT));}
  }

  for(const t of sortedTxns){
    const tT=t.date instanceof Date?t.date.getTime():new Date(t.date).getTime();
    if(tT>asOfT)break;                         // past end of window
    if(winT&&tT<winT)continue;                 // before start of window  ← THE KEY FIX
    if(enabledSet&&!enabledSet.has(t.scheme))continue;
    const c=clf(t.txType);
    const a=Math.abs(t.amount||0);
    if(a<1)continue;
    const d=new Date(t.date);
    if(c==='buy'||c==='switchin'){cfs.push(-a);cfd.push(d);}         // cash leaves investor
    else if(c==='sell'||c==='switchout'){cfs.push(a);cfd.push(d);}   // cash returns to investor
    else if(c==='div'){cfs.push(a);cfd.push(d);}                      // cash dividend received
    // dreinvest: no external cash flow — skip
  }

  const pv=portVal(asOf,sortedTxns,navByScheme,enabledSet);
  if(pv>100){cfs.push(pv);cfd.push(new Date(asOf));}
  return{x:xirr(cfs,cfd),pv};
}

// PPF equivalent value for a series of investments
// computePPF: hypothetical value if all invested amounts had gone into PPF instead.
// Uses a synthetic compounding NAV (identical logic to computeBenchmark) so redemptions
// reduce the corpus proportionally — matching how computeBenchmark handles sells.
// nav(t) = 100 × (1+rate)^((t−t0)/YMS), where t0 = date of the first eligible buy.
function computePPF(atDate,sortedTxns,enabledSet,rate=0.071){
  const atT=atDate instanceof Date?atDate.getTime():new Date(atDate).getTime();
  // Find reference date t0 = earliest buy within enabled set
  let t0=null;
  for(const t of sortedTxns){
    if(enabledSet&&!enabledSet.has(t.scheme))continue;
    const c=clf(t.txType);
    if(c==='buy'||c==='switchin'||c==='dreinvest'){
      t0=t.date instanceof Date?t.date.getTime():new Date(t.date).getTime();
      break;
    }
  }
  if(t0===null)return 0;
  // Synthetic NAV: ₹100 at t0, compounding at `rate` p.a.
  const nav=tMs=>100*Math.pow(1+rate,(tMs-t0)/YMS);
  let units=0;
  for(const t of sortedTxns){
    const tT=t.date instanceof Date?t.date.getTime():new Date(t.date).getTime();
    if(tT>atT)break;
    if(enabledSet&&!enabledSet.has(t.scheme))continue;
    const c=clf(t.txType);
    const amt=Math.abs(t.amount||0);if(amt<1)continue;
    const n=nav(tT);
    if(c==='buy'||c==='switchin'||c==='dreinvest'){
      units+=amt/n;
    } else if(c==='sell'||c==='switchout'){
      // Proportional redemption — same logic as computeBenchmark
      const corpus=units*n;
      if(corpus>0)units-=(amt/corpus)*units;
    }
  }
  return Math.max(0,units*nav(atT));
}

// Market benchmark equivalent
// computeBenchmark: hypothetical corpus if all cash flows went into this benchmark.
// Falls back to first available NAV for transactions that predate the data series,
// and always returns last available NAV for atDate beyond the data end (weekends etc.)
function computeBenchmark(atDate,sortedTxns,enabledSet,benchmarkData){
  if(!benchmarkData?.length)return null;
  const atT=atDate instanceof Date?atDate.getTime():new Date(atDate).getTime();
  const firstNav=benchmarkData[0].v;   // earliest available price
  const lastNav=benchmarkData[benchmarkData.length-1].v; // latest available price
  // navAt: returns best available price at date d; never null
  const navAt=d=>{const n=getNav(benchmarkData,d);return n??firstNav;};
  let units=0;
  for(const t of sortedTxns){
    const tT=t.date instanceof Date?t.date.getTime():new Date(t.date).getTime();
    if(tT>atT)break;
    if(enabledSet&&!enabledSet.has(t.scheme))continue;
    const c=clf(t.txType);
    const amt=Math.abs(t.amount||0);if(amt<1)continue;
    const n=navAt(t.date);
    if(c==='buy'||c==='switchin'||c==='dreinvest'){
      units+=amt/n;
    } else if(c==='sell'||c==='switchout'){
      const corpus=units*n;
      if(corpus>0)units-=Math.min(units,(amt/corpus)*units);
    }
  }
  // Use last known NAV if atDate is beyond data end (weekends, market holiday)
  const curNav=getNav(benchmarkData,atDate)??lastNav;
  return Math.max(0,units*curNav);
}

// FY-wise breakdown
function computeFYBreakdown(sortedTxns,navByScheme,enabledSet){
  const fyMap={};
  for(const t of sortedTxns){
    if(enabledSet&&!enabledSet.has(t.scheme))continue;
    if(!t.date)continue;
    const fy=getIndiaFY(t.date);
    if(!fyMap[fy])fyMap[fy]={fy,invested:0,redeemed:0,dividends:0};
    const c=clf(t.txType);
    if(c==='buy'||c==='switchin')fyMap[fy].invested+=Math.abs(t.amount);
    else if(c==='sell'||c==='switchout')fyMap[fy].redeemed+=Math.abs(t.amount);
    else if(c==='div')fyMap[fy].dividends+=Math.abs(t.amount);
    // dreinvest: no external cash — not counted as invested
  }
  return Object.values(fyMap).sort((a,b)=>a.fy.localeCompare(b.fy));
}

/* ══════════════════════════════════════════
   SECTION 3b — ANALYTICS ENGINE
   Computes risk metrics from NAV history:
   Mean Return, StdDev, Sharpe, Sortino, Beta, Alpha, MaxDrawdown
   All figures annualised. Risk-free = 7% p.a. (India PPF/savings)
══════════════════════════════════════════ */
const RF = 0.07; // 7% annual risk-free rate

function sampleMonthly(navArr){
  if(!navArr||navArr.length<2)return[];
  const byMonth={};
  for(const pt of navArr){
    const k=`${pt.d.getFullYear()}-${String(pt.d.getMonth()).padStart(2,'0')}`;
    byMonth[k]=pt;
  }
  return Object.values(byMonth).sort((a,b)=>a.d-b.d);
}

function computeFundAnalytics(name,navByScheme,benchmarkNifty){
  const navArr=navByScheme[name];
  if(!navArr||navArr.length<30)return null;
  const monthly=sampleMonthly(navArr);
  if(monthly.length<12)return null;
  const rets=[];
  for(let i=1;i<monthly.length;i++){
    const p=monthly[i-1].v,c=monthly[i].v;
    if(p>0)rets.push((c-p)/p);
  }
  if(rets.length<6)return null;
  const n=rets.length;
  const mean=rets.reduce((a,b)=>a+b,0)/n;
  const annMean=mean*12;
  const variance=rets.reduce((a,b)=>a+(b-mean)**2,0)/n;
  const stdDev=Math.sqrt(variance);
  const annStdDev=stdDev*Math.sqrt(12);
  const sharpe=annStdDev>0?(annMean-RF)/annStdDev:null;
  const rfMo=RF/12;
  const negEx=rets.map(r=>Math.min(0,r-rfMo));
  const dsVar=negEx.reduce((a,b)=>a+b*b,0)/n;
  const dsDev=Math.sqrt(dsVar)*Math.sqrt(12);
  const sortino=dsDev>0?(annMean-RF)/dsDev:null;
  let beta=null,alphaPct=null;
  if(benchmarkNifty?.length>10){
    const bm=sampleMonthly(benchmarkNifty);
    const bmRets=[];
    for(let i=1;i<bm.length;i++){const p=bm[i-1].v,c=bm[i].v;if(p>0)bmRets.push((c-p)/p);}
    const aligned=[];
    for(let i=1;i<monthly.length;i++){
      const d=monthly[i].d;
      const k=`${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}`;
      const bi=bm.findIndex(p=>`${p.d.getFullYear()}-${String(p.d.getMonth()).padStart(2,'0')}`===k);
      if(bi>0&&bmRets[bi-1]!=null)aligned.push({f:rets[i-1],m:bmRets[bi-1]});
    }
    if(aligned.length>=12){
      const nv=aligned.length;
      const fm=aligned.reduce((a,p)=>a+p.f,0)/nv;
      const mm=aligned.reduce((a,p)=>a+p.m,0)/nv;
      const cov=aligned.reduce((a,p)=>a+(p.f-fm)*(p.m-mm),0)/nv;
      const mVar=aligned.reduce((a,p)=>a+(p.m-mm)**2,0)/nv;
      if(mVar>0){
        beta=cov/mVar;
        const mAnn=mm*12;
        alphaPct=(annMean-(RF+beta*(mAnn-RF)))*100;
      }
    }
  }
  let peak=navArr[0].v,maxDD=0;
  for(const pt of navArr){
    if(pt.v>peak)peak=pt.v;
    const dd=(peak-pt.v)/peak;
    if(dd>maxDD)maxDD=dd;
  }
  return{
    meanReturnPct:annMean*100,stdDevPct:annStdDev*100,
    sharpe,sortino,beta,alphaPct,maxDrawdownPct:maxDD*100,
    monthsAnalyzed:n,
  };
}

function computeAllAnalytics(navByScheme,benchmarkNifty){
  const res={};
  for(const name of Object.keys(navByScheme)){
    try{res[name]=computeFundAnalytics(name,navByScheme,benchmarkNifty);}
    catch{res[name]=null;}
  }
  return res;
}

const ACTION_COLORS={
  'REVIEW':   '#ff5252',
  'REBALANCE':'#ffab00',

  'MONITOR':  '#c084fc',
  'SWITCH':   '#ffab00',
  'CLOSED':   '#4a6a8a',
};

function genPortfolioRecs(fundStats,analyticsMap,totalVal){
  const recs=[];
  for(const f of fundStats){
    if(f.currentVal<1000&&f.invested<1000)continue;
    const an=analyticsMap?.[f.name];
    const xirr=f.xirr??0; // decimal e.g. 0.14
    const pct=totalVal>0?f.currentVal/totalVal*100:0;
    const reasons=[];
    let action='HOLD',priority=4;

    if(f.exited){action='CLOSED';priority=5;reasons.push('Fully redeemed — historical record only.');}
    else{
      // Rule 1: below risk-free rate
      if(xirr<RF&&f.invested>50000){
        action='REVIEW';priority=1;
        reasons.push(`All-time XIRR ${(xirr*100).toFixed(1)}% is below risk-free rate (7%). Consider switching to a better performing fund in same category.`);
      }
      // Rule 2: negative Sharpe
      if(an?.sharpe!=null&&an.sharpe<0){
        if(priority>1){action='REVIEW';priority=1;}
        reasons.push(`Sharpe ratio ${an.sharpe.toFixed(2)} is negative — insufficient return for risk taken. Risk-free savings account would perform better on a risk-adjusted basis.`);
      }
      // Rule 3: concentration
      if(pct>30){
        if(priority>2){action='REBALANCE';priority=2;}
        reasons.push(`Concentration ${pct.toFixed(1)}% exceeds 25-30% guideline. Over-concentration increases unsystematic risk.`);
      }
      // Rule 4: negative alpha
      if(an?.alphaPct!=null&&an.alphaPct<-3){
        if(priority>2){action='SWITCH';priority=2;}
        reasons.push(`Alpha ${an.alphaPct.toFixed(1)}% pa is negative — fund underperforms benchmark after adjusting for market risk (β=${an.beta?.toFixed(2)}). A Nifty index fund would have served better.`);
      }
      // Rule 5: great Sortino
      if(an?.sortino!=null&&an.sortino>1.5&&xirr>0.14){
        if(priority>3){action='INCREASE';priority=3;}
        reasons.push(`Sortino ${an.sortino.toFixed(2)} (>1.5) indicates strong upside capture with low downside. Excellent candidate for SIP increase.`);
      }
      // Rule 6: good performer hold
      if(xirr>0.16&&reasons.length===0){
        reasons.push(`Strong XIRR ${(xirr*100).toFixed(1)}%${an?.sharpe!=null?` with Sharpe ${an.sharpe.toFixed(2)}`:''}. Continue SIP.`);
      }
      // Rule 7: high volatility
      if(an?.stdDevPct!=null&&an.stdDevPct>24&&f.currentVal>100000&&priority>3){
        action='MONITOR';priority=3;
        reasons.push(`StdDev ${an.stdDevPct.toFixed(1)}% is high. Suitable only for 7+ year horizon with high risk tolerance.`);
      }
    }
    if(reasons.length===0)reasons.push('No specific action required. Monitor periodically.');
    recs.push({name:f.name,currentVal:f.currentVal,xirr,pct,action,reasons,priority,
      sharpe:an?.sharpe,sortino:an?.sortino,beta:an?.beta,alpha:an?.alphaPct});
  }
  return recs.sort((a,b)=>a.priority-b.priority);
}

    amcB=AMC_LOCK[fw].every(r=>mf.includes(r))?8:(Object.keys(AMC_LOCK).some(k=>k!==fw&&AMC_LOCK[k].every(r=>mf.includes(r)))?-20:-5);
  } else if(words.length>=2){
    const tw=fw+' '+words[1];
    for(const k in AMC_LOCK){const v=AMC_LOCK[k];if(v.length>=2&&v.every(r=>tw.includes(r))){amcB=v.every(r=>mf.includes(r))?8:(Object.keys(AMC_LOCK).some(k2=>k2!==k&&AMC_LOCK[k2].every(r=>mf.includes(r)))?-20:-5);break;}}
  }
  let catP=0;
  for(const cw of CAT_WORDS){const inMF=mf.includes(cw),inC=c.includes(cw);if(inMF&&!inC)catP-=5;if(inC&&!inMF)catP-=3;}
  const matched=words.filter(w=>mf.includes(w)).length;
  if(matched<Math.max(1,words.length-1))return 0;
  let s=matched+amcB+catP;
  const mfd=/direct/i.test(mfName),mfr=/regular/i.test(mfName),mfi=/idcw|dividend/i.test(mfName),mfg=/growth/i.test(mfName);
  if(direct&&mfd)s+=3;if(!direct&&mfr)s+=3;if(direct&&mfr)s-=3;if(!direct&&mfd)s-=3;
  if(idcw&&mfi)s+=2;if(!idcw&&mfg)s+=2;if(idcw&&mfg)s-=2;if(!idcw&&mfi)s-=2;
  return s;
}

// ── Multi-format import parsers ─────────────────────────────────
function detectFormat(rows){
  const preview=rows.slice(0,15).map(r=>r.map(v=>String(v||'').toLowerCase()).join('|'));
  const joined=preview.join('|');
  // CAMS Current Value report: has 'balance units' or 'market value' but NO transaction date
  if((joined.includes('balance units')||joined.includes('market value'))&&!joined.includes('transaction date'))return'cams_cv';
  if(joined.includes('folio number')&&joined.includes('purchase'))return'cams_xlsx';
  if(joined.includes('tran date')||joined.includes('tran type'))return'kfintech';
  if(joined.includes('transaction date')&&joined.includes('scheme name'))return'cams_xls';
  if(joined.includes('date')&&joined.includes('scheme'))return'generic_csv';
  return'cams_xls';
}
// Parse CAMS Current Value XLSX — extracts scheme→{units,nav,value} mapping
// Used to seed scheme mapping + NAV values, not as a transaction source
function parseCAMSCurrentValue(rows){
  const H=rows[0]?rows[0].map(v=>String(v||'').toLowerCase().trim()):[];
  const cS=H.findIndex(h=>h.includes('scheme'));
  const cU=H.findIndex(h=>h.includes('balance')||h.includes('units'));
  const cN=H.findIndex(h=>h.includes('nav')||h.includes('price'));
  const cV=H.findIndex(h=>h.includes('market value')||h.includes('current value')||h.includes('value'));
  const cF=H.findIndex(h=>h.includes('folio'));
  const cI=H.findIndex(h=>h.includes('isin'));
  if(cS<0)throw new Error('CAMS CV: cannot find Scheme column.');
  const out=[];
  const today=new Date();today.setHours(0,0,0,0);
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    const scheme=String(r[cS]||'').trim();if(!scheme||scheme==='--')continue;
    const units=cU>=0?Math.abs(parseFloat(r[cU])||0):0;if(units<0.001)continue;
    const nav=cN>=0?parseFloat(r[cN])||0:0;
    const val=cV>=0?parseFloat(r[cV])||0:units*nav;
    const folioId=cF>=0?String(r[cF]||''):String(i);
    const isin=cI>=0?String(r[cI]||'').trim().toUpperCase().replace(/[^A-Z0-9]/g,''):'';
    // Synthesise a single 'current holding' row — no transaction date, just snapshot
    out.push({id:'cv-'+i,date:today,scheme,isin,txType:'Investment in fund',
      price:nav,units,balUnits:units,amount:val,mv:val,folioId,source:'cv_import'});
  }
  if(!out.length)throw new Error('CAMS CV: no valid holdings found. Check the file format.');
  return out;
}

  const ci=(...ns)=>{for(const n of ns){const idx=H.findIndex(h=>ns.some(n2=>h.includes(n2)));if(idx>=0)return idx;}return -1};
  const cD=H.findIndex(h=>h.includes('date'));

  if(cD<0||cS<0||cT<0)throw new Error('CAMS XLSX: cannot find Date, Scheme, Type columns.');
  const out=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i];

    let date=null;

    else if(typeof rd==='string'&&rd.includes('-')){const p=rd.split('-');if(p.length===3){const y=p[0].length===4?+p[0]:(+('20'+p[2].slice(-2)));const m=p[0].length===4?+p[1]-1:+p[1]-1;const d=p[0].length===4?+p[2]:+p[0];date=new Date(y,m,d);}}
    else if(typeof rd==='number'){date=new Date(Date.UTC(1899,11,31)+rd*86400000);}

    out.push({id:'tx-'+i,date,scheme,isin:cI>=0?String(r[cI]||'').trim().toUpperCase().replace(/[^A-Z0-9]/g,''):'',txType,price:parseFloat(r[cPr])||0,units:Math.abs(parseFloat(r[cU])||0),balUnits:cB>=0?Math.abs(parseFloat(r[cB])||0):0,amount:Math.abs(parseFloat(r[cA])||0),mv:0,folioId:cF>=0?String(r[cF]||''):String(i),source:'import'});
  }

}

function parseGenericCSV(rows){

  const cS=H.findIndex(h=>h.includes('scheme')||h.includes('fund'));
  const cT=H.findIndex(h=>h.includes('type')||h.includes('txn')||h.includes('tran'));
  const cA=H.findIndex(h=>h.includes('amount')||h.includes('amt'));
  const cU=H.findIndex(h=>h.includes('unit'));
  const cPr=H.findIndex(h=>h.includes('nav')||h.includes('price'));
  if(cD<0||cS<0||cT<0)throw new Error('CSV: need Date, Scheme/Fund, and Type columns.');
  const out=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    const scheme=String(r[cS]||'').trim();if(!scheme)continue;

    if(rd.includes('-')){const p=rd.split('-');date=p[0].length===4?new Date(+p[0],+p[1]-1,+p[2]):new Date(+('20'+p[2].slice(-2)),+p[1]-1,+p[0]);}
    else if(rd.includes('/')){const p=rd.split('/');date=new Date(p[2]?+p[2]:2000,+p[0]-1,+p[1]);}

function parseAnyFile(buf,filename){
  const ext=(filename||'').toLowerCase();
  if(ext.endsWith('.csv')){
    const text=new TextDecoder().decode(new Uint8Array(buf));
    const rows=text.split(String.fromCharCode(10)).filter(Boolean).map(line=>{
      const out=[];let s='',q=false;
      for(const c of line+','){if(c==='"'){q=!q;}else if(c===','&&!q){out.push(s.trim());s='';}else s+=c;}
      return out;
    });
    if(!rows.length)throw new Error('CSV file appears empty.');
    return parseGenericCSV(rows);
  }
  const wb2=XLSX.read(buf,{type:'array',cellDates:false});
  const ws2=wb2.Sheets[wb2.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws2,{header:1,defval:''});
  const fmt=detectFormat(rows);
  if(fmt==='cams_cv')return parseCAMSCurrentValue(rows);
  if(fmt==='cams_xlsx')return parseCAMSXlsxRows(rows);
  if(fmt==='kfintech')return parseKFintechRows(rows);
  return parseXLS(buf);
}

function parseXLS(buf){
  const wb=XLSX.read(buf,{type:'array',cellDates:false});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});

  // ── Step 1: find the header row ──
  let hr=-1;
  for(let i=0;i<Math.min(20,rows.length);i++){
    if(rows[i].map(v=>String(v).toLowerCase()).some(h=>h.includes('transaction date')||h.includes('scheme name'))){hr=i;break;}
  }
  if(hr<0)throw new Error('Header row not found. Expected columns: Transaction Date, Scheme Name, Transaction Type.');

  const H=rows[hr].map(v=>String(v).toLowerCase().trim());
  const ci=(...ns)=>{for(const n of ns){const idx=H.findIndex(h=>h.includes(n));if(idx>=0)return idx;}return -1};
  const cD=ci('transaction date','date');
  const cS=ci('scheme name','scheme');
  const cI=ci('isin');
  const cT=ci('transaction type','type');
  const cU=ci('units(credits','units');
  const cB=ci('balance units');
  const cA=ci('amount(credits','amount');
  const cPr=ci('price','nav');
  const cM=ci('market value');
  const cFolio=ci('folio'); // some formats have a folio column
  if(cD<0||cS<0||cT<0)throw new Error('Required columns missing: need Transaction Date, Scheme Name, Transaction Type.');

  // ── Step 2: Pre-scan ALL rows for "Folio No:" markers ──
  // CAMS CAS groups transactions by AMC > Scheme > Folio.
  // Between folios there is a row (not a transaction) containing "Folio No: XXXX".
  // We track which folioId is active at each row index.
  const rowFolioId=new Array(rows.length).fill(null);
  let currentFolioId=0;
  let currentFolioNum='DEFAULT';
  for(let i=0;i<rows.length;i++){
    const cells=rows[i].map(v=>String(v||'').trim());
    // Detect "Folio No:" anywhere in the row
    const folioCell=cells.find(c=>/folio\s*(no|number|num)?[\s:\.]+\d/i.test(c));
    if(folioCell){
      // Extract the folio number from the cell text
      const m=folioCell.match(/(\d[\d\/\-A-Z]*)/i);
      const fn=m?m[1].replace(/[^0-9A-Z]/gi,'').slice(0,20):`F${currentFolioId+1}`;
      if(fn!==currentFolioNum){currentFolioId++;currentFolioNum=fn;}
    }
    rowFolioId[i]=currentFolioId;
  }

  // ── Step 3: Parse transaction rows ──
  const out=[];
  for(let i=hr+1;i<rows.length;i++){
    const r=rows[i];
    const scheme=String(r[cS]||'').trim();
    if(!scheme||scheme==='--'||scheme===''||/^folio|^amc|^scheme/i.test(scheme))continue;
    // Skip folio-separator rows: balance units AND market value both show '--'
    const rawBalCheck=cB>=0?String(r[cB]||'').trim():'';
    const rawMVCheck=cM>=0?String(r[cM]||'').trim():'';
    if(rawBalCheck==='--'&&rawMVCheck==='--')continue;
    const date=excelDate(r[cD]);if(!date)continue;
    const txType=String(r[cT]||'').trim();if(!txType||txType==='-'||txType==='--')continue;
    const isin=cI>=0?String(r[cI]||'').trim().toUpperCase().replace(/[^A-Z0-9]/g,''):'';
    // Units: CAMS shows positive for both buy and sell in the Credits/Debits column
    const rawUnits=r[cU];
    const units=(rawUnits===''||rawUnits==='--'||rawUnits==null)?0:Math.abs(parseFloat(rawUnits)||0);
    const balUnits=cB>=0?Math.abs(parseFloat(r[cB])||0):0;
    const amount=cA>=0?Math.abs(parseFloat(r[cA])||0):0;
    const price=cPr>=0?(parseFloat(r[cPr])||0):0;
    // Folio ID: prefer explicit folio column, else use our scanned value
    const folioId=cFolio>=0?String(r[cFolio]||rowFolioId[i]):String(rowFolioId[i]);
    out.push({
      id:`tx-${i}`,date,scheme,isin,txType,
      price,units,balUnits,amount,
      mv:cM>=0?(parseFloat(r[cM])||0):0,
      folioId,  // ← KEY: each transaction knows which folio it belongs to
      source:'import'
    });
  }
  return out;
}

function downloadCSV(rows,headers,filename){
  const esc=v=>typeof v==='string'&&(v.includes(',')||v.includes('"'))?`"${v.replace(/"/g,'""')}"`:(v??'');
  const lines=[headers.join(','),...rows.map(r=>headers.map((_,i)=>esc(Array.isArray(r)?r[i]:r[headers[i]])).join(','))];
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});

}

function downloadSVG(svgEl,filename){

function downloadChartPNG(svgEl,filename,bg='#04080f'){
  if(!svgEl)return;

  const vb=svgEl.getAttribute('viewBox')?.split(' ')||['0','0','800','400'];
  const W=+vb[2]||800,H=+vb[3]||400;
  const canvas=document.createElement('canvas');canvas.width=W*2;canvas.height=H*2;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W*2,H*2);
  const clone=svgEl.cloneNode(true);
  clone.setAttribute('xmlns','http://www.w3.org/2000/svg');
  clone.setAttribute('width',W*2);clone.setAttribute('height',H*2);
  const svgStr=new XMLSerializer().serializeToString(clone);
  const img=new Image();
  img.onload=()=>{ctx.drawImage(img,0,0);const a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download=filename;a.click();};
  img.src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svgStr)));
}
