              </div>
            )}

            {newBm.source==='yahoo'&&(
              <div style={{marginBottom:12}}>
                <div style={{fontSize:11,color:C.muted,marginBottom:4}}>Yahoo Finance ticker:</div>
                <input value={newBm.ticker} onChange={e=>setNewBm(p=>({...p,ticker:e.target.value}))}
                  placeholder="^NSEI, ^BSESN, ^NSMIDCP50, GOLDBEES.NS…"
                  style={{width:'100%',background:'#060c18',border:`1px solid ${C.border}`,borderRadius:6,padding:'7px 9px',color:C.text,fontSize:12,marginBottom:6}}/>
                <div style={{fontSize:9,color:C.muted2}}>
                  Common: ^NSEI=Nifty50, ^BSESN=Sensex, ^NSMIDCP50=NiftyNext50, ^CNXMIDCAP=MidCap100, NIFTYBEES.NS, GOLDBEES.NS
                </div>
              </div>
            )}

            {newBm.source==='fixed'&&(
              <div style={{display:'flex',gap:10,marginBottom:12,alignItems:'center'}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:C.muted,marginBottom:4}}>Annual rate (%)</div>
                  <input type="number" value={newBm.rate||''} step="0.1" min="0" max="30"
                    onChange={e=>setNewBm(p=>({...p,rate:parseFloat(e.target.value)||0}))}
                    placeholder="7.1"
                    style={{width:'100%',background:'#060c18',border:`1px solid ${C.border}`,borderRadius:6,padding:'7px 9px',color:C.text,fontSize:12}}/>
                </div>
              </div>
            )}

            {/* Label + Color */}
            <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:10,marginBottom:14}}>
              <div>
                <div style={{fontSize:11,color:C.muted,marginBottom:4}}>Display label</div>
                <input value={newBm.label} onChange={e=>setNewBm(p=>({...p,label:e.target.value}))}
                  placeholder="e.g. HDFC Flexicap"
                  style={{width:'100%',background:'#060c18',border:`1px solid ${C.border}`,borderRadius:6,padding:'7px 9px',color:C.text,fontSize:12}}/>
              </div>
              <div>
                <div style={{fontSize:11,color:C.muted,marginBottom:4}}>Color</div>
                <input type="color" value={newBm.color||'#00c8ff'}
                  onChange={e=>setNewBm(p=>({...p,color:e.target.value}))}
                  style={{width:42,height:34,border:`1px solid ${C.border}`,borderRadius:6,background:'none',cursor:'pointer'}}/>
              </div>
            </div>

            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn" onClick={()=>{setShowAddBmModal(false);setNewBm({label:'',source:'mfapi',amfiCode:'',ticker:'',searchQuery:'',searchResults:[],searching:false,color:'#00c8ff'});}}
                style={{padding:'8px 18px',background:'transparent',border:`1px solid ${C.border}`,color:C.muted,borderRadius:7,fontSize:13}}>Cancel</button>
              <button className="btn" onClick={()=>{
                const id=`custom_${Date.now()}`;
                const color=newBm.color||('#'+Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0'));
                let bm;
                if(newBm.source==='mfapi'){
                  if(!newBm.amfiCode||!newBm.label){alert('Please search and select a fund first.');return;}
                  bm={id,label:newBm.label,color,enabled:true,type:'mfapi',amfiCode:newBm.amfiCode};
                } else if(newBm.source==='yahoo'){
                  if(!newBm.ticker||!newBm.label){alert('Enter a ticker and label.');return;}
                  bm={id,label:newBm.label,color,enabled:true,type:'market',ticker:newBm.ticker.trim()};
                } else {
                  if(!newBm.label){alert('Enter a label.');return;}
                  bm={id,label:newBm.label,color,enabled:true,type:'fixed',rate:(newBm.rate||7.1)/100};
                }
                setBenchmarks(prev=>[...prev,bm]);
                setShowAddBmModal(false);
                setNewBm({label:'',source:'mfapi',amfiCode:'',ticker:'',searchQuery:'',searchResults:[],searching:false,color:'#00c8ff'});
              }} style={{padding:'8px 22px',background:`linear-gradient(135deg,#004fb3,${C.accent})`,border:'none',color:'#000',borderRadius:7,fontSize:13,fontWeight:700}}>
                Add Benchmark
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════
   SECTION 11 — SETUP FLOW (Upload → Review → Calc)
══════════════════════════════════════════ */
function SetupFlow({onComplete,onImportJSON,onError}){
  const [step,setStep]=useState('upload');
  const [txns,setTxns]=useState([]);
  const [sm,setSm]=useState({});
  const [err,setErr]=useState('');
  const [fname,setFname]=useState('');
  const [loadStatus,setLoadStatus]=useState('idle');
  const [loadMsg,setLoadMsg]=useState('');
  const [prog,setProg]=useState(0);
  const [openSearch,setOpenSearch]=useState(null);
  const [searchQ,setSearchQ]=useState({});
  const [searchRes,setSearchRes]=useState({});
  const [searching,setSearching]=useState({});
  const fRef=useRef();
  const jRef=useRef(); // JSON import file input
  const timers=useRef({});
  const didMap=useRef(false);
  const isinMapRef=useRef(null);
  const mfListRef=useRef(null);
  const [drag,setDrag]=useState(false);

  const loadFile=useCallback(f=>{
    if(!f)return;setFname(f.name);setErr('');
    const r=new FileReader();
    r.onload=e=>{
      try{
        const parsed=parseAnyFile(e.target.result,f.name);
        if(!parsed.length){setErr('No valid transactions found.');return;}
        const sorted=[...parsed].sort((a,b)=>a.date-b.date);
        setTxns(sorted);
        const map={};
        for(const t of sorted){
          if(!t.scheme)continue;
          if(!map[t.scheme])map[t.scheme]={isin:t.isin,amfiCode:'',amfiName:'',status:'pending',method:''};
          else if(!map[t.scheme].isin&&t.isin)map[t.scheme].isin=t.isin;
        }
        setSm(map);
        setSearchQ(Object.fromEntries(Object.entries(map).map(([k])=>[k,getCore(k)])));
        didMap.current=false;setStep('review');
      }catch(ex){setErr('Parse error: '+ex.message);}
    };
    r.readAsArrayBuffer(f);
  },[]);

  useEffect(()=>{
    if(step!=='review'||didMap.current)return;
    didMap.current=true;
    (async()=>{
      setLoadStatus('loading');setLoadMsg('Fetching AMFI database…');
      let isinMap=null;
      try{isinMap=await fetchAMFIMaster();isinMapRef.current=isinMap;}catch{}
      let mfList=null;
      try{setLoadMsg('Fetching scheme list…');mfList=await fetchMfapiList();mfListRef.current=mfList;}catch{}
      if(!isinMap&&!mfList){setLoadStatus('error');setLoadMsg('Network error — use manual search.');return;}
      const schemes=Object.keys(sm);const updated={...sm};
      for(let i=0;i<schemes.length;i++){
        const name=schemes[i];const info=updated[name];
        setLoadMsg(`Mapping ${i+1}/${schemes.length}: ${name}`);
        const result=await autoMapScheme(name,info.isin,isinMap,mfList);
        updated[name]=result?{...info,...result,amfiCode:result.code,amfiName:result.label,status:'mapped'}:{...info,status:'failed'};
        setSm({...updated});
        await new Promise(r=>setTimeout(r,0));
      }
      setLoadStatus('done');setLoadMsg('');
    })();
  },[step]);

  const doSearch=useCallback((name,q)=>{
    clearTimeout(timers.current[name]);
    if(!q||q.length<2)return;
    timers.current[name]=setTimeout(async()=>{
      setSearching(p=>({...p,[name]:true}));
      try{
        const mfList=mfListRef.current;
        if(mfList){
          const ql=q.toLowerCase();
          const local=mfList.filter(s=>s.schemeName.toLowerCase().includes(ql)).slice(0,8).map(s=>({schemeCode:String(s.schemeCode),schemeName:s.schemeName}));
          if(local.length){setSearchRes(p=>({...p,[name]:local}));setSearching(p=>({...p,[name]:false}));return;}
        }
        const res=await fetch(`https://api.mfapi.in/mf/search?q=${encodeURIComponent(q.slice(0,55))}`);
        const data=await res.json();
        setSearchRes(p=>({...p,[name]:(data||[]).slice(0,8).map(x=>({schemeCode:String(x.schemeCode),schemeName:x.schemeName}))}));
      }catch{}
      setSearching(p=>({...p,[name]:false}));
    },350);
  },[]);

  const pick=useCallback((name,code,label)=>{
    setSm(p=>({...p,[name]:{...p[name],amfiCode:String(code),amfiName:label,status:'mapped',method:'manual'}}));
    setSearchQ(p=>({...p,[name]:label}));setOpenSearch(null);
  },[]);

  const calc=useCallback(async()=>{
    setStep('calc');setProg(0);
    try{
      const nb={};
      const mlist=Object.entries(sm).filter(([,v])=>v.amfiCode);
      for(let i=0;i<mlist.length;i++){
        const[name,info]=mlist[i];
        setProg(Math.round(i/mlist.length*100));
        try{const res=await fetch(`https://api.mfapi.in/mf/${info.amfiCode}`);const d=await res.json();nb[name]=buildNav(d.data||[]);}catch{}
        await new Promise(r=>setTimeout(r,0));
      }
      setProg(100);
      onComplete({txns,sm,navByScheme:nb});
    }catch(ex){setErr('Error: '+ex.message);setStep('review');}
  },[sm,txns,onComplete]);

  const mappedCnt=Object.values(sm).filter(v=>v.amfiCode).length;
  const totalCnt=Object.keys(sm).length;
  const failedCnt=Object.values(sm).filter(v=>v.status==='failed').length;

  return(
    <div style={{maxWidth:900,margin:'0 auto',padding:'32px 24px 80px'}}>
      {step==='upload'&&(
      <div className="fu" style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:20}}>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:28}}>
          <div style={{fontFamily:'Syne',fontSize:20,fontWeight:700,color:'#fff',marginBottom:4}}>Upload CAS Statement</div>
          <div style={{fontSize:13,color:C.muted,marginBottom:22}}>CAMS / KFintech Consolidated Account Statement (.xls)</div>
          <div className={`dz${drag?' ov':''}`}
            onClick={()=>fRef.current?.click()}
            onDragOver={e=>{e.preventDefault();setDrag(true);}}
            onDragLeave={()=>setDrag(false)}
            onDrop={e=>{e.preventDefault();setDrag(false);loadFile(e.dataTransfer.files[0]);}}
            style={{border:`2px dashed ${C.border}`,borderRadius:12,padding:'44px 20px',textAlign:'center'}}>
            <div style={{fontSize:38,marginBottom:10}}>📊</div>
            <div style={{color:'#fff',fontSize:14,fontWeight:500,marginBottom:6}}>Drop .xls file here</div>
            <div style={{fontSize:12,color:C.muted}}>or click to browse</div>
            <input ref={fRef} type="file" accept=".xls,.xlsx,.csv" style={{display:'none'}} onChange={e=>loadFile(e.target.files[0])}/>
          </div>
          {err&&<div style={{marginTop:12,padding:'10px 14px',background:'#1a0808',border:'1px solid #4a1010',borderRadius:8,fontSize:12,color:'#ff8a8a'}}>⚠ {err}</div>}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {/* JSON restore card */}
          {onImportJSON&&(
          <div style={{background:C.card,border:`2px dashed ${C.accent}44`,borderRadius:12,padding:18,
            cursor:'pointer',transition:'border-color 0.2s'}}
            onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor=C.accent;}}
            onDragLeave={e=>{e.currentTarget.style.borderColor=`${C.accent}44`;}}
            onDrop={e=>{
              e.preventDefault();e.currentTarget.style.borderColor=`${C.accent}44`;
              const f=e.dataTransfer.files[0];
              if(!f||!f.name.endsWith('.json')){setErr('Please drop a .json export file.');return;}
              const r=new FileReader();
              r.onload=ev=>{try{const d=JSON.parse(ev.target.result);onImportJSON(d);}catch(ex){setErr('Invalid JSON: '+ex.message);}};
              r.readAsText(f);
            }}
            onClick={()=>jRef.current?.click()}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
              <span style={{fontSize:26}}>📥</span>
              <div>
                <div style={{fontFamily:'Syne',fontSize:14,fontWeight:700,color:C.accent}}>Restore from backup</div>
                <div style={{fontSize:11,color:C.muted}}>Import a <code style={{background:'#ffffff12',padding:'1px 4px',borderRadius:3}}>mf-advisor_*.json</code> export</div>
              </div>
            </div>
            <div style={{fontSize:10,color:C.muted,lineHeight:1.7}}>
              Restores all transactions · NAV history · benchmark data · settings.<br/>
              <strong style={{color:C.text}}>No re-uploading or re-fetching needed.</strong> Drop file here or click to browse.
            </div>
            <input ref={jRef} type="file" accept=".json" style={{display:'none'}}
              onChange={e=>{
                const f=e.target.files[0];if(!f)return;
                const r=new FileReader();
                r.onload=ev=>{try{const d=JSON.parse(ev.target.result);onImportJSON(d);}catch(ex){setErr('Invalid JSON: '+ex.message);}};
                r.readAsText(f);e.target.value='';
              }}/>
          </div>
          )}
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:18}}>
            <div style={{fontFamily:'Syne',fontSize:13,fontWeight:700,color:'#fff',marginBottom:10}}>What you get</div>
            {[['Dashboard','Portfolio chart, FY breakdown, top funds'],['Fund Overview','Filterable table with returns'],['Fund Performance','vs Nifty, Sensex, PPF'],['Settings','Add transactions, save/load data']].map(([t,d])=>(
              <div key={t} style={{display:'flex',gap:8,padding:'5px 0',borderBottom:`1px solid ${C.border}`}}>
                <span style={{color:C.accent,fontSize:11,fontWeight:600,minWidth:110}}>{t}</span>
                <span style={{fontSize:11,color:C.muted}}>{d}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
      )}

      {step==='review'&&(
      <div className="fu">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:10}}>
          <div>
            <div style={{fontFamily:'Syne',fontSize:20,fontWeight:700,color:'#fff',marginBottom:3}}>Scheme Mapping</div>
            <div style={{fontSize:12,color:C.muted}}>
              {loadStatus==='loading'?<span style={{color:C.accent}} className="pulse">⟳ {loadMsg}</span>
                :<span><span style={{color:C.green}}>{mappedCnt}</span>/{totalCnt} mapped · {failedCnt>0&&<span style={{color:C.red}}>{failedCnt} failed · </span>}{txns.length} transactions</span>}
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn" onClick={()=>setStep('upload')} style={{padding:'8px 16px',background:'transparent',border:`1px solid ${C.border}`,color:C.muted,borderRadius:8,fontSize:13}}>← Back</button>
            <button className="btn" onClick={calc}
              style={{padding:'9px 22px',background:`linear-gradient(135deg,#004fb3,${C.accent})`,border:'none',color:'#000',borderRadius:8,fontSize:13,fontWeight:700,fontFamily:'Syne'}}>
              {loadStatus==='loading'?`Mapping…`:`Continue (${mappedCnt}/${totalCnt}) →`}
            </button>
          </div>
        </div>
        {failedCnt>0&&loadStatus==='done'&&<div style={{marginBottom:10,padding:'8px 14px',background:'#0e0a00',border:`1px solid ${C.amber}33`,borderRadius:7,fontSize:11,color:C.amber}}>⚠ {failedCnt} schemes not found — search manually or proceed.</div>}
        {Object.entries(sm).map(([name,info])=>{
          const isOpen=openSearch===name,res=searchRes[name]||[],q=searchQ[name]||getCore(name),ok=!!info.amfiCode;
          return(
            <div key={name} style={{background:'#090f1e',border:`1px solid ${ok?'#0d3520':info.status==='failed'?'#2a1010':C.border}`,borderRadius:8,padding:'9px 14px',marginBottom:6}}>
              <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                <div style={{marginTop:5,flexShrink:0,width:7,height:7,borderRadius:'50%',background:ok?C.green:info.status==='failed'?C.red:info.status==='pending'?C.amber:'#555'}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:ok?2:5,alignItems:'center'}}>
                    <span style={{fontSize:12,color:C.text,fontWeight:500}}>{name}</span>
                    {info.isin&&<span style={{fontFamily:'Space Mono',fontSize:9,color:C.muted}}>{info.isin}</span>}
                    {ok&&<span style={{fontFamily:'Space Mono',fontSize:9,color:C.green}}>✓ {info.amfiCode}</span>}
                    {info.status==='failed'&&!ok&&<span style={{fontSize:10,color:C.red}}>✗ not found</span>}
                  </div>
                  {ok&&info.amfiName&&<div style={{fontSize:10,color:C.muted,marginBottom:4,fontStyle:'italic'}}>{info.amfiName}</div>}
                  {(!ok||isOpen)&&(
                    <div style={{position:'relative'}}>
                      <input value={q} onChange={e=>{setSearchQ(p=>({...p,[name]:e.target.value}));doSearch(name,e.target.value);}} onFocus={()=>setOpenSearch(name)}
                        placeholder="Search fund name…" style={{width:'100%',background:'#060c18',border:`1px solid ${C.border}`,borderRadius:5,padding:'5px 9px',color:C.text,fontSize:11}}/>
                      {searching[name]&&<span style={{position:'absolute',right:8,top:7,fontSize:10,color:C.muted}}>…</span>}
                      {isOpen&&res.length>0&&(
                        <div style={{position:'absolute',zIndex:99,top:'100%',left:0,right:0,marginTop:2,background:'#080f1c',border:`1px solid ${C.border}`,borderRadius:7,maxHeight:200,overflowY:'auto',boxShadow:'0 12px 40px rgba(0,0,0,.85)'}}>
                          {res.map((r,i)=>(
                            <div key={i} className="fund-row" onMouseDown={()=>pick(name,r.schemeCode,r.schemeName)} style={{padding:'7px 12px',borderBottom:`1px solid #0a1520`}}>
                              <div style={{fontSize:11,color:C.text}}>{r.schemeName}</div>
                              <div style={{fontSize:9,color:C.muted,fontFamily:'Space Mono',marginTop:1}}>AMFI {r.schemeCode}</div>
                            </div>
                          ))}
                          <div style={{padding:'4px 12px',textAlign:'right'}}><button onMouseDown={()=>setOpenSearch(null)} style={{background:'none',border:'none',color:C.muted,fontSize:10,cursor:'pointer'}}>✕</button></div>
                        </div>
                      )}
                    </div>
                  )}
                  {ok&&!isOpen&&<button onClick={()=>setOpenSearch(name)} style={{background:'none',border:'none',color:C.muted,fontSize:10,padding:0,cursor:'pointer',textDecoration:'underline',marginTop:2}}>change</button>}
                </div>
              </div>
            </div>
          );
        })}
      </div>
      )}

      {step==='calc'&&(
      <div className="fu" style={{display:'flex',flexDirection:'column',alignItems:'center',paddingTop:80,textAlign:'center'}}>
        <div className="sp" style={{width:48,height:48,border:`3px solid ${C.border}`,borderTopColor:C.accent,borderRadius:'50%'}}/>
        <div style={{fontFamily:'Syne',fontSize:24,fontWeight:700,color:'#fff',marginTop:20,marginBottom:6}}>Fetching NAV Data</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:28}}>Downloading historical prices for all mapped funds…</div>
        <div style={{width:'100%',maxWidth:380,background:C.surface,borderRadius:8,padding:'7px 10px',border:`1px solid ${C.border}`}}>
          <div style={{height:5,borderRadius:3,background:C.border,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${prog}%`,borderRadius:3,background:`linear-gradient(90deg,#004fb3,${C.accent})`,transition:'width .4s'}}/>
          </div>
          <div style={{textAlign:'right',fontFamily:'Space Mono',fontSize:10,color:C.muted,marginTop:3}}>{prog}%</div>
        </div>
      </div>
      )}
    </div>
  );
}


/* ══════════════════════════════════════════
   MULTI-USER MANAGER
   Users stored in localStorage['mfa_users']
   Each user has their own save key
══════════════════════════════════════════ */
const USERS_KEY='mfa_users_v1';

function loadUsers(){
  try{const r=_store.get(USERS_KEY);return r?JSON.parse(r):[];}
  catch{return[];}
}
function saveUsers(users){
  try{_store.set(USERS_KEY,JSON.stringify(users));}catch{}
}
function getUserSaveKey(userId){return `mfa_state_v4_${userId}`;}

function UserManager({currentUserId,onSwitch,onClose}){
  const [users,setUsers]=useState(()=>loadUsers());
  const [newName,setNewName]=useState('');

  const addUser=()=>{
    const name=newName.trim();
    if(!name)return;
    const id=`u_${Date.now()}`;
    const updated=[...users,{id,name,createdAt:new Date().toISOString()}];
    setUsers(updated);saveUsers(updated);setNewName('');
  };

  const deleteUser=(id)=>{
    if(id===currentUserId){alert('Cannot delete the active portfolio. Switch first.');return;}
    if(!window.confirm('Delete this portfolio and all its data? This cannot be undone.'))return;
    try{_store.remove(getUserSaveKey(id));}catch{}
    const updated=users.filter(u=>u.id!==id);
    setUsers(updated);saveUsers(updated);
  };

  const exportUser=(id,name)=>{
    try{
      const raw=_store.get(getUserSaveKey(id));
      if(!raw){alert('No saved data for this portfolio.');return;}
      const blob=new Blob([raw],{type:'application/json'});
      const a=document.createElement('a');a.href=URL.createObjectURL(blob);
      a.download=`mf-advisor-${name.replace(/\s+/g,'-')}.json`;a.click();
    }catch(e){alert('Export failed: '+e.message);}
  };

  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:420}}>
        <div style={{fontFamily:'Syne',fontSize:17,fontWeight:700,color:'#fff',marginBottom:4}}>📁 Portfolio Manager</div>
        <div style={{fontSize:10,color:C.muted,marginBottom:14}}>
          Each portfolio is fully independent. Data is stored per-portfolio in browser storage.
        </div>
        {/* Existing users */}
        <div style={{marginBottom:14}}>
          {users.map(u=>(
            <div key={u.id} style={{display:'flex',gap:8,alignItems:'center',padding:'8px 0',borderBottom:`1px solid ${C.border}`}}>
              <div style={{flex:1}}>
                <div style={{fontSize:12,color:u.id===currentUserId?C.accent:C.text,fontWeight:u.id===currentUserId?700:400}}>
                  {u.id===currentUserId?'▶ ':''}{u.name}
                </div>
                <div style={{fontSize:9,color:C.muted,fontFamily:'Space Mono'}}>
                  Created {new Date(u.createdAt).toLocaleDateString('en-IN')}
                  {u.id===currentUserId?<span style={{color:C.green,marginLeft:8}}>· Active</span>:''}
                </div>
              </div>
              <button className="btn" onClick={()=>exportUser(u.id,u.name)}
                style={{padding:'3px 8px',background:`${C.accent}18`,border:`1px solid ${C.accent}44`,color:C.accent,borderRadius:4,fontSize:10}}>Export</button>
              {u.id!==currentUserId&&(
                <>
                  <button className="btn" onClick={()=>onSwitch(u.id)}
                    style={{padding:'3px 8px',background:`${C.green}18`,border:`1px solid ${C.green}44`,color:C.green,borderRadius:4,fontSize:10}}>Switch</button>
                  <button className="btn" onClick={()=>deleteUser(u.id)}
                    style={{padding:'3px 8px',background:`${C.red}18`,border:`1px solid ${C.red}44`,color:C.red,borderRadius:4,fontSize:10}}>✕</button>
                </>
              )}
            </div>
          ))}
          {users.length===0&&<div style={{fontSize:11,color:C.muted,padding:'12px 0'}}>No portfolios yet. Add one below.</div>}
        </div>
        {/* Add new user */}
        <div style={{display:'flex',gap:8,marginBottom:10}}>
          <input value={newName} onChange={e=>setNewName(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&addUser()}
            placeholder="New portfolio name…"
            style={{flex:1,background:'#060c18',border:`1px solid ${C.border}`,borderRadius:6,padding:'7px 9px',color:C.text,fontSize:12}}/>
          <button className="btn" onClick={addUser}
            style={{padding:'7px 14px',background:`${C.green}22`,border:`1px solid ${C.green}55`,color:C.green,borderRadius:6,fontSize:12,fontWeight:600}}>+ Add Portfolio</button>
        </div>
        <div style={{fontSize:9,color:C.muted2,marginBottom:14,lineHeight:1.6}}>
          Note: Data is stored in <strong>browser localStorage</strong> only — not synced to cloud. Export regularly as backup.
          When you switch portfolios, the current session is auto-saved before loading the other portfolio.
          Data directory selection: use the <strong>Export JSON</strong> button to save to any folder you choose; <strong>Import JSON</strong> to reload.
        </div>
        <div style={{display:'flex',justifyContent:'flex-end'}}>
          <button className="btn" onClick={onClose}
            style={{padding:'8px 18px',background:'transparent',border:`1px solid ${C.border}`,color:C.muted,borderRadius:7,fontSize:13}}>Close</button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   NPV CALCULATOR PAGE
   Net Present Value with future cash flows,
   future date scenarios, discount rate management
   NPV series can be added as benchmark
══════════════════════════════════════════ */
function computeNPV(cashFlows,discountRate){
  // cashFlows: [{date, amount}] sorted by date
  // Returns NPV as of the earliest date (t=0)
  if(!cashFlows?.length||discountRate==null)return null;
  const t0=cashFlows[0].date.getTime();
  let npv=0;
  for(const cf of cashFlows){
    const years=(cf.date.getTime()-t0)/(365.25*24*3600*1000);
    npv+=cf.amount/Math.pow(1+discountRate,years);
  }
  return npv;
}

function NpvPage({sortedTxns,navByScheme,enabled,benchmarks,setBenchmarks,benchmarkData,setBenchmarkData,discountRate:initRate,setDiscountRate:setParentRate}){
  const today=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d;},[]);
  const [discountRate,setDiscountRate]=useState(initRate||7.0); // %
  // Sync discount rate changes back to parent (Dashboard also uses it)
  const setRate=useCallback((r)=>{setDiscountRate(r);setParentRate&&setParentRate(r);},[setParentRate]);
  const [futureDate,setFutureDate]=useState('');       // optional future NPV date
  const [extraFlows,setExtraFlows]=useState([]);       // [{id,date,amount,label}] manual additions
  const [showAddFlow,setShowAddFlow]=useState(false);
  const [newFlow,setNewFlow]=useState({date:'',amount:'',label:''});
  const [npvNote,setNpvNote]=useState('');

  const enabledArr=useMemo(()=>Array.from(enabled),[enabled]);

  // Build cash flows from actual transactions
  const baseCashFlows=useMemo(()=>{
    const cf=[];
    for(const t of sortedTxns){
      if(!enabled.has(t.scheme))continue;
      const c=clf(t.txType);
      const amt=Math.abs(t.amount||0);
      if(c==='buy'||c==='switchin'||c==='dreinvest')cf.push({date:t.date,amount:-amt,label:t.scheme.slice(0,30)});
      else if(c==='sell'||c==='switchout')cf.push({date:t.date,amount:+amt,label:'Redemption'});
      else if(c==='div')cf.push({date:t.date,amount:+amt,label:'Dividend'});
    }
    // Add terminal value: current portfolio as of today (or futureDate)
    const evalDate=futureDate?fromISO(futureDate)||today:today;
    for(const name of enabledArr){
      const bal=schemeUnits(name,evalDate,sortedTxns);
      const nav=getNav(navByScheme[name],evalDate);
      if(bal>0.001&&nav)cf.push({date:evalDate,amount:bal*nav,label:`${name.slice(0,25)} (terminal)`});
    }
    return cf.sort((a,b)=>a.date-b.date);
  },[sortedTxns,enabled,enabledArr,navByScheme,today,futureDate]);

  const allCashFlows=useMemo(()=>{
    const extras=extraFlows.map(f=>({date:fromISO(f.date)||today,amount:parseFloat(f.amount)||0,label:f.label||'Manual'}));
    return[...baseCashFlows,...extras].sort((a,b)=>a.date-b.date);
  },[baseCashFlows,extraFlows,today]);

  const npv=useMemo(()=>computeNPV(allCashFlows,discountRate/100),[allCashFlows,discountRate]);

  // NPV sensitivity: compute NPV at various discount rates
  const sensitivityRates=[2,4,6,7,8,10,12,15,18];
  const sensitivity=useMemo(()=>sensitivityRates.map(r=>({rate:r,npv:computeNPV(allCashFlows,r/100)})),[allCashFlows]);

  // NPV over time series (how NPV evolves as terminal date moves)
  const npvTimeSeries=useMemo(()=>{
    if(!sortedTxns.length)return[];
    const start=sortedTxns[0]?.date;
    const pts=[];
    const step=30;
    for(let d=new Date(start);d<=today;d=addDays(d,step)){
      const evalDate=new Date(d);
      const flows=[];
      for(const t of sortedTxns){
        if(!enabled.has(t.scheme)||t.date>evalDate)continue;
        const c=clf(t.txType),amt=Math.abs(t.amount||0);
        if(c==='buy'||c==='switchin'||c==='dreinvest')flows.push({date:t.date,amount:-amt});
        else if(c==='sell'||c==='switchout')flows.push({date:t.date,amount:+amt});
        else if(c==='div')flows.push({date:t.date,amount:+amt});
      }
      for(const name of enabledArr){
        const bal=schemeUnits(name,evalDate,sortedTxns);
        const nav=getNav(navByScheme[name],evalDate);
        if(bal>0.001&&nav)flows.push({date:evalDate,amount:bal*nav});
      }
      const v=computeNPV(flows.sort((a,b)=>a.date-b.date),discountRate/100);
      if(v!=null)pts.push({x:new Date(evalDate),y:v});
    }
    return pts;
  },[sortedTxns,enabled,enabledArr,navByScheme,today,discountRate]);

  const addToBenchmark=()=>{
    if(!npvTimeSeries.length){alert('No NPV data to add as benchmark.');return;}
    const id=`npv_${Date.now()}`;
    const label=`NPV @${discountRate}%`;
    setBenchmarks(prev=>[...prev,{id,label,color:'#f9a825',enabled:true,type:'fixed',rate:discountRate/100,isNpv:true}]);
    setBenchmarkData(prev=>({...prev,[id]:npvTimeSeries}));
    setNpvNote(`NPV series "${label}" added to benchmarks. View it in the Performance chart.`);
  };

  return(
    <div style={{padding:'20px 24px'}}>
      <div style={{fontFamily:'Syne',fontSize:18,fontWeight:800,color:'#fff',marginBottom:4}}>NPV Calculator</div>
      <div style={{fontSize:11,color:C.muted,marginBottom:16}}>
        Net Present Value of your portfolio: all cash outflows (investments) and inflows (redemptions, dividends, terminal value) discounted at your required rate of return.
      </div>
      {npvNote&&<div style={{padding:'7px 12px',background:`${C.green}10`,border:`1px solid ${C.green}33`,borderRadius:6,fontSize:11,color:C.green,marginBottom:12}}>{npvNote}</div>}

      {/* Controls */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:12,marginBottom:16}}>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:'14px 16px'}}>
          <div style={{fontSize:11,color:C.muted,marginBottom:6}}>Discount Rate (% p.a.)</div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <input type="range" min="1" max="25" step="0.5" value={discountRate}
              onChange={e=>setRate(parseFloat(e.target.value))}
              style={{flex:1,accentColor:C.accent}}/>
            <input type="number" value={discountRate} step="0.5" min="0" max="50"
              onChange={e=>setRate(parseFloat(e.target.value)||0)}
              style={{width:55,background:'#060c18',border:`1px solid ${C.border}`,borderRadius:4,padding:'3px 6px',color:C.text,fontSize:12}}/>
            <span style={{color:C.muted,fontSize:12}}>%</span>
          </div>
          <div style={{fontSize:9,color:C.muted2,marginTop:4}}>Typical: 7% = PPF, 10% = equity hurdle, 12% = market target</div>
        </div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:'14px 16px'}}>
          <div style={{fontSize:11,color:C.muted,marginBottom:6}}>Terminal/Evaluation Date</div>
          <input type="date" value={futureDate}
            onChange={e=>setFutureDate(e.target.value)}
            style={{width:'100%',background:'#060c18',border:`1px solid ${C.border}`,borderRadius:6,padding:'6px 9px',color:C.text,fontSize:12,marginBottom:4}}/>
          <div style={{fontSize:9,color:C.muted2}}>Leave blank for today. Set a future date to project NPV at that date (uses last available NAVs as estimate).</div>
        </div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:'14px 16px',display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
          <div>
            <div style={{fontSize:11,color:C.muted,marginBottom:4}}>Current NPV</div>
            <div style={{fontFamily:'Syne',fontSize:24,fontWeight:800,color:npv>=0?C.green:C.red}}>
              {npv!=null?FMT(npv):'—'}
            </div>
            <div style={{fontSize:9,color:C.muted2,marginTop:2}}>
              {npv>=0?'Positive NPV → portfolio exceeds hurdle rate':'Negative NPV → portfolio underperforms hurdle rate'}
            </div>
          </div>
          <button className="btn" onClick={addToBenchmark} style={{marginTop:8,padding:'6px 12px',background:`${C.amber}22`,border:`1px solid ${C.amber}55`,color:C.amber,borderRadius:6,fontSize:11,fontWeight:600}}>
            📈 Add NPV to Benchmark charts
          </button>
        </div>
      </div>

      {/* NPV over time chart */}
      {npvTimeSeries.length>0&&(
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'18px 18px 14px',marginBottom:14}}>
          <LineChart
            series={[{label:`Portfolio NPV @ ${discountRate}%`,color:C.amber,data:npvTimeSeries,width:2}]}
            title="NPV Over Time"
            subtitle={`Discount rate: ${discountRate}% p.a. · Positive = portfolio earns above hurdle rate`}
            chartId="npv-timeline" height={220}/>
        </div>
      )}

      {/* Sensitivity table */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'18px 20px',marginBottom:14}}>
        <div style={{fontFamily:'Syne',fontSize:14,fontWeight:700,color:'#fff',marginBottom:10}}>NPV Sensitivity (by discount rate)</div>
        <div style={{overflowX:'auto'}}>
          <table style={{borderCollapse:'collapse',fontSize:12,width:'100%'}}>
            <thead><tr style={{background:C.surface}}>
              {sensitivityRates.map(r=>(
                <th key={r} style={{padding:'6px 10px',textAlign:'right',color:r===discountRate?C.accent:C.muted,fontSize:10,borderBottom:`1px solid ${C.border}`}}>
                  {r===discountRate?`▶ ${r}%`:`${r}%`}
                </th>
              ))}
            </tr></thead>
            <tbody><tr>
              {sensitivity.map(({rate,npv:v})=>(
                <td key={rate} style={{padding:'8px 10px',textAlign:'right',fontFamily:'Space Mono',fontSize:11,
                  color:v>=0?C.green:C.red,fontWeight:rate===discountRate?700:400,background:rate===discountRate?`${C.accent}08`:'transparent',
                  borderBottom:`1px solid ${C.border}22`}}>
                  {v!=null?FMT(v):'—'}
                </td>
              ))}
            </tr></tbody>
          </table>
        </div>
        <div style={{fontSize:9,color:C.muted2,marginTop:6}}>NPV is most sensitive to discount rate. Green = positive NPV at that rate. Cells show current portfolio NPV if evaluated at each rate.</div>
      </div>

      {/* Future Cash Flows */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'18px 20px',marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div>
            <div style={{fontFamily:'Syne',fontSize:14,fontWeight:700,color:'#fff'}}>Manual / Future Cash Flows</div>
            <div style={{fontSize:10,color:C.muted,marginTop:2}}>Add future investments or redemptions to project NPV (use positive = inflow, negative = outflow)</div>
          </div>
          <button className="btn" onClick={()=>setShowAddFlow(true)}
            style={{padding:'5px 12px',background:`${C.green}22`,border:`1px solid ${C.green}55`,color:C.green,borderRadius:6,fontSize:11,fontWeight:600}}>+ Add Flow</button>
        </div>
        {extraFlows.length===0&&<div style={{fontSize:11,color:C.muted,padding:'8px 0'}}>No manual flows added. The NPV above uses your actual transaction history and current portfolio value as terminal.</div>}
        {extraFlows.map((f,i)=>(
          <div key={f.id} style={{display:'flex',gap:10,alignItems:'center',padding:'6px 0',borderBottom:`1px solid ${C.border}22`}}>
            <span style={{fontFamily:'Space Mono',fontSize:10,color:C.muted,minWidth:80}}>{f.date}</span>
            <span style={{flex:1,fontSize:11,color:C.text}}>{f.label||'Cash flow'}</span>
            <span style={{fontFamily:'Space Mono',fontSize:11,color:parseFloat(f.amount)>=0?C.green:C.red,minWidth:90,textAlign:'right'}}>{FMT(parseFloat(f.amount)||0)}</span>
            <button className="btn" onClick={()=>setExtraFlows(p=>p.filter((_,j)=>j!==i))}
              style={{padding:'2px 7px',background:`${C.red}18`,border:`1px solid ${C.red}44`,color:C.red,borderRadius:4,fontSize:10}}>✕</button>
          </div>
        ))}
        {showAddFlow&&(
          <div style={{marginTop:10,padding:'12px',background:C.surface,borderRadius:8,border:`1px solid ${C.border}`}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 2fr',gap:8,marginBottom:8}}>
              <div>
                <div style={{fontSize:10,color:C.muted,marginBottom:3}}>Date</div>
                <input type="date" value={newFlow.date} onChange={e=>setNewFlow(p=>({...p,date:e.target.value}))}
                  style={{width:'100%',background:'#060c18',border:`1px solid ${C.border}`,borderRadius:5,padding:'5px 7px',color:C.text,fontSize:11}}/>
              </div>
              <div>
                <div style={{fontSize:10,color:C.muted,marginBottom:3}}>Amount (+ inflow / − outflow)</div>
                <input type="number" value={newFlow.amount} placeholder="-50000"
                  onChange={e=>setNewFlow(p=>({...p,amount:e.target.value}))}
                  style={{width:'100%',background:'#060c18',border:`1px solid ${C.border}`,borderRadius:5,padding:'5px 7px',color:C.text,fontSize:11}}/>
              </div>
              <div>
                <div style={{fontSize:10,color:C.muted,marginBottom:3}}>Label</div>
                <input value={newFlow.label} placeholder="e.g. Future SIP investment"
                  onChange={e=>setNewFlow(p=>({...p,label:e.target.value}))}
                  style={{width:'100%',background:'#060c18',border:`1px solid ${C.border}`,borderRadius:5,padding:'5px 7px',color:C.text,fontSize:11}}/>
              </div>
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn" onClick={()=>{setShowAddFlow(false);setNewFlow({date:'',amount:'',label:''}); }}
                style={{padding:'5px 12px',background:'transparent',border:`1px solid ${C.border}`,color:C.muted,borderRadius:5,fontSize:11}}>Cancel</button>
              <button className="btn" onClick={()=>{
                if(!newFlow.date||!newFlow.amount){alert('Date and amount required');return;}
                setExtraFlows(p=>[...p,{id:Date.now(),...newFlow}]);
                setShowAddFlow(false);setNewFlow({date:'',amount:'',label:''});
              }} style={{padding:'5px 12px',background:`${C.green}22`,border:`1px solid ${C.green}55`,color:C.green,borderRadius:5,fontSize:11,fontWeight:600}}>Add</button>
            </div>
          </div>
        )}
      </div>

      {/* Cash flow table */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'18px 20px'}}>
        <div style={{fontFamily:'Syne',fontSize:14,fontWeight:700,color:'#fff',marginBottom:10}}>
          All Cash Flows Used in NPV ({allCashFlows.length} items)
        </div>
        <div style={{maxHeight:280,overflowY:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
            <thead style={{position:'sticky',top:0}}><tr style={{background:C.surface}}>
              {['Date','Label','Amount (₹)','PV @ '+discountRate+'%'].map(h=>(
                <th key={h} style={{padding:'5px 10px',textAlign:h.startsWith('Amount')||h.startsWith('PV')?'right':'left',color:C.muted,fontSize:10,borderBottom:`1px solid ${C.border}`}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {allCashFlows.map((cf,i)=>{
                const t0=allCashFlows[0]?.date?.getTime()||0;
                const years=(cf.date.getTime()-t0)/(365.25*24*3600*1000);
                const pv=cf.amount/Math.pow(1+discountRate/100,years);
                return(
                  <tr key={i} style={{borderBottom:`1px solid ${C.border}22`}}>
                    <td style={{padding:'4px 10px',fontFamily:'Space Mono',fontSize:10,color:C.muted}}>{fmtD(cf.date)}</td>
                    <td style={{padding:'4px 10px',fontSize:11,color:C.text,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cf.label}</td>
                    <td style={{padding:'4px 10px',textAlign:'right',fontFamily:'Space Mono',fontSize:10,color:cf.amount>=0?C.green:C.red}}>{FMT(cf.amount)}</td>
                    <td style={{padding:'4px 10px',textAlign:'right',fontFamily:'Space Mono',fontSize:10,color:pv>=0?C.green:C.red}}>{FMT(pv)}</td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot><tr style={{borderTop:`2px solid ${C.border}`}}>
              <td colSpan="3" style={{padding:'6px 10px',fontFamily:'Space Mono',fontSize:11,color:C.accent,fontWeight:700}}>Net Present Value</td>
              <td style={{padding:'6px 10px',textAlign:'right',fontFamily:'Space Mono',fontSize:12,color:npv>=0?C.green:C.red,fontWeight:700}}>{npv!=null?FMT(npv):'—'}</td>
            </tr></tfoot>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════

const HELP_CONTENT={
  faq:[
    {q:"Why is my portfolio value different from CAMS/AMFI?",
     a:"MF Advisor fetches NAV from mfapi.in (AMFI-sourced). There may be a 1-2 day lag for NAV updates. Also, your CAMS statement may include funds across AMCs, while MF Advisor only values funds whose NAV it can fetch. Check Settings → Portfolio Diagnostic to see per-folio balances and identify any missing NAV."},
    {q:"Why is XIRR showing as N/A or a very large number?",
     a:"XIRR needs at least one buy and one sell/valuation cash flow. If you have only purchases with no redemptions, XIRR uses the current portfolio value as the terminal cash flow. Ensure NAV data is fresh. Very recent investments (< 7 days) may show extreme XIRR figures as XIRR is highly sensitive to short holding periods."},
    {q:"How are units calculated for CAMS-imported transactions?",
     a:"For CAMS/KFintech CAS imports, MF Advisor uses the authoritative balUnits field (cumulative running balance per folio from the statement). For manually added transactions, it accumulates units using unitSign × resolveUnits(t), where resolveUnits falls back to amount÷NAV if units field is zero."},
    {q:"What is the difference between Period XIRR and All-time XIRR?",
     a:"Period XIRR only considers cash flows within the selected time period (e.g., 1Y, 3Y) and uses the portfolio value at the period start as an opening cash outflow. All-time XIRR uses every transaction from inception to today. Period XIRR measures recent performance; All-time XIRR measures your entire investment journey."},
    {q:"Why does the benchmark show a different value than expected?",
     a:"Benchmarks use a hypothetical portfolio approach: if you had invested the same amounts on the same dates into the benchmark instead, what would your corpus be today? It accounts for both buys and proportional redemptions. If benchmark NAV data starts after your first investment date, the earliest available price is used as a fallback."},
    {q:"How do I add a custom fund as a benchmark?",
     a:"Go to Settings → Benchmark Configuration → Add Benchmark. Choose type 'MFAPI Fund', enter the AMFI scheme code (a 6-digit number found at mfapi.in), and give it a label. MF Advisor will fetch the full NAV history and include it in all benchmark comparisons."},
    {q:"What is AUM and where does it come from?",
     a:"AUM (Assets Under Management) is the total corpus managed by a fund. MF Advisor fetches AUM from AMFI's NAVAll.txt file (updated daily). Click 'Fund Info' on the Performance page to see it. Note: some AMCs do not disclose AUM, in which case it shows as 'not disclosed'."},
    {q:"How do I import data from a previous version?",
     a:"On the setup screen (when no data is loaded), use the 'Restore from backup' card to drop or browse a mf-advisor_*.json file. This restores all transactions, NAV history, benchmark data, and settings without any re-uploading. In Settings, use the Import JSON button at the top."},
    {q:"How do I save data to a specific folder?",
     a:"In Settings → Data Management, click 'Set Default Folder' (requires Chrome or Edge). Once set, 'Save to Folder' writes a timestamped JSON backup there. Files are named mf-advisor_YYYY-MM-DD_HH-MM-SS.json, which sorts newest-first alphabetically."},
    {q:"How accurate is the tax estimate?",
     a:"The XIRR Review page shows FY-wise invested/redeemed/dividend data. Accurate capital gains tax calculation requires FIFO cost basis per unit, holding period per lot, and applying current LTCG/STCG slabs. MF Advisor provides the raw data for this calculation; consult a tax professional for exact liability."},
  ],
  userManual:[
    {title:"Getting Started",content:"Supported import formats:\n• CAMS CAS .xls (legacy) — drag & drop\n• CAMS Transaction XLSX (newer export) — auto-detected\n• KFintech XLSX — auto-detected\n• Any CSV with Date / Scheme / Type columns — auto-detected\n• JSON backup — use Restore from backup\n\nSteps: (1) Drop your file on the setup screen. (2) Review scheme mappings. (3) Click Confirm & Load.\n\nTip: Settings → Append XLS Transactions to add new data without losing existing."},
    {title:"Display Format",content:"Settings → Display Format:\n• Quick Presets: ₹ Auto, ₹ Lakhs, ₹ Crores, ₹ Full, $ Millions, € Millions\n• Currency: INR / USD / EUR / GBP / AED / SGD with editable exchange rates\n• Scale: Auto, Full, Thousands, Lakhs, Crores, Million, Billion, Custom format string\n• Decimals 0–4, negative style (− / parens / abs), thousands separator (Indian / Intl / none)\n• Custom format string: Excel-style e.g. #,##0 Cr or (₹#,##0.00)\n• Live preview updates instantly as you change any control"},
{title:"Getting Help",content:"• Help tab (top nav): FAQ, User Manual, Technical formulas, Changelog\n• Format badge in header (e.g. ₹.00): click to open Display Format settings\n• NAV dot in header: green = current, red = stale. Click Settings to refresh.\n• Error in Settings: click Retry. If blank screen: open DevTools (F12) → Console."},
{title:"Dashboard",content:"Shows your portfolio at a glance:\n• Hero cards: Portfolio Value, Net Invested, Total Gain, XIRR (period and all-time), NPV at selected discount rate.\n• Portfolio Timeline chart: Portfolio Value (₹) vs Invested amount vs each benchmark's hypothetical corpus, all on the same ₹ axis.\n• Quick discount-rate bar: set 5/6/7/8/10/12% for NPV calculation.\n• Top Performers and Bottom Performers: funds sorted by XIRR.\n• All charts support pan, zoom sliders, and rect-select to zoom into a time range."},
    {title:"Fund Overview",content:"Table of all your holdings with: latest NAV, balance units, invested amount, current value, gain/loss, and XIRR. Use the search box to filter. Toggle 'Show Exited' to show/hide fully redeemed funds. Click a fund name to jump to its performance chart."},
    {title:"Performance",content:"Per-fund chart showing NAV-based % return from a common start date, alongside all enabled benchmarks normalised to the same date. Right axis shows the fund's raw NAV (₹). Click 'Fund Info' to see AUM from AMFI. The table below shows Period XIRR, All-time XIRR, PPF p.a., and CAGR for each benchmark — all annualised for fair comparison."},
    {title:"FY Summary",content:"Financial year-wise (India Apr–Mar) breakdown:\n• Bar chart: Invested (blue), Redeemed (amber), Dividends (teal) per FY. Dotted green line = portfolio value at FY end.\n• Click any bar or table row to see the fund-level breakdown for that FY.\n• Table shows net cash flow and portfolio value at each FY end.\n• Download as CSV."},

    {title:"NPV",content:"Net Present Value calculator. Enter a discount rate (hurdle rate) to see whether your investment is creating value above that rate. Dashboard shows NPV at the selected rate. Adjust the rate using the quick-set bar on Dashboard or the NPV page controls."},
    {title:"Settings — Data Management",content:"• Append XLS Transactions: merge a new file (deduplicates by date|scheme|type|amount)\n• Bulk Upload Transactions CSV: Date, Scheme, Type, Amount, Units columns\n• Bulk Upload Scheme Mapping CSV: remap multiple schemes at once\n• Validate Data: 6 checks — future dates, missing amounts, no NAV, NAV mismatch >10%, duplicates, missing scheme name\n• Download Transactions CSV / Scheme Mapping CSV: export for backup\n• Save JSON: full backup including NAV cache\n• Clear & New Analysis: wipe all data and restart"},
    {title:"Exporting Data",content:"Export JSON: downloads all data including benchmark NAV series, so a re-import needs no network fetching. Files are named mf-advisor_YYYY-MM-DD_HH-MM-SS.json (sorts newest-first). Use 'Export ↓' in the header to print the current page to PDF or download as a Word document (.doc)."},

  technical:[
    {title:"XIRR — Extended Internal Rate of Return",content:"XIRR finds the discount rate r that makes NPV of all cash flows = 0.\nFormula: Σ [ Cᵢ / (1+r)^((tᵢ-t₀)/365) ] = 0\nWhere: Cᵢ = cash flow i (negative for investments, positive for redemptions/current value), tᵢ = date of cash flow i, t₀ = first cash flow date.\nAlgorithm: Newton-Raphson iteration. Initial guess = 10%. Convergence tolerance = 1e-7. Max iterations = 200.\nCash flows: buys and switchins are negative (outflows). Sells and switchouts are positive (inflows). The current portfolio value at the valuation date is added as a final positive cash flow."},
    {title:"CAGR — Compound Annual Growth Rate",content:"Used for benchmark comparison in the Performance table.\nFormula: CAGR = (End_NAV / Start_NAV)^(1/years) − 1\nWhere: years = (end_date − start_date) / 365.25\nNote: CAGR measures the benchmark index's own price appreciation, not your cash-flow-weighted return. Fund XIRR accounts for the timing and size of your actual investments; CAGR does not."},
    {title:"PPF Equivalent Return",content:"Synthetic PPF corpus: models investing the same cash flows into PPF at its announced rate.\nFormula: A synthetic NAV is created: NAV(t) = 100 × (1 + r)^((t − t₀)/365.25), where t₀ = date of first investment, r = PPF rate (default 7.1% p.a.).\nInvested amounts buy units at this synthetic NAV. Redemptions proportionally reduce units. Final value = units × current synthetic NAV.\nThis mirrors exactly how computeBenchmark works for index benchmarks, ensuring apples-to-apples comparison."},
    {title:"Sharpe Ratio",content:"Risk-adjusted return relative to a risk-free rate.\nFormula: Sharpe = (R_p − R_f) / σ_p\nWhere: R_p = annualised portfolio return (CAGR from NAV series), R_f = 7% (India PPF rate, proxy for risk-free), σ_p = annualised standard deviation of daily returns.\nDaily returns: rᵢ = (NAVᵢ − NAVᵢ₋₁) / NAVᵢ₋₁\nAnnualised σ = σ_daily × √252\nInterpretation: > 1.0 = good, > 2.0 = excellent, < 0 = underperforming risk-free rate."},
    {title:"Sortino Ratio",content:"Like Sharpe but penalises only downside volatility.\nFormula: Sortino = (R_p − R_f) / σ_downside\nσ_downside = √( (1/N) × Σ min(rᵢ, 0)² ) × √252\nOnly negative daily returns contribute to σ_downside. This is preferred for funds with asymmetric return distributions (e.g., equity funds with rare large drawdowns)."},
    {title:"Beta and Alpha",content:"Beta measures sensitivity to the market (Nifty 50 used as benchmark).\nFormula: β = Cov(R_fund, R_nifty) / Var(R_nifty)\nUsing daily returns matched by date between the fund and Nifty 50 NAV series.\nAlpha (Jensen's Alpha): α = R_fund − [R_f + β × (R_nifty − R_f)]\nAll values annualised. β = 1 means moves with market; β < 1 = lower volatility; β > 1 = amplified market moves. α > 0 = fund generates excess return above CAPM expectation."},
    {title:"Maximum Drawdown",content:"Largest peak-to-trough decline in NAV history.\nFormula: MDD = (Trough − Peak) / Peak, computed over rolling window.\nFor each date i: drawdown_i = (NAV_i − max(NAV_0..NAV_i)) / max(NAV_0..NAV_i)\nMDD = min(drawdown_0..drawdown_n)\nCalmar Ratio = Annualised Return / |MDD|. Higher Calmar = better return per unit of drawdown risk."},
    {title:"NPV — Net Present Value",content:"Present value of all investment cash flows at a given discount rate.\nFormula: NPV = Σ [ Cᵢ / (1 + d)^((tᵢ − t₀)/365.25) ] + PV_today\nWhere: d = discount rate (hurdle rate), Cᵢ = signed cash flows, PV_today = current portfolio value discounted to today.\nIf NPV > 0: investments are creating value above the hurdle rate.\nIf NPV < 0: you would have been better off investing at the hurdle rate."},
    {title:"Unit Balance Calculation",content:"Two sources of unit data:\n1. CAMS import (source='import'): uses t.balUnits (authoritative cumulative balance per folio from statement). Each transaction overwrites the balance.\n2. Manual transactions (source='manual'): accumulates using unitSign(txType) × resolveUnits(t).\n   resolveUnits(t): returns t.units if > 0, otherwise falls back to |t.amount| / t.price.\n   unitSign: buy/switchin/dreinvest = +1, sell/switchout = -1, others = 0.\nHybrid _computeBalances function handles both sources correctly."},
    {title:"Portfolio Value",content:"portVal(atDate) = Σ over (scheme, folio) pairs: balance_units × getNav(navByScheme[scheme], atDate)\ngetNav uses binary search to find the most recent NAV on or before atDate. Returns null if no NAV data exists.\nnavByScheme is populated from:\n1. XLS parser (transaction-time NAVs)\n2. mfapi.in NAV history fetch (full history)\n3. Auto-refresh every N minutes (configurable)"},
    {title:"computeFYBreakdown",content:"Allocates each transaction to India Financial Year (Apr–Mar):\nIndia FY: if month >= March(3), FY = year/year+1, else FY = year-1/year.\nFor each FY: invested = Σ |amount| for buy/switchin, redeemed = Σ |amount| for sell/switchout, dividends = Σ |amount| for div.\nDReinvestment (bonus/dividend reinvestment) is not counted as external cash flow."},
    {title:"Data Sources",content:"NAV data: mfapi.in (AMFI-sourced, updated daily). Full history available.\nAUM: AMFI NAVAll.txt (fetched once per session, all ~10,000 schemes).\nIndex benchmarks: Yahoo Finance API (20-year monthly history) via proxy.\nCustom fund benchmarks: mfapi.in using AMFI scheme code.\nISIN→AMFI mapping: Built-in dataset + AMFI master list.\nAll network calls use AbortSignal timeout (8–25 seconds). Fallback to cached data on failure."},
{title:"Glossary of Terms",content:"XIRR: annualised return for irregular cash flows\nCAGR: (End/Start)^(1/years) − 1\nSharpe: (Return − Risk-Free) / Std Dev. >1 good, >2 excellent\nSortino: like Sharpe but uses downside deviation only\nBeta: sensitivity to Nifty 50. Beta=1 moves with market\nAlpha: excess return vs benchmark after Beta adjustment. Positive = manager adds value\nMax Drawdown: largest peak-to-trough NAV decline\nNPV: present value of all cash flows at a hurdle rate\nUnrealised Gain: Current Value − Net Invested (open positions)\nRealised Gain: proceeds from redemptions minus FIFO cost basis\nLTCG: equity MF units held >12 months, taxed 10% above ₹1.25L\nSTCG: equity MF units held ≤12 months, taxed at 20%"},
  ],

function HelpPage(){
  const [tab,setTab]=useState('faq');
  const [open,setOpen]=useState({});

  const TABS=[
    {k:'faq',l:'❓ FAQ'},
    {k:'userManual',l:'📖 User Manual'},
    {k:'technical',l:'⚙ Technical'},
    {k:'changelog',l:'📋 Changelog'},
  ];

  return(
    <div style={{padding:'20px 24px',maxWidth:820,overflowY:'auto'}}>
      <div style={{fontFamily:'Syne',fontSize:18,fontWeight:800,color:'#fff',marginBottom:2}}>Help & Documentation</div>
      <div style={{fontSize:11,color:C.muted,marginBottom:16}}>User guide, FAQ, formulas, and version history</div>

      {/* Tab bar */}
      <div style={{display:'flex',gap:8,marginBottom:20,borderBottom:`1px solid ${C.border}`,paddingBottom:10,flexWrap:'wrap'}}>

          <button key={k} className="btn" onClick={()=>{setTab(k);setOpen({});}}
            style={{padding:'7px 16px',borderRadius:7,fontSize:12,fontWeight:600,
              background:tab===k?`${C.accent}22`:'transparent',
              border:`1px solid ${tab===k?C.accent:C.border}`,
              color:tab===k?C.accent:C.muted}}>
            {l}
          </button>

      </div>

      {/* FAQ */}
      {tab==='faq'&&(
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {(HELP_CONTENT.faq||[]).map((item,i)=>(
            <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,overflow:'hidden'}}>
              <button className="btn" onClick={()=>setOpen(p=>({...p,[i]:!p[i]}))}
                style={{width:'100%',padding:'12px 16px',textAlign:'left',background:'transparent',border:'none',
                  color:'#fff',fontSize:12,fontWeight:600,cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span>{item.q}</span>
                <span style={{color:C.muted,fontSize:14,marginLeft:8}}>{open[i]?'▲':'▼'}</span>
              </button>
              {open[i]&&<div style={{padding:'0 16px 14px',fontSize:11,color:C.muted,lineHeight:1.8,borderTop:`1px solid ${C.border}22`}}>{item.a}</div>}
            </div>
          ))}
        </div>
      )}

      {/* User Manual */}
      {tab==='userManual'&&(
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {(HELP_CONTENT.userManual||[]).map((item,i)=>(
            <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:'14px 18px'}}>
              <div style={{fontFamily:'Syne',fontSize:13,fontWeight:700,color:C.accent,marginBottom:8}}>{item.title}</div>
              <div style={{fontSize:11,color:C.muted,lineHeight:1.9,whiteSpace:'pre-line'}}>{item.content}</div>
            </div>
          ))}
        </div>
      )}

      {/* Technical Manual */}
      {tab==='technical'&&(
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {(HELP_CONTENT.technical||[]).map((item,i)=>(
            <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:'14px 18px'}}>
              <div style={{fontFamily:'Syne',fontSize:13,fontWeight:700,color:C.accent,marginBottom:8}}>{item.title}</div>
              <div style={{fontSize:11,color:C.muted,lineHeight:1.9,fontFamily:'Space Mono',whiteSpace:'pre-line'}}>{item.content}</div>
            </div>
          ))}
        </div>
      )}

      {/* Changelog */}
      {tab==='changelog'&&(
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {(HELP_CONTENT.changelog||[]).map((item,i)=>(
            <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:'14px 18px'}}>
              <div style={{display:'flex',gap:12,alignItems:'baseline',marginBottom:8,flexWrap:'wrap'}}>
                <span style={{fontFamily:'Syne',fontSize:14,fontWeight:800,color:C.accent}}>v{item.version}</span>
                <span style={{fontSize:11,color:C.muted}}>{item.date}</span>
                <span style={{fontSize:12,fontWeight:600,color:'#fff'}}>{item.title}</span>
              </div>
              <ul style={{margin:0,padding:'0 0 0 18px'}}>
                {(item.changes||[]).map((c,j)=>(
                  <li key={j} style={{fontSize:11,color:C.muted,lineHeight:1.8}}>{c}</li>
                ))}
              </ul>
            </div>
          ))}
        </div>
      )}
    </div>
  );

/* ══════════════════════════════════════════
   FY SUMMARY PAGE — Financial year-wise graphical summary
   Shows invested/redeemed/dividends per FY as bar chart,
   running portfolio value, FY XIRR, fund-wise breakdown
══════════════════════════════════════════ */
function FYSummaryPage({sortedTxns,navByScheme,enabled,benchmarks,benchmarkData,returnBasis}){
  const today=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d;},[]);
  const enabledSet=enabled;

  // Base FY data
  const fyRows=useMemo(()=>computeFYBreakdown(sortedTxns,navByScheme,enabledSet),[sortedTxns,navByScheme,enabledSet]);

  // Augment with running net invested and portfolio value at FY end
  const augmented=useMemo(()=>{
    if(!fyRows.length)return[];
    let runningNet=0;
    return fyRows.map(fy=>{
      runningNet+=fy.invested-fy.redeemed;
      // FY end date: 31-Mar of end year
      const [,endYY]=fy.fy.split('-');
      const endYear=2000+parseInt(endYY,10);
      const fyEnd=new Date(endYear,2,31);
      const atDate=fyEnd>today?today:fyEnd;
      const pv=portVal(atDate,sortedTxns,navByScheme,enabledSet);
      const netCashFlow=fy.invested-fy.redeemed;
      const xirr=computeXirrForScheme(null,atDate,new Date(endYear-1,3,1),sortedTxns,navByScheme,enabledSet);
      return{...fy,runningNet,pv,netCashFlow};
    });
  },[fyRows,sortedTxns,navByScheme,enabledSet,today]);

  // Fund-wise FY breakdown
  const [selectedFY,setSelectedFY]=useState(null);
  const fundBreakdown=useMemo(()=>{
    if(!selectedFY)return[];
    const map={};
    for(const t of sortedTxns){
      if(!enabledSet||!enabledSet.has(t.scheme))continue;
      if(getIndiaFY(t.date)!==selectedFY)continue;
      const c=clf(t.txType);
      if(!map[t.scheme])map[t.scheme]={scheme:t.scheme,invested:0,redeemed:0,dividends:0,txCount:0};
      if(c==='buy'||c==='switchin'){map[t.scheme].invested+=Math.abs(t.amount||0);}
      else if(c==='sell'||c==='switchout'){map[t.scheme].redeemed+=Math.abs(t.amount||0);}
      else if(c==='div'){map[t.scheme].dividends+=Math.abs(t.amount||0);}
      map[t.scheme].txCount++;
    }
    return Object.values(map).sort((a,b)=>b.invested-a.invested);
  },[selectedFY,sortedTxns,enabledSet]);

  // Bar chart dimensions
  const W=860,H=260,PL=72,PR=16,PT=16,PB=40;
  const IW=W-PL-PR, IH=H-PT-PB;
  const maxY=useMemo(()=>Math.max(1,...augmented.map(r=>Math.max(r.invested,r.redeemed,r.dividends))),[augmented]);
  const {hi:axHi,ticks:axTicks}=useMemo(()=>niceRange(0,maxY*1.1,5),[maxY]);
  const ys=v=>PT+IH-(v/axHi)*IH;
  const barW=augmented.length?Math.max(8,Math.min(42,IW/augmented.length*0.28)):20;
  const grpW=augmented.length?IW/augmented.length:IW;
  const xs=(i,off)=>PL+i*grpW+grpW/2+off;

  const [hov,setHov]=useState(null);
  const svgRef=useRef();

  const onSvgMv=e=>{
    const r=svgRef.current?.getBoundingClientRect();if(!r)return;

  // Download CSV of FY table
  const downloadFY=()=>{
    const hdrs=['FY','Invested (₹)','Redeemed (₹)','Dividends (₹)','Net Cash Flow','Portfolio Value (FY-end)','Gain vs Net Invested','Gain % (vs Net)'];

      const gain_fy=(r.pv||0)-r.runningNet;
      const gainPct_fy=r.runningNet>0?(gain_fy/r.runningNet*100):null;
      return[r.fy,r.invested.toFixed(0),r.redeemed.toFixed(0),r.dividends.toFixed(0),(r.invested-r.redeemed).toFixed(0),r.pv?.toFixed(0)||'',gain_fy.toFixed(0),gainPct_fy!=null?gainPct_fy.toFixed(1)+'%':'—'];
    });
    downloadCSV(rows,hdrs,`fy-summary_${toTS()}`);
  };

  if(!augmented.length)return(
    <div style={{padding:40,textAlign:'center',color:C.muted}}>No transaction data for FY summary.</div>
  );

  return(
    <div style={{padding:'20px 24px',maxWidth:960}}>
      <div style={{fontFamily:'Syne',fontSize:18,fontWeight:800,color:'#fff',marginBottom:2}}>FY Summary</div>

      {/* ── Bar Chart ── */}

        <div style={{position:'relative'}}>
          <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{width:'100%',maxWidth:W,display:'block'}}
            onMouseMove={onSvgMv} onMouseLeave={()=>setHov(null)}>
            {/* Grid */}
            {axTicks.map(v=>{const y=ys(v);return(<g key={v}>
              <line x1={PL} x2={W-PR} y1={y} y2={y} stroke="#0d1c30" strokeWidth="1"/>
              <text x={PL-6} y={y+4} textAnchor="end" fontSize="9" fontFamily="Space Mono" fill={C.muted}>{FMT(v)}</text>
            </g>);})}
            <line x1={PL} x2={PL} y1={PT} y2={PT+IH} stroke={C.border} strokeWidth="1"/>
            <line x1={PL} x2={W-PR} y1={PT+IH} y2={PT+IH} stroke={C.border} strokeWidth="1"/>
            {/* Bars */}
            {augmented.map((r,i)=>{
              const bw=barW;
              const cx=PL+i*grpW+grpW/2;
              const isHov=hov===i;
              const isSel=selectedFY===r.fy;
              return(<g key={r.fy} onClick={()=>setSelectedFY(r.fy===selectedFY?null:r.fy)} style={{cursor:'pointer'}}>
                {isHov&&<rect x={PL+i*grpW} y={PT} width={grpW} height={IH} fill={`${C.accent}08`}/>}
                {isSel&&<rect x={PL+i*grpW} y={PT} width={grpW} height={IH} fill={`${C.accent}15`} stroke={C.accent} strokeWidth="1"/>}
                {/* Invested */}
                <rect x={cx-bw*1.5} y={ys(r.invested)} width={bw} height={Math.max(1,PT+IH-ys(r.invested))} fill={C.accent} opacity={isSel?1:0.85} rx="2"/>
                {/* Redeemed */}
                <rect x={cx-bw*0.5} y={ys(r.redeemed)} width={bw} height={Math.max(1,PT+IH-ys(r.redeemed))} fill={C.amber} opacity={isSel?1:0.85} rx="2"/>
                {/* Dividends */}
                {r.dividends>0&&<rect x={cx+bw*0.5} y={ys(r.dividends)} width={bw} height={Math.max(1,PT+IH-ys(r.dividends))} fill={C.teal} opacity={isSel?1:0.85} rx="2"/>}
                {/* FY label */}
                <text x={cx} y={H-8} textAnchor="middle" fontSize="8" fontFamily="Space Mono" fill={isHov||isSel?C.accent:C.muted}>{r.fy.replace('FY','')}</text>
              </g>);
            })}
            {/* Portfolio value line */}
            {(()=>{
              let path='',first=true;
              augmented.forEach((r,i)=>{

              });

            })()}

function XirrReviewPage({sortedTxns,navByScheme,enabled,period,minDate}){

      <div style={{fontSize:11,color:C.muted,marginBottom:16}}>
        Daily annualised XIRR across rolling 1Y/2Y/3Y/5Y/All-time windows · auto-computed for selected period
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'18px 18px 14px'}}>
        <XIRRHistoryChart
          sortedTxns={sortedTxns}
          navByScheme={navByScheme}
          enabledSet={enabledSet}
          minDate={minDate}
          period={period}/>
      </div>
      <div style={{marginTop:16}}>
        <DataTable
          title={'Per-fund XIRR (' + Array.from(enabledSet).length + ' funds)'}
          columns={[
            {key:'name',label:'Fund'},
            {key:'val_f',label:'Current Value',align:'right'},
            {key:'allx_f',label:'All-Time XIRR',align:'right'},
            {key:'perx_f',label:'Period XIRR',align:'right'},
          ]}
          rows={Array.from(enabledSet).map(function(name){
            var t=new Date();t.setHours(0,0,0,0);
            var ax=computeXirrForScheme(name,t,null,sortedTxns,navByScheme);
            var pd=getPeriodDates(period,minDate,t);
            var px=computeXirrForScheme(name,pd.end,pd.start,sortedTxns,navByScheme);
            var n2=getNav(navByScheme[name],t);
            var b2=schemeUnits(name,t,sortedTxns);
            var val=n2&&b2>0.001?b2*n2:0;
            return{name:name,
              val_f:val>0?FMT(val):'—',
              allx_f:ax!=null?(ax*100>=0?'+':''+(ax*100).toFixed(1)+'%'):'—',
              perx_f:px!=null?(px*100>=0?'+':''+(px*100).toFixed(1)+'%'):'—',
            };
          }).filter(function(r){return r.val_f!=='—'||r.allx_f!=='—';})}
          filename="xirr-per-fund"
          maxHeight={360}/>
      </div>
    </div>
  );
}

const SAVE_KEY='mfa_state_v4';

function isBusinessDay(d){
  const day=d.getDay();return day!==0&&day!==6;
}
function lastBusinessDay(){
  const d=new Date();d.setHours(0,0,0,0);
  while(!isBusinessDay(d))d.setDate(d.getDate()-1);
  return d;
}
function navAsOf(nb){
  let latest=null;
  for(const arr of Object.values(nb)){if(arr?.length){const ld=arr[arr.length-1].d;if(!latest||ld>latest)latest=ld;}}
  if(!latest)return null;
  const diff=Math.round((lastBusinessDay()-latest)/86400000);
  if(diff<=0)return'NAV current';if(diff===1)return'NAV 1 day old';return'NAV '+diff+' days old';
}
function isNavCurrent(navByScheme){
  const lbd=lastBusinessDay();
  const lbdStr=toISO(lbd);
  // Check at least half of schemes have today's (or last business day's) NAV
  const schemes=Object.keys(navByScheme);
  if(!schemes.length)return true;
  let fresh=0;
  for(const name of schemes.slice(0,10)){
    const arr=navByScheme[name];
    if(!arr?.length)continue;
    const lastDate=arr[arr.length-1]?.d;
    if(lastDate&&toISO(lastDate)>=lbdStr)fresh++;
  }
  return fresh>0;
}
