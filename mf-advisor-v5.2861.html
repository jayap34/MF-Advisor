          <input type="date" value={customEnd} onChange={e=>{setCustomEnd(e.target.value);onChange({...value,customEnd:e.target.value});}}
            min={customStart||undefined} max={toISO(maxDate||new Date())}
            style={{background:'#060c18',border:`1px solid ${C.border}`,borderRadius:5,padding:'3px 7px',color:C.text,fontSize:11}}/>
        </div>
      )}
    </div>
  );
}

function getPeriodDates(period,minDate,today){
  if(!period)return{start:subYears(today,1),end:today};
  if(period.l==='All')return{start:minDate||subYears(today,10),end:today};
  if(period.l==='Custom'){
    const s=fromISO(period.customStart),e=fromISO(period.customEnd);
    return{start:s||subYears(today,1),end:e||today};
  }
  return{start:subDays(today,period.days),end:today};
}

// ── Fund Selector Panel ──
function FundSelectorPanel({allSchemes,schemeInfo,enabled,setEnabled,navByScheme,sortedTxns,today,showExited,setShowExited}){
  const [search,setSearch]=useState('');
  // showExited lifted to App (received as prop)
  const [groupBy,setGroupBy]=useState('none'); // none|amc|class|status
  const [collapsed,setCollapsed]=useState({});

  const schemes=useMemo(()=>{
    // Determine exited status
    return allSchemes.map(name=>{
      let bal=0;
      for(const t of sortedTxns){if(t.scheme===name)bal=t.balUnits;}
      const val=getNav(navByScheme[name],today);
      const currentVal=val&&bal>0.001?bal*val:0;
      const amc=getAMC(name);
      const cls=getAssetClass(name);
      const exited=currentVal<10&&bal<0.001;
      return{name,exited,amc,cls,currentVal};
    });
  },[allSchemes,sortedTxns,navByScheme,today]);

  const filtered=useMemo(()=>{
    let s=schemes;
    if(!showExited)s=s.filter(x=>!x.exited);
    if(search)s=s.filter(x=>x.name.toLowerCase().includes(search.toLowerCase()));
    return s;
  },[schemes,showExited,search]);

  const grouped=useMemo(()=>{
    if(groupBy==='none')return[{key:'all',label:'',items:filtered}];
    const map={};
    for(const s of filtered){
      const k=groupBy==='amc'?s.amc:groupBy==='class'?s.cls:s.exited?'Exited':'Active';
      if(!map[k])map[k]=[];map[k].push(s);
    }
    return Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0])).map(([k,v])=>({key:k,label:k,items:v}));
  },[filtered,groupBy]);

  const toggleGroup=key=>{
    const groupItems=grouped.find(g=>g.key===key)?.items||[];
    const names=new Set(groupItems.map(s=>s.name));
    const allOn=[...names].every(n=>enabled.has(n));
    setEnabled(prev=>{const s=new Set(prev);names.forEach(n=>allOn?s.delete(n):s.add(n));return s;});
  };

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      {/* Header */}
      <div style={{padding:'12px 14px',borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <span style={{fontFamily:'Syne',fontSize:12,fontWeight:700,color:'#fff'}}>Funds ({enabled.size}/{allSchemes.length})</span>
          <div style={{display:'flex',gap:4}}>
            <button className="btn" onClick={()=>setEnabled(new Set(allSchemes.filter(n=>schemes.find(s=>s.name===n&&(showExited||!s.exited)))))}
              style={{padding:'2px 7px',borderRadius:4,fontSize:9,fontFamily:'Space Mono',background:'transparent',border:`1px solid ${C.green}44`,color:C.green}}>All</button>
            <button className="btn" onClick={()=>setEnabled(new Set())}
              style={{padding:'2px 7px',borderRadius:4,fontSize:9,fontFamily:'Space Mono',background:'transparent',border:`1px solid ${C.red}44`,color:C.red}}>None</button>
          </div>
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search funds…"
          style={{width:'100%',background:'#060c18',border:`1px solid ${C.border}`,borderRadius:6,padding:'5px 8px',color:C.text,fontSize:11,marginBottom:7}}/>
        <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
          <label style={{display:'flex',gap:5,alignItems:'center',fontSize:10,color:C.muted,cursor:'pointer'}}>
            <input type="checkbox" checked={showExited} onChange={e=>setShowExited(e.target.checked)} style={{accentColor:C.accent}}/>
            Show exited
          </label>
          <select value={groupBy} onChange={e=>setGroupBy(e.target.value)}
            style={{background:'#060c18',border:`1px solid ${C.border}`,borderRadius:4,padding:'2px 5px',color:C.muted,fontSize:10,marginLeft:'auto'}}>
            <option value="none">No group</option>
            <option value="amc">By AMC</option>
            <option value="class">By Class</option>
            <option value="status">By Status</option>
          </select>
        </div>
      </div>

      {/* Fund list */}
      <div style={{overflowY:'auto',flex:1,padding:'8px 8px'}}>
        {grouped.map(grp=>(
          <div key={grp.key}>
            {groupBy!=='none'&&(
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 6px',marginBottom:2,cursor:'pointer'}}
                onClick={()=>{setCollapsed(p=>({...p,[grp.key]:!p[grp.key]}));}}
                onDoubleClick={()=>toggleGroup(grp.key)}>
                <span style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:'0.06em'}}>{grp.label}</span>
                <span style={{fontSize:10,color:C.muted2}}>{grp.items.filter(s=>enabled.has(s.name)).length}/{grp.items.length}</span>
              </div>
            )}
            {!collapsed[grp.key]&&grp.items.map(s=>{
              const on=enabled.has(s.name);
              return(
                <div key={s.name} className="fund-row"
                  onClick={()=>setEnabled(prev=>{const ns=new Set(prev);on?ns.delete(s.name):ns.add(s.name);return ns;})}
                  style={{padding:'6px 8px',borderRadius:7,marginBottom:3,
                    background:on?'#0a1420':'#060c16',
                    border:`1px solid ${on?(s.exited?C.muted2+'44':C.border+'88'):'transparent'}`,
                    opacity:on?1:0.4}}>
                  <div style={{display:'flex',gap:7,alignItems:'flex-start'}}>
                    <div style={{marginTop:3,width:9,height:9,borderRadius:2,flexShrink:0,
                      background:on?(s.exited?C.muted:C.accent):'#1a2a3a',
                      border:`1px solid ${on?(s.exited?C.muted:C.accent):C.border}`}}/>
                    <div style={{minWidth:0,flex:1}}>
                      <div style={{fontSize:10,color:on?C.text:C.muted,lineHeight:1.35,wordBreak:'break-word'}}>{s.name}</div>
                      <div style={{display:'flex',gap:8,marginTop:2}}>
                        {s.currentVal>10&&<span style={{fontSize:9,color:C.muted,fontFamily:'Space Mono'}}>{FMT(s.currentVal)}</span>}
                        {s.exited&&<span style={{fontSize:9,color:C.muted2}}>exited</span>}
                        <span style={{fontSize:9,color:C.muted2,marginLeft:'auto'}}>{s.cls}</span>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        ))}
        {filtered.length===0&&<div style={{textAlign:'center',color:C.muted,fontSize:11,padding:'20px 0'}}>No funds match</div>}
      </div>
    </div>
  );
}

// ── Nice tick helpers (used by LineChart + XIRRHistoryChart) ──
function niceStep(range,targetCount){
  if(range===0||targetCount<2)return 1;
  const rough=range/(targetCount-1);
  const mag=Math.pow(10,Math.floor(Math.log10(Math.abs(rough))));
  const n=rough/mag;
  const nice=n<=1?1:n<=2?2:n<=5?5:10;
  return nice*mag;
}
function niceRange(mn,mx,gridCount){
  const step=niceStep(mx-mn,gridCount);
  const lo=Math.floor(mn/step)*step;
  const hi=Math.ceil(mx/step)*step;
  const ticks=[];
  for(let v=lo;v<=hi+step*0.001;v+=step)ticks.push(parseFloat(v.toFixed(10)));
  return{lo,hi,step,ticks};
}

// ── Line Chart with zoom + download ──
function LineChart({series,title,subtitle,width=800,height=320,showLegend=true,chartId='chart',note,navSeries=null,navSeriesLabel='NAV (₹)',fullRange=false}){
  const svgRef=useRef();
  const [zoom,setZoom]=useState([0,100]);
  const [gridCount,setGridCount]=useState(6);
  const [mode,setMode]=useState('pan'); // 'pan'|'rect'
  const dragRef=useRef({on:false,x0:0,z0:[0,100],rx0:0,rx1:0});
  const [rect,setRect]=useState(null);
  const PL=70,PR=navSeries?.length?58:14,PT=12,PB=36;

  // All timestamps across full dataset (for slider mapping)
  // fullRange=true: sliders span ALL data in series (useful for full-history charts)
  const allTs=useMemo(()=>{
    if(!series?.length)return[];
    return[...new Set(series.flatMap(s=>s.data.map(p=>p.x.getTime())))].sort((a,b)=>a-b);
  },[series]);

  // On first render (or when series changes), auto-fit zoom to 100%
  useEffect(()=>{setZoom([0,100]);},[series]);

  const visData=useMemo(()=>{
    if(!series?.length||!allTs.length)return[];
    if(zoom[0]===0&&zoom[1]===100)return series; // fast path: no filtering needed
    const si=Math.floor(zoom[0]/100*(allTs.length-1));
    const ei=Math.ceil(zoom[1]/100*(allTs.length-1));
    const mn=allTs[si],mx=allTs[ei];
    return series.map(s=>({...s,data:s.data.filter(p=>p.x.getTime()>=mn&&p.x.getTime()<=mx)}));
  },[series,zoom,allTs]);

  const allVals=useMemo(()=>visData.flatMap(s=>s.data.map(p=>p.y)).filter(v=>v!=null&&!isNaN(v)),[visData]);
  const allDates=useMemo(()=>[...new Set(visData.flatMap(s=>s.data.map(p=>p.x.getTime())))].sort((a,b)=>a-b),[visData]);

  if(!allVals.length)return(
    <div style={{height,display:'flex',alignItems:'center',justifyContent:'center',color:C.muted,fontSize:12,background:C.card,borderRadius:10}}>
      No data for selected period
    </div>
  );

  const minV=Math.min(...allVals,0),maxV=Math.max(...allVals);
  const minT=allDates[0],maxT=allDates[allDates.length-1]||allDates[0];
  const pad=(maxV-minV)*0.08||Math.abs(maxV)*0.05||1;
  const {lo:yMin,hi:yMax,ticks:yTicks}=niceRange(minV-pad,maxV+pad,gridCount);
  const IW=width-PL-PR,IH=height-PT-PB;
  const xs=t=>PL+(t-minT)/(maxT-minT||1)*IW;
  const ys=v=>PT+IH-(v-yMin)/(yMax-yMin||1)*IH;
  // Right axis (NAV secondary)
  const navVals=navSeries?.map(p=>p.y).filter(v=>v!=null&&!isNaN(v))||[];
  const navMin=navVals.length?Math.min(...navVals):0;
  const navMax=navVals.length?Math.max(...navVals):1;
  const navPad=(navMax-navMin)*0.06||navMax*0.04||1;
  const {lo:navYMin,hi:navYMax,ticks:navTicks}=niceRange(navMin-navPad,navMax+navPad,5);
  const ysNav=v=>PT+IH-(v-navYMin)/(navYMax-navYMin||1)*IH;
  const navPath=navSeries?.length?(()=>{let p='',g=true;navSeries.forEach(pt=>{if(pt.y==null){g=true;return;}const x=xs(pt.x.getTime()),y=ysNav(pt.y);p+=(g?`M${x},${y}`:`L${x},${y}`);g=false;});return p;})():'';
  const xTickStep=Math.max(1,Math.floor(allDates.length/Math.max(4,gridCount)));
  const xTicks=allDates.filter((_,i,a)=>i%xTickStep===0||i===a.length-1);
  const buildPath=s=>{let p='',g=true;s.data.forEach(pt=>{if(pt.y==null){g=true;return;}const x=xs(pt.x.getTime()).toFixed(1),y=ys(pt.y).toFixed(1);p+=g?`M${x},${y}`:`L${x},${y}`;g=false;});return p;};
  const z=ys(0);

  // Tooltip
  const onMv=e=>{
    const tt=document.getElementById('tt');
    if(dragRef.current.on&&mode==='pan'){if(tt)tt.style.display='none';return;}
    const r=svgRef.current?.getBoundingClientRect();if(!r||!tt)return;
    const sx=(e.clientX-r.left)*width/r.width;
    if(sx<PL||sx>width-PR){tt.style.display='none';return;}
    const tgt=minT+(sx-PL)/IW*(maxT-minT);
    let h=`<div style="color:${C.muted};margin-bottom:6px">${fmtD(new Date(tgt))}</div>`;
    // NAV secondary axis tooltip entry
    if(navSeries?.length){
      const navPt=navSeries.reduce((best,p)=>{const d=Math.abs(p.x.getTime()-tgt);const bd=best?Math.abs(best.x.getTime()-tgt):Infinity;return d<bd?p:best;},null);
      if(navPt?.y!=null)h+=`<div style="color:#7c9cc0;padding:2px 0;border-top:1px solid #1e3a5a;margin-top:4px"><span style="font-family:Space Mono;font-size:10px">📊 ${navSeriesLabel}: ₹${navPt.y.toFixed(4)}</span></div>`;
    }
    let any=false;
    for(const s of visData){
      if(!s.data.length)continue;
      const cl=s.data.reduce((a,b)=>Math.abs(b.x.getTime()-tgt)<Math.abs(a.x.getTime()-tgt)?b:a,s.data[0]);
      if(cl?.y!=null){h+=`<div style="color:${s.color};display:flex;justify-content:space-between;gap:14px;margin-bottom:2px"><span>${s.label}</span><strong>${FMT(cl.y)}</strong></div>`;any=true;}
    }
    if(any){tt.innerHTML=h;tt.style.display='block';tt.style.left=(e.clientX+14)+'px';tt.style.top=(e.clientY-8)+'px';}
  };

  // Drag handlers (pan or rect-select)
  const svgX=e=>{const r=svgRef.current?.getBoundingClientRect();return r?(e.clientX-r.left)*width/r.width:0;};
  const pct=x=>Math.max(0,Math.min(100,(x-PL)/Math.max(1,IW)*100));

  const onDown=e=>{
    if(e.button!==0)return; e.preventDefault();
    const x=svgX(e);
    if(x<PL||x>PL+IW)return;
    dragRef.current={on:true,x0:x,z0:[...zoom],rx0:x,rx1:x};
    if(mode==='rect')setRect({x,w:0});
  };
  const onMove=e=>{
    if(!dragRef.current.on)return;
    const x=svgX(e);
    if(mode==='pan'){
      const dp=(dragRef.current.x0-x)/IW*100;
      const [z0,z1]=dragRef.current.z0,span=z1-z0;
      const n0=Math.max(0,Math.min(100-span,z0+dp));
      setZoom([n0,n0+span]);
    } else {
      dragRef.current.rx1=x;
      setRect({x:Math.min(dragRef.current.rx0,x),w:Math.abs(x-dragRef.current.rx0)});
    }
  };
  const onUp=e=>{
    if(!dragRef.current.on)return;
    if(mode==='rect'){
      const x0=Math.min(dragRef.current.rx0,dragRef.current.rx1);
      const x1=Math.max(dragRef.current.rx0,dragRef.current.rx1);
      if(x1-x0>8){
        const z0=Math.max(0,Math.min(99,pct(x0)));
        const z1=Math.max(z0+1,Math.min(100,pct(x1)));
        setZoom([z0,z1]);
      }
      setRect(null);
    }
    dragRef.current.on=false;
  };

  // Slider date labels
  const sliderLabel=z=>{
    if(!allTs.length)return '';
    const i=Math.round(z/100*(allTs.length-1));
    return fmtDM(new Date(allTs[Math.max(0,Math.min(allTs.length-1,i))]));
  };

  return(
    <div>
      {title&&(
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10,flexWrap:'wrap',gap:8}}>
          <div>
            <div style={{fontFamily:'Syne',fontSize:14,fontWeight:700,color:'#fff'}}>{title}</div>
            {subtitle&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>{subtitle}</div>}
          </div>
          <div style={{display:'flex',gap:5,alignItems:'center',flexWrap:'wrap'}}>
            {/* Mode toggle */}
            <div style={{display:'flex',border:`1px solid ${C.border}`,borderRadius:5,overflow:'hidden',marginRight:4}}>
              {[{k:'pan',l:'✋ Pan'},{k:'rect',l:'⬛ Select'}].map(({k,l})=>(
                <button key={k} className="btn" onClick={()=>setMode(k)}
                  style={{padding:'2px 9px',fontSize:9,border:'none',cursor:'pointer',fontFamily:'Space Mono',
                    background:mode===k?`${C.accent}33`:'transparent',
                    color:mode===k?C.accent:C.muted}}>
                  {l}
                </button>
              ))}
            </div>
            <div style={{display:'flex',gap:3,alignItems:'center'}}>
              <span style={{fontSize:9,color:C.muted,fontFamily:'Space Mono'}}>Grid</span>
              {[3,4,5,6,8,10].map(n=>(
                <button key={n} className="btn" onClick={()=>setGridCount(n)}
                  style={{padding:'2px 5px',borderRadius:3,fontSize:9,fontFamily:'Space Mono',minWidth:18,
                    background:gridCount===n?`${C.accent}22`:'transparent',
                    border:`1px solid ${gridCount===n?C.accent:C.border}`,
                    color:gridCount===n?C.accent:C.muted}}>{n}</button>
              ))}
            </div>
            <button className="btn" onClick={()=>downloadSVG(svgRef.current,`${chartId}.svg`)}
              style={{padding:'3px 8px',background:'transparent',border:`1px solid ${C.border}`,color:C.muted,borderRadius:4,fontSize:10}}>↓SVG</button>
            <button className="btn" onClick={()=>downloadChartPNG(svgRef.current,`${chartId}.png`)}
              style={{padding:'3px 8px',background:'transparent',border:`1px solid ${C.border}`,color:C.muted,borderRadius:4,fontSize:10}}>↓PNG</button>
          </div>
        </div>
      )}
      <div style={{width:'100%',overflowX:'auto',userSelect:'none'}}>
        <svg ref={svgRef} viewBox={`0 0 ${width} ${height}`}
          style={{width:'100%',minWidth:340,height:'auto',display:'block',cursor:mode==='pan'?'grab':'crosshair'}}
          onMouseMove={e=>{onMv(e);onMove(e);}}
          onMouseDown={onDown} onMouseUp={onUp}
          onMouseLeave={e=>{const tt=document.getElementById('tt');if(tt)tt.style.display='none';onUp(e);}}>
          <defs><clipPath id="lc-clip"><rect x={PL} y={PT} width={IW} height={IH}/></clipPath></defs>
          {yTicks.map(v=>{
            const y=ys(v);if(y<PT-2||y>PT+IH+2)return null;
            return(<g key={v}>
              <line x1={PL} x2={width-PR} y1={y} y2={y} stroke={v===0?"#1e3a5a":"#0d1c30"} strokeWidth={v===0?1.4:1}/>
              <text x={PL-6} y={y+4} textAnchor="end" fontSize="10" fontFamily="Space Mono" fill={v===0?C.accent:C.muted}>{FMT(v)}</text>
            </g>);
          })}
          {z>=PT&&z<=PT+IH&&<line x1={PL} x2={width-PR} y1={z} y2={z} stroke="#1e3a5a" strokeWidth="1.2" strokeDasharray="4 3"/>}
          <line x1={PL} x2={PL} y1={PT} y2={PT+IH} stroke={C.border} strokeWidth="1"/>
          {xTicks.map((t,i)=>(<text key={i} x={xs(t)} y={height-PT+4} textAnchor="middle" fontSize="9" fontFamily="Space Mono" fill={C.muted}>{fmtDM(new Date(t))}</text>))}
          <g clipPath="url(#lc-clip)">
            {visData.map(s=><path key={s.label} d={buildPath(s)} fill="none" stroke={s.color} strokeWidth={s.width||1.8} strokeDasharray={s.dash||''} strokeLinecap="round" strokeLinejoin="round" opacity={s.opacity||1}/>)}
            {visData[0]&&(()=>{
              let d='';let first=true;let lastX=PL;
              visData[0].data.forEach(pt=>{if(pt.y==null)return;if(first){d+=`M${xs(pt.x.getTime()).toFixed(1)},${ys(pt.y).toFixed(1)}`;first=false;}else{d+=`L${xs(pt.x.getTime()).toFixed(1)},${ys(pt.y).toFixed(1)}`;}lastX=xs(pt.x.getTime());});
              d+=`L${lastX},${PT+IH}L${PL},${PT+IH}Z`;
              return<path d={d} fill={`${visData[0].color}12`}/>;
            })()}
            {rect&&rect.w>5&&(
              <rect x={Math.max(PL,rect.x)} y={PT} width={Math.min(rect.w,PL+IW-Math.max(PL,rect.x))} height={IH}
                fill={`${C.accent}18`} stroke={C.accent} strokeWidth="1" strokeDasharray="4 2" style={{pointerEvents:'none'}}/>
            )}
          </g>
          {/* ── Right axis: NAV secondary (₹) ── */}
          {navSeries?.length>0&&(<g>
            <line x1={width-PR} x2={width-PR} y1={PT} y2={PT+IH} stroke={C.border} strokeWidth="1"/>
            {navTicks.map(v=>{
              const y=ysNav(v);if(y<PT-2||y>PT+IH+2)return null;
              return(<g key={v}>
                <text x={width-PR+5} y={y+4} textAnchor="start" fontSize="9" fontFamily="Space Mono" fill="#7c9cc0">
                  {v>=100?`₹${v.toFixed(0)}`:`₹${v.toFixed(2)}`}
                </text>
              </g>);
            })}
            <text x={width-2} y={PT+IH/2} textAnchor="middle" fontSize="9" fontFamily="Space Mono"
              fill="#7c9cc0" transform={`rotate(-90,${width-2},${PT+IH/2})`}>{navSeriesLabel}</text>
            <path d={navPath} fill="none" stroke="#7c9cc0" strokeWidth="1.2"
              strokeDasharray="6 3" strokeLinecap="round" strokeLinejoin="round" opacity="0.7"
              clipPath="url(#lc-clip)"/>
          </g>)}
        </svg>
      </div>
      {/* Zoom controls */}
      <div style={{padding:'5px 4px 0',display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
        <div style={{display:'flex',flexDirection:'column',flex:1,gap:2}}>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <span style={{fontSize:9,color:C.muted,fontFamily:'Space Mono',width:20}}>◀</span>
            <div style={{position:'relative',flex:1}}>
              <input type="range" min="0" max="100" step="0.2" value={zoom[0]}
                onChange={e=>{const v=+e.target.value;setZoom(z=>[Math.min(v,z[1]-2),z[1]]);}}
                style={{width:'100%',accentColor:C.accent}}/>
            </div>
            <div style={{position:'relative',flex:1}}>
              <input type="range" min="0" max="100" step="0.2" value={zoom[1]}
                onChange={e=>{const v=+e.target.value;setZoom(z=>[z[0],Math.max(v,z[0]+2)]);}}
                style={{width:'100%',accentColor:C.teal||'#00c8ff'}}/>
            </div>
            <span style={{fontSize:9,color:C.muted,fontFamily:'Space Mono',width:20}}>▶</span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',paddingLeft:26,paddingRight:26}}>
            <span style={{fontSize:9,color:C.accent,fontFamily:'Space Mono'}}>{sliderLabel(zoom[0])}</span>
            <span style={{fontSize:9,color:C.muted2,fontFamily:'Space Mono',cursor:'pointer',textDecoration:'underline'}}
              onClick={()=>setZoom([0,100])}>⟳ Full</span>
            <span style={{fontSize:9,color:C.teal||'#00c8ff',fontFamily:'Space Mono'}}>{sliderLabel(zoom[1])}</span>
          </div>
        </div>
      </div>
      {showLegend&&visData.length>0&&(
        <div style={{display:'flex',gap:14,flexWrap:'wrap',marginTop:8,paddingTop:8,borderTop:`1px solid ${C.border}`}}>
          {visData.map(s=>(<div key={s.label} style={{display:'flex',alignItems:'center',gap:5}}>
            <svg width="18" height="4"><line x1="0" y1="2" x2="18" y2="2" stroke={s.color} strokeWidth="2" strokeDasharray={s.dash||''}/></svg>
            <span style={{fontSize:10,color:s.color,fontFamily:'Space Mono'}}>{s.label}</span>
          </div>))}
        </div>
      )}
      {note&&<div style={{fontSize:10,color:C.muted,marginTop:6,fontStyle:'italic'}}>{note}</div>}
    </div>
  );
}

// ── Data Table with filter + sort + download ──
function DataTable({columns,rows,title,filename='table',maxHeight=420,summaryRow}){
  const [filters,setFilters]=useState({});
  const [sort,setSort]=useState({col:null,dir:1});
  const [showFilters,setShowFilters]=useState(false);

  const filtered=useMemo(()=>{
    let r=rows;
    for(const[col,val]of Object.entries(filters)){
      if(!val)continue;
      const lv=val.toString().toLowerCase();
      r=r.filter(row=>{const cv=row[col];return cv!=null&&String(cv).toLowerCase().includes(lv);});
    }
    if(sort.col){
      r=[...r].sort((a,b)=>{
        const av=a[sort.col],bv=b[sort.col];
        const an=typeof av==='number',bn=typeof bv==='number';
        if(an&&bn)return(av-bv)*sort.dir;
        return String(av||'').localeCompare(String(bv||''))*sort.dir;
      });
    }
    return r;
  },[rows,filters,sort]);

  const doDownload=()=>{
    const hdrs=columns.map(c=>c.label);
    const data=filtered.map(r=>columns.map(c=>r[c.key]));
    downloadCSV(data,hdrs,`${filename}.csv`);
  };

  return(
    <div>
      {title&&(
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,flexWrap:'wrap',gap:8}}>
          <div style={{fontFamily:'Syne',fontSize:14,fontWeight:700,color:'#fff'}}>{title}</div>
          <div style={{display:'flex',gap:6}}>
            <button className="btn" onClick={()=>setShowFilters(p=>!p)}
              style={{padding:'3px 10px',background:showFilters?`${C.accent}22`:'transparent',border:`1px solid ${showFilters?C.accent:C.border}`,color:showFilters?C.accent:C.muted,borderRadius:5,fontSize:10}}>
              ⚙ Filters {showFilters?'▲':'▼'}
            </button>
            <button className="btn" onClick={doDownload}
              style={{padding:'3px 10px',background:'transparent',border:`1px solid ${C.border}`,color:C.muted,borderRadius:5,fontSize:10}}>↓ CSV</button>
          </div>
        </div>
      )}
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
          <thead>
            {showFilters&&(
              <tr style={{background:C.surface}}>
                {columns.map(col=>(
                  <th key={col.key} style={{padding:'4px 10px',borderBottom:`1px solid ${C.border}`}}>
                    <input value={filters[col.key]||''} onChange={e=>setFilters(p=>({...p,[col.key]:e.target.value}))}
                      placeholder="filter…"
                      style={{width:'100%',minWidth:50,background:'#060c18',border:`1px solid ${C.border}`,borderRadius:4,padding:'2px 5px',color:C.text,fontSize:10}}/>
                  </th>
                ))}
              </tr>
            )}
            <tr style={{background:C.surface}}>
              {columns.map(col=>(
                <th key={col.key} className="sort-btn" onClick={()=>setSort(p=>({col:col.key,dir:p.col===col.key?-p.dir:1}))}
                  style={{padding:'8px 10px',textAlign:col.align||'left',borderBottom:`1px solid ${C.border}`,color:C.muted,fontSize:11,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap',userSelect:'none'}}>
                  {col.label}{sort.col===col.key?(sort.dir>0?' ↑':' ↓'):''}
                </th>
              ))}
            </tr>
            {summaryRow&&(
              <tr style={{background:`${C.accent}08`,borderBottom:`2px solid ${C.border}`}}>
                {columns.map(col=>{
                  const raw=summaryRow[col.key];
                  // Use the column's own render function so formatting (FMT/INR/PCT) is applied correctly
                  const cell=raw!=null&&col.render?col.render(raw,summaryRow):raw??'';
                  return(
                    <td key={col.key} style={{padding:'7px 10px',textAlign:col.align||'left',fontWeight:700,fontFamily:'Space Mono',fontSize:11,color:C.accent}}>
                      {cell}
                    </td>
                  );
                })}
              </tr>
            )}
          </thead>
          <tbody>
            {filtered.map((row,ri)=>(
              <tr key={ri} className="row-hover" style={{borderBottom:`1px solid ${C.border}22`}}>
                {columns.map(col=>(
                  <td key={col.key} style={{padding:'7px 10px',textAlign:col.align||'left',color:col.getColor?col.getColor(row[col.key],row):C.text,fontFamily:col.mono?'Space Mono':'inherit',fontSize:col.mono?11:12,whiteSpace:'nowrap'}}>
                    {col.render?col.render(row[col.key],row):(row[col.key]??'—')}
                  </td>
                ))}
              </tr>
            ))}
            {filtered.length===0&&<tr><td colSpan={columns.length} style={{textAlign:'center',color:C.muted,padding:'20px',fontSize:12}}>No data</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   SECTION 6b — XIRR HISTORY CHART
   Period-synced with Portfolio Timeline.
   Dual Y-axis: % XIRR left, ₹ value right.
   Also plots: Invested, Current Value, NAV-indexed since first investment.
   Configurable grid density, zoom, download.
══════════════════════════════════════════ */

const XIRR_PERIODS_CFG=[
  {l:'1Y', y:1,    c:'#00c8ff', dash:''},
  {l:'2Y', y:2,    c:'#c084fc', dash:'6 3'},
  {l:'3Y', y:3,    c:'#00e676', dash:''},
  {l:'5Y', y:5,    c:'#ffab00', dash:'6 3'},
  {l:'All',y:null, c:'#ff7043', dash:''},
];

function XIRRHistoryChart({sortedTxns,navByScheme,enabledSet,minDate,period}){
  const [pts,setPts]=useState(null);
  const [computing,setComputing]=useState(false);
  const [progress,setProgress]=useState(0);
  const autoComputeRef=useRef(false);
  // Which XIRR period lines to show
  const [visLines,setVisLines]=useState(['1Y','2Y','3Y','All']);
  // Which ₹ overlays to show: invested, portVal, navIdx
  const [showInv,setShowInv]=useState(true);
  const [showPV,setShowPV]=useState(true);
  const [showNav,setShowNav]=useState(false);
  const [pvOpacity,setPvOpacity]=useState(35);
  const [gridCount,setGridCount]=useState(6);
  const [zoom,setZoom]=useState([0,100]);
  const svgRef=useRef();
  const cancelRef=useRef(false);

  const today=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d;},[]);

  // Derive the date window from the same period prop as Portfolio Timeline
  const {start:winStart,end:winEnd}=useMemo(()=>{
    if(!period)return{start:subDays(today,365),end:today};
    const{start,end}=getPeriodDates(period,minDate,today);
    return{start,end};
  },[period,minDate,today]);

  /* ─ Compute daily series ─ */
  const compute=useCallback(async()=>{
    setComputing(true);setPts(null);setProgress(0);cancelRef.current=false;
    const dates=[];
    // step: never more than 180 pts for performance
    const totalDays=Math.ceil((winEnd-winStart)/MS);
    const step=Math.max(1,Math.ceil(totalDays/180));
    for(let d=new Date(winStart);d<=winEnd;d=addDays(d,step))dates.push(new Date(d));

    // First-investment date (for NAV-index baseline)
    const firstTx=sortedTxns.find(t=>enabledSet.has(t.scheme)&&clf(t.txType)==='buy');
    const firstInvDate=firstTx?firstTx.date:winStart;

    const result=[];
    for(let i=0;i<dates.length;i++){
      if(cancelRef.current)break;
      if(i%10===0){setProgress(Math.round(i/dates.length*100));await new Promise(r=>setTimeout(r,0));}
      const cur=dates[i];
      const pv=portVal(cur,sortedTxns,navByScheme,enabledSet);
      const {net}=computeInvested(cur,sortedTxns,enabledSet);
      const pt={date:fmtD(cur),isoDate:toISO(cur),pv:pv>0?pv:null,inv:net>0?net:null};

      // NAV-indexed: each fund's NAV normalised to 100 at first investment date,
      // weighted by current portfolio share
      let navIdxVal=null;
      if(pv>100){
        let wNum=0,wDen=0;
        for(const name of enabledSet){
          const navArr=navByScheme[name];if(!navArr?.length)continue;
          const navNow=getNav(navArr,cur);
          if(!navNow)continue;
          // units held on cur date (folio-aware)
          const units=schemeUnits(name,cur,sortedTxns);
          if(units<0.001)continue;
          const curVal=units*navNow;
          const navRef=getNav(navArr,firstInvDate)||navArr[0]?.v;
          if(navRef&&navNow&&curVal>0){
            wNum+=(navNow/navRef)*curVal;
            wDen+=curVal;
          }
        }
        navIdxVal=wDen>0?((wNum/wDen)*net)||null:null;
      }
      pt.navIdx=navIdxVal;

      // XIRR for each period
      for(const p of XIRR_PERIODS_CFG){
        const ws=p.y?subDays(cur,Math.round(p.y*365.25)):null;
        if(ws&&ws<minDate){pt[p.l]=null;continue;}
        const{x}=computePortfolioXirr(cur,ws,sortedTxns,navByScheme,enabledSet);
        pt[p.l]=x!=null?parseFloat((x*100).toFixed(3)):null;
      }
      result.push(pt);
    }
    setPts(result);setComputing(false);setProgress(100);
  },[sortedTxns,navByScheme,enabledSet,minDate,winStart,winEnd]);

  // Auto-compute on mount and when period/funds change
  const prevPeriodKey=useRef(null);
  useEffect(()=>{
    const key=`${toISO(winStart)}_${toISO(winEnd)}_${[...enabledSet].sort().join(',')}`;
    if(prevPeriodKey.current!==key){
      prevPeriodKey.current=key;
      setPts(null);
      // Small debounce to avoid thrashing on rapid changes
      const t=setTimeout(()=>{ compute(); }, 400);
      return()=>clearTimeout(t);
    }
  },[winStart,winEnd,enabledSet,compute]);

  /* ─ Zoom slice ─ */
  const visible=useMemo(()=>{
    if(!pts?.length)return[];
    const si=Math.floor(zoom[0]/100*(pts.length-1));
    const ei=Math.ceil(zoom[1]/100*(pts.length-1));
    return pts.slice(si,Math.min(ei+1,pts.length));
  },[pts,zoom]);

  /* ─ Axis ranges ─ */
  const {pctRange,inrRange}=useMemo(()=>{
    if(!visible.length)return{pctRange:null,inrRange:null};
    const pctVals=visible.flatMap(pt=>XIRR_PERIODS_CFG.filter(p=>visLines.includes(p.l)).map(p=>pt[p.l])).filter(v=>v!=null);
    const inrSeries=[];
    if(showPV)visible.forEach(pt=>{if(pt.pv)inrSeries.push(pt.pv);});
    if(showInv)visible.forEach(pt=>{if(pt.inv)inrSeries.push(pt.inv);});
    if(showNav)visible.forEach(pt=>{if(pt.navIdx)inrSeries.push(pt.navIdx);});
    if(!pctVals.length)return{pctRange:null,inrRange:null};
    const pMin=Math.min(...pctVals),pMax=Math.max(...pctVals);
    const pad=(pMax-pMin)*0.1||2;
    return{
      pctRange:niceRange(pMin-pad,pMax+pad,gridCount),
      inrRange:inrSeries.length?niceRange(Math.min(...inrSeries)*0.94,Math.max(...inrSeries)*1.06,gridCount):null,
    };
  },[visible,visLines,gridCount,showPV,showInv,showNav]);

  /* ─ SVG layout ─ */
  const W=920,H=380,PL=68,PT=16,PB=34;
  const showRight=!!(inrRange&&(showPV||showInv||showNav));
  const PR=showRight?78:14;
  const IW=W-PL-PR,IH=H-PT-PB;

  const yPct=useCallback(v=>{
    if(!pctRange)return PT+IH/2;
    return PT+IH-(v-pctRange.lo)/(pctRange.hi-pctRange.lo||1)*IH;
  },[pctRange,PT,IH]);

  const yInr=useCallback(v=>{
    if(!inrRange)return PT+IH/2;
    return PT+IH-(v-inrRange.lo)/(inrRange.hi-inrRange.lo||1)*IH;
  },[inrRange,PT,IH]);

  const allDates=useMemo(()=>visible.map(p=>p.isoDate),[visible]);
  const xs=useCallback(i=>PL+i/Math.max(1,allDates.length-1)*IW,[allDates.length,IW,PL]);

  const buildPctPath=useCallback(key=>{
    let p='',g=true;
    visible.forEach((pt,i)=>{
      const v=pt[key];if(v==null){g=true;return;}
      const x=xs(i).toFixed(1),y=yPct(v).toFixed(1);
      p+=g?`M${x},${y}`:`L${x},${y}`;g=false;
    });
    return p;
  },[visible,yPct,xs]);

  const buildInrPath=useCallback(key=>{
    if(!inrRange)return'';
    let p='',g=true;
    visible.forEach((pt,i)=>{
      const v=pt[key];if(!v){g=true;return;}
      const x=xs(i).toFixed(1),y=yInr(v).toFixed(1);
      p+=g?`M${x},${y}`:`L${x},${y}`;g=false;
    });
    return p;
  },[visible,yInr,xs,inrRange]);

  const buildInrArea=useCallback(key=>{
    if(!inrRange)return'';
    let area='',line='',g=true,lastX=PL;
    visible.forEach((pt,i)=>{
      const v=pt[key];if(!v){g=true;return;}
      const x=xs(i).toFixed(1),y=yInr(v).toFixed(1);
      if(g){area+=`M${x},${PT+IH}L${x},${y}`;line+=`M${x},${y}`;g=false;}
      else{area+=`L${x},${y}`;line+=`L${x},${y}`;}
      lastX=x;
    });
    area+=`L${lastX},${PT+IH}Z`;
    return{area,line};
  },[visible,yInr,xs,inrRange,PT,IH,PL]);

  /* ─ Tooltip ─ */
  const tt=document.getElementById('tt');
  const onMv=useCallback(e=>{
    if(!visible.length||!tt)return;
    const r=svgRef.current?.getBoundingClientRect();if(!r)return;
    const scaleX=W/r.width;
    const mx=(e.clientX-r.left)*scaleX;
    if(mx<PL||mx>W-PR){tt.style.display='none';return;}
    const idx=Math.round((mx-PL)/IW*(visible.length-1));
    const pt=visible[Math.max(0,Math.min(idx,visible.length-1))];
    if(!pt){tt.style.display='none';return;}
    let h=`<div style="color:${C.muted};margin-bottom:6px;font-weight:700">${pt.date}</div>`;
    if(showPV&&pt.pv!=null)h+=`<div style="display:flex;justify-content:space-between;gap:12px;margin-bottom:3px"><span style="color:#7aaa88">Current Value</span><strong>${FMT(pt.pv)}</strong></div>`;
    if(showInv&&pt.inv!=null)h+=`<div style="display:flex;justify-content:space-between;gap:12px;margin-bottom:3px"><span style="color:#4a8aff">Invested</span><strong>${FMT(pt.inv)}</strong></div>`;
    if(showNav&&pt.navIdx!=null)h+=`<div style="display:flex;justify-content:space-between;gap:12px;margin-bottom:5px;padding-bottom:5px;border-bottom:1px solid #1a2e48"><span style="color:#e040fb">NAV-indexed</span><strong>${FMT(pt.navIdx)}</strong></div>`;
    XIRR_PERIODS_CFG.filter(p=>visLines.includes(p.l)).forEach(p=>{
      const v=pt[p.l];if(v==null)return;
      h+=`<div style="color:${p.c};display:flex;justify-content:space-between;gap:14px;margin-bottom:2px"><span>${p.l} XIRR</span><strong style="color:${v>=0?C.green:C.red}">${v>=0?'+':''}${v.toFixed(2)}%</strong></div>`;
    });
    tt.innerHTML=h;tt.style.display='block';tt.style.left=(e.clientX+14)+'px';tt.style.top=(e.clientY-12)+'px';
  },[visible,visLines,IW,PL,W,PR,tt,showPV,showInv,showNav]);

  /* ─ X tick labels ─ */
  const xTickStep=Math.max(1,Math.floor(allDates.length/Math.max(4,gridCount)));
  const xTicks=allDates.reduce((a,iso,i)=>{if(i%xTickStep===0||i===allDates.length-1)a.push({iso,i});return a;},[]);

  /* ─ Shared grid ticks ─ */
  const pctTicks=pctRange?.ticks||[];
  const zeroY=pctRange?yPct(0):null;
  const zeroInBounds=zeroY!=null&&zeroY>=PT&&zeroY<=PT+IH;

  // ── Pre-compute path objects ──
  const pvPaths=useMemo(()=>buildInrArea('pv'),[buildInrArea]);
  const invPaths=useMemo(()=>buildInrArea('inv'),[buildInrArea]);
  const navPath=useMemo(()=>buildInrPath('navIdx'),[buildInrPath]);

  /* ─ Download CSV ─ */
  const dlCSV=()=>{
    if(!pts)return;
    const hdrs=['Date','Invested (₹)','Current Value (₹)','NAV-Indexed (₹)',...XIRR_PERIODS_CFG.map(p=>`XIRR ${p.l} (%)`)];
    const rows=pts.map(pt=>[pt.date,pt.inv??'',pt.pv??'',pt.navIdx??'',...XIRR_PERIODS_CFG.map(p=>pt[p.l]??'')]);
    downloadCSV(rows,hdrs,`xirr-history_${toTS()}`);
  };

  /* ─ Render states ─ */
  if(!pts&&!computing){
    // Auto-compute is triggered by useEffect — show brief placeholder
    return(
      <div style={{textAlign:'center',padding:'32px 20px'}}>
        <div className="sp" style={{width:28,height:28,border:`2px solid ${C.border}`,borderTopColor:C.accent,borderRadius:'50%',margin:'0 auto 10px'}}/>
        <div style={{fontSize:12,color:C.muted}}>Preparing XIRR history…</div>
      </div>
    );
  }

  if(computing){
    return(
      <div style={{textAlign:'center',padding:'32px 20px'}}>
        <div className="sp" style={{width:36,height:36,border:`3px solid ${C.border}`,borderTopColor:C.accent,borderRadius:'50%',margin:'0 auto 14px'}}/>
        <div style={{fontSize:13,color:C.accent,marginBottom:16}}>Computing daily XIRR… {progress}%</div>
        <div style={{maxWidth:400,margin:'0 auto',background:C.surface,borderRadius:6,padding:'6px 8px',border:`1px solid ${C.border}`}}>
          <div style={{height:4,borderRadius:2,background:C.border,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${progress}%`,borderRadius:2,background:`linear-gradient(90deg,#004fb3,${C.accent})`,transition:'width .3s'}}/>
          </div>
        </div>
        <button className="btn" onClick={()=>{cancelRef.current=true;setComputing(false);}}
          style={{marginTop:14,padding:'5px 14px',background:'transparent',border:`1px solid ${C.border}`,color:C.muted,borderRadius:6,fontSize:11}}>
          Cancel
        </button>
      </div>
    );
  }

  return(
    <div>
      {/* ── Controls ── */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10,flexWrap:'wrap',gap:10}}>
        <div>
          <div style={{fontFamily:'Syne',fontSize:14,fontWeight:700,color:'#fff',marginBottom:2}}>
            Daily XIRR History
          </div>
          <div style={{fontSize:11,color:C.muted}}>
            {fmtDL(winStart)} → {fmtDL(winEnd)} &nbsp;·&nbsp; % left axis · ₹ right axis · hover to inspect
          </div>
        </div>
        <div style={{display:'flex',gap:5,alignItems:'center',flexWrap:'wrap'}}>
          {/* XIRR period toggles */}
          {XIRR_PERIODS_CFG.map(p=>{
            const on=visLines.includes(p.l);
            return(
              <button key={p.l} className="btn"
                onClick={()=>setVisLines(prev=>on?prev.filter(x=>x!==p.l):[...prev,p.l])}
                style={{padding:'3px 9px',borderRadius:5,fontSize:11,fontFamily:'Space Mono',fontWeight:700,
                  background:on?`${p.c}22`:'transparent',border:`1px solid ${on?p.c:C.border}`,color:on?p.c:C.muted}}>
                {p.l}
              </button>
            );
          })}
          <div style={{width:1,height:14,background:C.border}}/>
          {/* ₹ overlays */}
          {[
            {key:'inv',label:'₹ Invested',color:'#4a8aff',val:showInv,set:setShowInv},
            {key:'pv', label:'₹ Value',   color:'#7aaa88',val:showPV,  set:setShowPV},
            {key:'nav',label:'₹ NAV-idx', color:'#e040fb',val:showNav, set:setShowNav},
          ].map(({key,label,color,val,set})=>(
            <button key={key} className="btn" onClick={()=>set(p=>!p)}
              style={{padding:'3px 9px',borderRadius:5,fontSize:11,fontFamily:'Space Mono',
                background:val?`${color}22`:'transparent',border:`1px solid ${val?color:C.border}`,color:val?color:C.muted}}>
              {label}
            </button>
          ))}
          <div style={{width:1,height:14,background:C.border}}/>
          {/* Grid count */}
          <span style={{fontSize:9,color:C.muted,fontFamily:'Space Mono'}}>Grid</span>
          {[3,4,5,6,8,10,12].map(n=>(
            <button key={n} className="btn" onClick={()=>setGridCount(n)}
              style={{padding:'2px 6px',borderRadius:4,fontSize:10,fontFamily:'Space Mono',minWidth:22,
                background:gridCount===n?`${C.accent}22`:'transparent',
                border:`1px solid ${gridCount===n?C.accent:C.border}`,
                color:gridCount===n?C.accent:C.muted}}>
              {n}
            </button>
          ))}
          <div style={{width:1,height:14,background:C.border}}/>
          {/* Downloads */}
          <button className="btn" onClick={()=>downloadSVG(svgRef.current,'xirr-history.svg')}
            style={{padding:'3px 8px',background:'transparent',border:`1px solid ${C.border}`,color:C.muted,borderRadius:5,fontSize:10}}>↓ SVG</button>
          <button className="btn" onClick={()=>downloadChartPNG(svgRef.current,'xirr-history.png')}
            style={{padding:'3px 8px',background:'transparent',border:`1px solid ${C.border}`,color:C.muted,borderRadius:5,fontSize:10}}>↓ PNG</button>
          <button className="btn" onClick={dlCSV}
            style={{padding:'3px 8px',background:'transparent',border:`1px solid ${C.border}`,color:C.muted,borderRadius:5,fontSize:10}}>↓ CSV</button>
          <button className="btn" onClick={compute}
            style={{padding:'3px 8px',background:`${C.accent}18`,border:`1px solid ${C.accent}55`,color:C.accent,borderRadius:5,fontSize:10}}>↺</button>
        </div>
      </div>

      {/* ── PV opacity slider (when ₹ overlays visible) ── */}
      {showRight&&(
        <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}>
          <span style={{fontSize:9,color:C.muted,fontFamily:'Space Mono',minWidth:70}}>Fill opacity</span>
          <input type="range" min="5" max="80" value={pvOpacity} onChange={e=>setPvOpacity(+e.target.value)}
            style={{width:90,accentColor:'#5a7aaa'}}/>
          <span style={{fontSize:9,color:C.muted,fontFamily:'Space Mono'}}>{pvOpacity}%</span>
        </div>
      )}

      {/* ── Chart SVG ── */}
      {pctRange?(
      <div style={{width:'100%',overflowX:'auto'}}>
        <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`}
          style={{width:'100%',minWidth:400,height:'auto',display:'block'}}
          onMouseMove={onMv} onMouseLeave={()=>tt&&(tt.style.display='none')}>
          <defs>
            <clipPath id="xh-clip"><rect x={PL} y={PT} width={IW} height={IH}/></clipPath>
          </defs>

          {/* Grid lines + left % labels + right ₹ labels */}
          {pctTicks.map((v,ti)=>{
            const y=yPct(v);
            if(y<PT-2||y>PT+IH+2)return null;
            const isZero=Math.abs(v)<0.001;
            // Corresponding INR value on right axis at same y-position
            const inrLabelVal=showRight&&inrRange?
              (inrRange.lo+(PT+IH-y)/IH*(inrRange.hi-inrRange.lo)):null;
            return(
              <g key={ti}>
                <line x1={PL} x2={W-PR} y1={y} y2={y}
                  stroke={isZero?'#1e3a5a':'#0d1c30'}
                  strokeWidth={isZero?1.5:1}
                  strokeDasharray={isZero?'5 3':'none'}/>
                {/* % label left */}
                <text x={PL-8} y={y+4} textAnchor="end"
                  fontSize="10" fontFamily="Space Mono"
                  fill={isZero?C.accent:C.muted}
                  fontWeight={isZero?'700':'400'}>
                  {v>=0?'+':''}{v===0?'0':v.toFixed(Math.abs(v)<10?1:0)}%
                </text>
                {/* ₹ label right */}
                {inrLabelVal!=null&&(
                  <text x={W-PR+8} y={y+4} textAnchor="start"
                    fontSize="10" fontFamily="Space Mono" fill="#485a70">
                    {FMT(inrLabelVal)}
                  </text>
                )}
              </g>
            );
          })}

          {/* Axis borders */}
          <line x1={PL} x2={PL} y1={PT} y2={PT+IH} stroke={C.border} strokeWidth="1"/>
          {showRight&&<line x1={W-PR} x2={W-PR} y1={PT} y2={PT+IH} stroke={C.border} strokeWidth="1"/>}

          {/* Axis labels */}
          <text x={14} y={PT+IH/2} textAnchor="middle"
            fontSize="9" fontFamily="Space Mono" fill={C.muted}
            transform={`rotate(-90,14,${PT+IH/2})`}>XIRR %</text>
          {showRight&&(
            <text x={W-14} y={PT+IH/2} textAnchor="middle"
              fontSize="9" fontFamily="Space Mono" fill="#485a70"
              transform={`rotate(90,${W-14},${PT+IH/2})`}>Value ₹</text>
          )}

          {/* X axis labels */}
          {xTicks.map(({iso,i})=>(
            <text key={iso} x={xs(i)} y={H-PB+16} textAnchor="middle"
              fontSize="9" fontFamily="Space Mono" fill={C.muted}>
              {fmtDM(fromISO(iso))||iso}
            </text>
          ))}

          {/* ₹ area fills + lines (clipped, drawn BEHIND XIRR lines) */}
          <g clipPath="url(#xh-clip)">
            {showInv&&invPaths.area&&(
              <path d={invPaths.area} fill={`rgba(74,138,255,${pvOpacity*0.004})`}/>
            )}
            {showPV&&pvPaths.area&&(
              <path d={pvPaths.area} fill={`rgba(122,170,136,${pvOpacity*0.004})`}/>
            )}
            {showInv&&invPaths.line&&(
              <path d={invPaths.line} fill="none" stroke="#4a8aff" strokeWidth="1.5" strokeDasharray="5 3" strokeLinecap="round" strokeLinejoin="round" opacity="0.85"/>
            )}
            {showPV&&pvPaths.line&&(
              <path d={pvPaths.line} fill="none" stroke="#7aaa88" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" opacity="0.9"/>
            )}
            {showNav&&navPath&&(
              <path d={navPath} fill="none" stroke="#e040fb" strokeWidth="1.5" strokeDasharray="4 3" strokeLinecap="round" strokeLinejoin="round" opacity="0.8"/>
            )}

            {/* XIRR lines on top */}
            {XIRR_PERIODS_CFG.filter(p=>visLines.includes(p.l)).map(p=>(
              <path key={p.l} d={buildPctPath(p.l)} fill="none"
                stroke={p.c} strokeWidth="2.2" strokeDasharray={p.dash}
                strokeLinecap="round" strokeLinejoin="round"/>
            ))}
          </g>

          {/* Terminal dots + value labels on right of chart */}
          {visible.length>0&&XIRR_PERIODS_CFG.filter(p=>visLines.includes(p.l)).map(p=>{
            const last=visible[visible.length-1];const v=last[p.l];if(v==null)return null;
            const x=xs(visible.length-1),y=yPct(v);
            if(y<PT||y>PT+IH)return null;
            return(
              <g key={p.l}>
                <circle cx={x} cy={y} r="3.5" fill={p.c} stroke="#04080f" strokeWidth="1.5"/>
                {!showRight&&(
                  <text x={x+6} y={y+4} fontSize="9" fontFamily="Space Mono" fill={p.c} fontWeight="700">
                    {v>=0?'+':''}{v.toFixed(1)}%
                  </text>
                )}
              </g>
            );
          })}
        </svg>
      </div>
      ):(
        <div style={{height:160,display:'flex',alignItems:'center',justifyContent:'center',color:C.muted,fontSize:12}}>
          Enable at least one XIRR period above
        </div>
      )}

      {/* ── Zoom ── */}
      <div style={{display:'flex',gap:6,alignItems:'center',marginTop:4,paddingLeft:4,flexWrap:'wrap'}}>
        <span style={{fontSize:9,color:C.muted,fontFamily:'Space Mono',minWidth:22}}>◀</span>
        <input type="range" min="0" max="99" step="0.5" value={zoom[0]}
          onChange={e=>{const v=+e.target.value;setZoom(p=>[Math.min(v,p[1]-1),p[1]]);}}
          style={{flex:1,minWidth:60,accentColor:C.accent}}/>
        <input type="range" min="1" max="100" step="0.5" value={zoom[1]}
          onChange={e=>{const v=+e.target.value;setZoom(p=>[p[0],Math.max(v,p[0]+1)]);}}
          style={{flex:1,minWidth:60,accentColor:C.accent}}/>
        <span style={{fontSize:9,color:C.muted,fontFamily:'Space Mono',minWidth:22}}>▶</span>
        <button className="btn" onClick={()=>setZoom([0,100])}
          style={{fontSize:9,padding:'2px 7px',background:'transparent',border:`1px solid ${C.border}`,color:C.muted,borderRadius:4}}>⟳ Full</button>
      </div>

      {/* ── Legend ── */}
      <div style={{display:'flex',gap:14,flexWrap:'wrap',marginTop:10,paddingTop:8,borderTop:`1px solid ${C.border}`}}>
        {XIRR_PERIODS_CFG.filter(p=>visLines.includes(p.l)).map(p=>{
          const lv=visible.length?visible[visible.length-1][p.l]:null;
          return(
            <div key={p.l} style={{display:'flex',alignItems:'center',gap:5}}>
              <svg width="20" height="4"><line x1="0" y1="2" x2="20" y2="2" stroke={p.c} strokeWidth="2" strokeDasharray={p.dash||''}/></svg>
              <span style={{fontSize:10,color:p.c,fontFamily:'Space Mono'}}>{p.l} XIRR</span>
              {lv!=null&&<span style={{fontSize:10,fontFamily:'Space Mono',fontWeight:700,color:lv>=0?C.green:C.red}}>{lv>=0?'+':''}{lv.toFixed(1)}%</span>}
            </div>
          );
        })}
        {showInv&&<div style={{display:'flex',alignItems:'center',gap:5}}>
          <svg width="20" height="4"><line x1="0" y1="2" x2="20" y2="2" stroke="#4a8aff" strokeWidth="2" strokeDasharray="5 3"/></svg>
          <span style={{fontSize:10,color:'#4a8aff',fontFamily:'Space Mono'}}>Invested ₹</span>
          {visible.length>0&&visible[visible.length-1].inv&&<span style={{fontSize:10,fontFamily:'Space Mono',color:C.text}}>{FMT(visible[visible.length-1].inv)}</span>}
        </div>}
        {showPV&&<div style={{display:'flex',alignItems:'center',gap:5}}>
          <svg width="20" height="4"><line x1="0" y1="2" x2="20" y2="2" stroke="#7aaa88" strokeWidth="2"/></svg>
          <span style={{fontSize:10,color:'#7aaa88',fontFamily:'Space Mono'}}>Current Value ₹</span>
          {visible.length>0&&visible[visible.length-1].pv&&<span style={{fontSize:10,fontFamily:'Space Mono',color:C.text}}>{FMT(visible[visible.length-1].pv)}</span>}
        </div>}
        {showNav&&<div style={{display:'flex',alignItems:'center',gap:5}}>
          <svg width="20" height="4"><line x1="0" y1="2" x2="20" y2="2" stroke="#e040fb" strokeWidth="2" strokeDasharray="4 3"/></svg>
          <span style={{fontSize:10,color:'#e040fb',fontFamily:'Space Mono'}}>NAV-indexed ₹</span>
          <span style={{fontSize:9,color:C.muted}}>equiv if stayed in funds since 1st investment</span>
        </div>}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   COLLAPSIBLE CARD — reusable across all pages
   Remembers collapsed state in localStorage per cardId
══════════════════════════════════════════ */
function CollapsibleCard({id,title,subtitle,children,defaultOpen=true,accent=false,rightSlot=null}){
  const [open,setOpen]=useState(()=>{
    try{const v=_store.get(`mfa_card_${id}`);return v===null?defaultOpen:v==='1';}catch{return defaultOpen;}
  });
  const toggle=()=>setOpen(p=>{
    const next=!p;try{_store.set(`mfa_card_${id}`,next?'1':'0');}catch{}return next;
  });
  return(
    <div style={{background:C.card,border:`1px solid ${accent?C.accent+'44':C.border}`,borderRadius:12,marginBottom:14,overflow:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 16px',cursor:'pointer',userSelect:'none',
        borderBottom:open?`1px solid ${C.border}`:'none',background:open?'transparent':C.surface}}
        onClick={toggle}>
        <span style={{fontSize:13,color:open?C.accent:C.muted,fontFamily:'Space Mono',lineHeight:1}}>{open?'▾':'▸'}</span>
        <div style={{flex:1}}>
          <div style={{fontFamily:'Syne',fontSize:13,fontWeight:700,color:'#fff'}}>{title}</div>
          {subtitle&&<div style={{fontSize:10,color:C.muted,marginTop:1}}>{subtitle}</div>}
        </div>
        {rightSlot&&<div onClick={e=>e.stopPropagation()}>{rightSlot}</div>}
        <span style={{fontSize:9,color:C.muted2,fontFamily:'Space Mono'}}>{open?'collapse':'expand'}</span>
      </div>
      {open&&<div style={{padding:'14px 16px'}}>{children}</div>}
    </div>
  );
}


function DashboardPage({sortedTxns,navByScheme,enabled,period,minDate,benchmarks,benchmarkData,analyticsMap,allTxns,setAllTxns,discountRate,setDiscountRate,returnBasis,setReturnBasis}){
  const today=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d;},[]);
  const {start,end}=useMemo(()=>getPeriodDates(period,minDate,today),[period,minDate,today]);
  const enabledSet=enabled;

  // Portfolio chart data
  const chartSeries=useMemo(()=>{
    const step=Math.max(1,Math.ceil((end-start)/MS/180)); // max ~180 points
    const grossData=[],netData=[],costData=[],portData=[],ppfData=[],benchData={};
    for(const b of benchmarks.filter(x=>x.enabled&&isNavBm(x)))benchData[b.id]=[];
    // Pre-filter transactions per enabled scheme for chart performance
    const txnsByScheme={};
    for(const name of enabledSet){txnsByScheme[name]=sortedTxns.filter(t=>t.scheme===name);}

    for(let cur=new Date(start);cur<=end;cur=addDays(cur,step)){
      const t=cur.getTime();
      const{invested:gi,net}=computeInvested(cur,sortedTxns,enabledSet);
      const pv=portVal(cur,sortedTxns,navByScheme,enabledSet);
      let bookCost=0;
      for(const name of enabledSet){bookCost+=computeFIFO(name,cur,txnsByScheme[name]||[]).costBasis;}
      grossData.push({x:new Date(t),y:gi});
      netData.push({x:new Date(t),y:net});
      costData.push({x:new Date(t),y:bookCost>0?bookCost:null});
      portData.push({x:new Date(t),y:pv>0?pv:null});

      const ppfB=benchmarks.find(b=>b.id==='ppf'&&b.enabled);
      if(ppfB)ppfData.push({x:new Date(t),y:computePPF(cur,sortedTxns,enabledSet,ppfB.rate)});

      for(const b of benchmarks.filter(x=>x.enabled&&isNavBm(x))){
        const bd=benchmarkData[b.id];
        const val=bd?computeBenchmark(cur,sortedTxns,enabledSet,bd):null;
        benchData[b.id].push({x:new Date(t),y:val});
      }
    }
    const basisLine=returnBasis==='gross'?grossData:returnBasis==='net'?netData:costData;
    const basisLabel=returnBasis==='gross'?'Gross Invested':returnBasis==='net'?'Net Deployed':'Book Cost (FIFO)';
    const series=[
      {label:basisLabel,color:'#4a8aff',data:basisLine,dash:'5 3',width:1.5},
      {label:'Portfolio Value',color:C.green,data:portData,width:2},
    ];
    const ppfB=benchmarks.find(b=>b.id==='ppf'&&b.enabled);
    if(ppfB&&ppfData.some(p=>p.y>0))series.push({label:'PPF',color:ppfB.color,data:ppfData,dash:'4 4',width:1.5,opacity:0.8});
    for(const b of benchmarks.filter(x=>x.enabled&&isNavBm(x))){
      const d=benchData[b.id];
      if(d?.some(p=>p.y>0))series.push({label:b.label,color:b.color,data:d,dash:'3 2',width:1.5,opacity:0.7});
    }
    return series;
  },[sortedTxns,navByScheme,enabledSet,start,end,benchmarks,benchmarkData,returnBasis]);

  // Hero stats
  const heroStats=useMemo(()=>{
    const pv=portVal(end,sortedTxns,navByScheme,enabledSet);
    const{invested,redeemed,net}=computeInvested(end,sortedTxns,enabledSet);
    const{x}=computePortfolioXirr(end,start,sortedTxns,navByScheme,enabledSet);
    const allTimeX=computePortfolioXirr(end,null,sortedTxns,navByScheme,enabledSet).x;
    // Book cost = FIFO cost of units still held across all enabled schemes
    let totalBookCost=0;
    for(const name of Array.from(enabledSet)){
      totalBookCost+=computeFIFO(name,end,sortedTxns).costBasis;
    }
    const gain_net=pv-net;
    const gain_book=pv-totalBookCost;
    const gain_gross=pv-invested;
    const gainPct_net=net!==0?(gain_net/Math.abs(net))*100:0;
    const gainPct_book=totalBookCost>0?(gain_book/totalBookCost)*100:0;
    const gainPct_gross=invested>0?(gain_gross/invested)*100:0;
    const gain=returnBasis==='gross'?gain_gross:returnBasis==='net'?gain_net:gain_book;
    const gainPct=returnBasis==='gross'?gainPct_gross:returnBasis==='net'?gainPct_net:gainPct_book;
    // NPV at dashboard-level discount rate
    const cfs=[],cfd=[];
    for(const t of sortedTxns){
      if(!enabledSet.has(t.scheme))continue;
      const c=clf(t.txType),a=Math.abs(t.amount||0);if(a<1)continue;
      const d=new Date(t.date);
      if(c==='buy'||c==='switchin'){cfs.push(-a);cfd.push(d);}
      else if(c==='sell'||c==='switchout'||c==='div'){cfs.push(a);cfd.push(d);}
    }
    if(pv>100){cfs.push(pv);cfd.push(new Date(end));}
    const t0=cfd[0]?.getTime()||0;
    const dr=(discountRate||7)/100;
    const npv=cfs.length>1?cfs.reduce((s,cf,i)=>s+cf/Math.pow(1+dr,(cfd[i].getTime()-t0)/(365.25*24*3600*1000)),0):null;
    return{pv,invested,redeemed,net,totalBookCost,gain,gainPct,gain_net,gain_book,gain_gross,gainPct_net,gainPct_book,gainPct_gross,xirr:x,allTimeXirr:allTimeX,npv};
  },[sortedTxns,navByScheme,enabledSet,start,end,discountRate,returnBasis]);

  // FY breakdown
  const fyData=useMemo(()=>computeFYBreakdown(sortedTxns,navByScheme,enabledSet),[sortedTxns,navByScheme,enabledSet]);

  // Per-fund stats for top/bottom + recommendations
  const fundStats=useMemo(()=>{
    return Array.from(enabledSet).map(name=>{
      const bal=schemeUnits(name,end,sortedTxns);
      const nav=getNav(navByScheme[name],end);
      const currentVal=nav&&bal>0.001?bal*nav:0;
      const{invested}=computeInvested(end,sortedTxns,new Set([name]));
      const x=computeXirrForScheme(name,end,null,sortedTxns,navByScheme);
      const gain=currentVal-invested;
      const{costBasis,realizedGain}=computeFIFO(name,end,sortedTxns);
      const unrealisedGain=currentVal-costBasis;
      const totalReturn=unrealisedGain+realizedGain;
      const{redeemed}=computeInvested(end,sortedTxns,new Set([name]));
      const net_fs=invested-redeemed;
      const rb=returnBasis||'book';
      const rpDen=rb==='book'?costBasis:rb==='net'?net_fs:invested;
      const returnPct=rpDen!==0?totalReturn/Math.abs(rpDen)*100:0;
      return{name,currentVal,invested,redeemed,net:net_fs,costBasis,gain,
        unrealisedGain,realizedGain,totalReturn,returnPct,
        xirr:x,exited:currentVal<10&&bal<0.001};
    }).filter(s=>s.currentVal>100||s.invested>100);
  },[enabledSet,sortedTxns,navByScheme,end,returnBasis]);

  const topFunds=useMemo(()=>[...fundStats].sort((a,b)=>(b.xirr||0)-(a.xirr||0)).slice(0,5),[fundStats]);
  const bottomFunds=useMemo(()=>[...fundStats].filter(s=>!s.exited&&s.xirr!=null).sort((a,b)=>(a.xirr||0)-(b.xirr||0)).slice(0,5),[fundStats]);

  // Proper recommendation engine
  const totalPortVal=fundStats.reduce((a,f)=>a+f.currentVal,0);
  const recs=useMemo(()=>genPortfolioRecs(fundStats,analyticsMap,totalPortVal)
    .filter(r=>r.action!=='CLOSED').slice(0,6),[fundStats,analyticsMap,totalPortVal]);

  const fyColumns=[
    {key:'fy',label:'Financial Year'},
    {key:'invested',label:'Invested',render:v=>FMT(v),mono:true},
    {key:'redeemed',label:'Withdrawn',render:v=>FMT(v),mono:true},
    {key:'dividends',label:'Dividends',render:v=>FMT(v),mono:true},
    {key:'gain',label:'Est. Gain',render:v=>FMT(v),mono:true,getColor:v=>v>0?C.green:C.red},
    {key:'ltcg',label:'Est. LTCG Tax',render:v=>FMT(v),mono:true,getColor:v=>v>0?C.amber:C.muted},
  ];

  const XC=({v,size=24})=>{
    if(v==null)return<span style={{color:C.muted,fontFamily:'Syne',fontSize:size}}>—</span>;
    const p=v*100;
    return<span style={{fontFamily:'Syne',fontWeight:800,fontSize:size,color:p>=0?C.green:C.red}}>{p>=0?'+':''}{p.toFixed(1)}%</span>;
  };

  return(
    <div style={{padding:'20px 24px',overflow:'auto'}}>
      {/* Hero stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(145px,1fr))',gap:10,marginBottom:12}}>
        {[
          {l:'Portfolio Value',v:FMT(heroStats.pv),c:C.accent,sub:navAsOf(navByScheme)||'Current market value'},
          {l:'Gross Invested',v:FMT(heroStats.invested),c:C.text,sub:'Total purchases'},
          {l:'Redeemed',v:heroStats.redeemed>0?FMT(heroStats.redeemed):'—',c:C.muted,sub:'Total withdrawals'},
          {l:'Net Deployed',v:FMT(heroStats.net),c:heroStats.net>=0?C.text:C.amber,sub:heroStats.net<0?'More withdrawn than invested':'Gross less withdrawals'},
          {l:'Book Cost (FIFO)',v:FMT(heroStats.totalBookCost),c:C.text,sub:'Cost of units currently held'},
          {l:(returnBasis||'book')==='book'?'Gain vs Book Cost':(returnBasis||'book')==='net'?'Gain vs Net Deployed':'Gain vs Gross Invested',v:FMT(heroStats.gain),c:heroStats.gain>=0?C.green:C.red,sub:PCT(heroStats.gainPct,1)+' return'},
          {l:`${period?.l||'Period'} XIRR`,v:<XC v={heroStats.xirr} size={20}/>,c:'',sub:'Annualised IRR'},
          {l:'All-Time XIRR',v:<XC v={heroStats.allTimeXirr} size={20}/>,c:'',sub:'Since inception'},
          {l:`NPV @ ${discountRate||7}%`,
            v:heroStats.npv!=null?FMT(heroStats.npv):'—',
            c:heroStats.npv!=null?(heroStats.npv>=0?C.green:C.red):C.muted,
            sub:heroStats.npv!=null?(heroStats.npv>=0?'Beats hurdle rate':'Below hurdle rate'):'Set in NPV tab'},
        ].map(({l,v,c,sub})=>(
          <div key={l} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:'12px 14px'}}>
            <div style={{fontSize:9,color:C.muted,marginBottom:4,fontFamily:'Space Mono',letterSpacing:'0.04em',textTransform:'uppercase'}}>{l}</div>
            <div style={{fontFamily:'Syne',fontSize:typeof v==='string'?18:14,fontWeight:800,color:c||C.text,lineHeight:1.1}}>{v}</div>
            <div style={{fontSize:9,color:C.muted,marginTop:4}}>{sub}</div>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:14,padding:'6px 10px',background:C.surface,borderRadius:7,border:`1px solid ${C.border}`}}>
        <span style={{fontSize:10,color:C.muted,whiteSpace:'nowrap'}}>NPV hurdle rate:</span>
        {[5,6,7,8,10,12].map(r=>(
          <button key={r} className="btn" onClick={()=>setDiscountRate&&setDiscountRate(r)}
            style={{padding:'2px 8px',borderRadius:4,fontSize:10,fontFamily:'Space Mono',
              background:(discountRate||7)===r?`${C.accent}22`:'transparent',
              border:`1px solid ${(discountRate||7)===r?C.accent:C.border}`,
              color:(discountRate||7)===r?C.accent:C.muted}}>{r}%</button>
        ))}

/* ── Term definitions glossary ── */
const TERM_DEFS=[
  {term:'Last Price (NAV)',short:'End-of-day Net Asset Value',
   full:'The Net Asset Value published by the fund house at close of the last business day. This is the price at which units are valued and transacted. May lag 1-2 business days.',
   useful:5,why:'Essential — this is the price you buy/sell at. Check this before transacting.'},
  {term:'Balance Units',short:'Units currently held across all folios',
   full:'Total units held after all purchases (including dividend reinvestments) minus all redemptions and switch-outs, aggregated across all folios of this fund.',
   useful:4,why:'Important for verifying your holding. Multiply by NAV to get current value.'},
  {term:'Total Cost (FIFO)',short:'Acquisition cost of held units',
   full:'Cost basis of currently held units computed on First-In First-Out basis. When units are sold, the oldest lots are consumed first. Dividend reinvestments add lots at reinvestment NAV. Lower than "Total Invested" if you have partially redeemed.',
   useful:5,why:'Critical for tax planning — gains = Current Value minus this number.'},
  {term:'Cost per Unit',short:'Average cost of each unit held',
   full:'Total Cost (FIFO) ÷ Balance Units. The weighted-average purchase price of units currently held after FIFO adjustment. Compare with Last Price to see per-unit gain/loss.',
   useful:3,why:'Useful quick sanity check — if Last Price > Cost per Unit, you are in profit on this fund.'},
  {term:'Current Value',short:'Market value today',
   full:'Last NAV × Balance Units. The mark-to-market value of your holding at the most recently available NAV. Subject to market fluctuation.',
   useful:5,why:'Your actual portfolio value. Use this for net-worth calculation.'},
  {term:'Unrealised Gain',short:'Notional profit/loss on held units',
   full:'Current Value − Total Cost. Profit or loss you would realise if you sold all units today. Negative means paper loss.',
   useful:5,why:'Shows whether you are ahead or behind on money still invested. Does not include past redemption gains.'},
  {term:'Realised Gain',short:'Profit/loss locked in from sales',
   full:'Proceeds from redemptions/switch-outs minus FIFO cost of those units. This is money already out of the fund — actual gain or loss crystallised.',
   useful:4,why:'Important for tracking total economic gain and tax liability from past redemptions.'},
  {term:'Total Return',short:'Complete economic gain',
   full:'Unrealised Gain + Realised Gain + Dividends. The full picture of what this fund has contributed to your wealth, past and present.',
   useful:5,why:'Most complete measure of fund contribution to your wealth.'},
  {term:'Return % (Abs)',short:'Simple total return percentage',
   full:'Total Return ÷ Total Amount Invested × 100. Not annualised — a fund held 10 years with 200% return may seem better than one with 50% in 2 years. Use XIRR for fair comparison.',
   useful:2,why:'Easy to compute but misleading for different holding periods. Prefer XIRR for comparison.'},
  {term:'XIRR % PA',short:'Annualised return on all cash flows',
   full:'Extended Internal Rate of Return — the annualised rate of return that equates all investment cash flows (buys as negatives, sells/dividends as positives, current value as terminal) to zero. The industry standard for mutual fund returns.',
   useful:5,why:'Gold standard — use this to compare any two funds regardless of investment timing or holding period.'},
  {term:'Mean Return % PA',short:'Average annual return from NAV history',
   full:'Arithmetic mean of monthly NAV returns, annualised by multiplying by 12. Computed from full NAV history. May differ from XIRR as it does not account for your specific investment timing.',
   useful:4,why:'Tells you the fund\'s average return over its full history — independent of when you invested.'},
  {term:'Std Dev % PA',short:'Volatility — how much returns fluctuate',
   full:'Standard deviation of monthly returns, annualised (× √12). Higher std dev = more volatile returns. Equity funds typically 15-25%; debt funds 2-8%. All else equal, lower std dev is better.',
   useful:5,why:'Crucial for understanding risk. High return with high std dev may not be worth the anxiety. Compare Sharpe instead.'},
  {term:'Sharpe Ratio',short:'Return per unit of total risk',
   full:'(Annual Return − Risk-Free Rate 7%) ÷ Annual Std Dev. A ratio > 1 is good; > 2 is excellent. Risk-free rate = 7% (India PPF/savings). Negative Sharpe means you\'re better off in a savings account on a risk-adjusted basis.',
   useful:5,why:'Best single metric for comparing funds. Always prefer higher Sharpe. A fund with 14% return and Sharpe 0.5 is worse than one with 12% return and Sharpe 1.2.'},
  {term:'Sortino Ratio',short:'Return per unit of downside risk only',
   full:'Like Sharpe but only penalises downside volatility. Uses downside deviation (variance of returns below risk-free rate) in denominator. Better than Sharpe for asymmetric return distributions.',
   useful:4,why:'Superior to Sharpe for equity funds with occasional large drawdowns. Sortino > 2 is excellent.'},
  {term:'Beta',short:'Sensitivity to market movements',
   full:'Regression coefficient of fund returns against Nifty 50 returns. Beta = 1 means fund moves in lockstep with market; Beta > 1 = amplified market moves (more volatile); Beta < 1 = defensive fund.',
   useful:4,why:'Beta 0.8 in a falling market loses less than a Beta 1.2 fund. Use to manage portfolio risk in different market cycles.'},
  {term:'Alpha % PA',short:'Excess return over market (CAPM)',
   full:'Fund Return − [Risk-Free Rate + Beta × (Market Return − Risk-Free Rate)]. Positive alpha means the fund manager has added value beyond what market exposure alone explains. Annualised percentage.',
   useful:5,why:'True measure of fund manager skill. Positive alpha = manager is adding value. Negative alpha = you\'d be better off in a Nifty index fund.'},
  {term:'Max Drawdown %',short:'Worst peak-to-trough decline',
   full:'Largest percentage drop from a peak to a subsequent trough in NAV history. E.g. 45% drawdown means ₹100 fell to ₹55. Critical for understanding worst-case scenarios.',
   useful:4,why:'Sets realistic expectations. If you panic-sold during this drawdown, you crystallised a loss. Only invest in funds whose max drawdown you can emotionally tolerate.'},
  {term:'% of Portfolio',short:'Concentration in this fund',
   full:'This fund\'s Current Value as a percentage of total portfolio value. Industry guideline: no single fund > 20-25% of portfolio (diversification). Index funds can be up to 40%.',
   useful:3,why:'Helps identify over-concentration. Rebalance if any active fund exceeds 25%.'},
];
